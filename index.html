<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOLITUDE-TA | SOLITUDE OVERDRIVE V7.1</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff00ff; --neon-purple: #bc13fe; --neon-green: #39ff14; --neon-red: #ff003c; --bg-dark: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-dark); color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; }
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .bg-gradient { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, rgba(188, 19, 254, 0.15), transparent 60%); z-index: 2; pointer-events: none; }
        .system-root { position: relative; z-index: 10; display: flex; justify-content: center; align-items: center; height: 100vh; padding: 15px; }
        .terminal-window { width: 100%; max-width: 440px; background: rgba(10, 10, 15, 0.9); border-radius: 25px; padding: 35px 25px; position: relative; overflow: hidden; box-shadow: 0 0 40px rgba(0, 242, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.1); }
        .terminal-window::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(transparent, var(--neon-blue), var(--neon-purple), var(--neon-pink), transparent); animation: rotateRGB 4s linear infinite; z-index: -1; }
        .terminal-window::after { content: ''; position: absolute; inset: 4px; background: rgba(10, 10, 15, 0.95); border-radius: 21px; z-index: -1; }
        @keyframes rotateRGB { 100% { transform: rotate(360deg); } }
        
        .brand-zone h1 { font-family: 'Orbitron', sans-serif; font-size: 32px; margin: 0; background: linear-gradient(90deg, var(--neon-blue), #fff, var(--neon-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; letter-spacing: 3px; filter: drop-shadow(0 0 15px var(--neon-blue)); animation: glowText 2s infinite alternate; }
        @keyframes glowText { from { filter: drop-shadow(0 0 10px var(--neon-blue)); } to { filter: drop-shadow(0 0 20px var(--neon-pink)); } }
        
        .node-info { background: rgba(255, 255, 255, 0.05); border-radius: 100px; padding: 8px 15px; margin: 20px 0; display: flex; justify-content: space-between; font-size: 11px; border: 1px solid rgba(0, 242, 255, 0.2); color: var(--neon-blue); }
        .srv-bridge { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .node-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid #222; padding: 15px 10px; border-radius: 15px; cursor: pointer; transition: 0.4s; text-align: center; }
        .node-btn.active#n1 { border-color: var(--neon-purple); box-shadow: 0 0 15px rgba(188, 19, 254, 0.4); }
        .node-btn.active#n2 { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }
        
        .id-input { width: 100%; background: rgba(0,0,0,0.6); border: 1px solid #333; padding: 18px; border-radius: 15px; color: #fff; font-family: 'Orbitron'; font-size: 18px; text-align: center; letter-spacing: 2px; margin-bottom: 15px; transition: 0.3s; }
        .id-input:focus { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0,242,255,0.3); outline: none; }
        
        .engine-btn { width: 100%; padding: 18px; border: none; border-radius: 15px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple)); color: #000; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; box-shadow: 0 5px 20px rgba(0, 242, 255, 0.4); }
        .engine-btn:active { transform: scale(0.98); }

        /* Ban Screen */
        .ban-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .ban-screen h1 { font-family: 'Orbitron'; font-size: 32px; color: var(--neon-red); filter: drop-shadow(0 0 15px var(--neon-red)); letter-spacing: 5px; }

        /* Swal Neon Custom */
        .swal2-popup { border-radius: 25px !important; background: rgba(10, 10, 15, 0.98) !important; border: 1px solid rgba(0, 242, 255, 0.3) !important; }
        .swal-solitude-title { font-family: 'Orbitron', sans-serif !important; font-weight: 900 !important; font-size: 24px !important; background: linear-gradient(90deg, var(--neon-blue), #fff, var(--neon-pink)) !important; -webkit-background-clip: text !important; -webkit-text-fill-color: transparent !important; filter: drop-shadow(0 0 10px var(--neon-blue)) !important; margin-bottom: 15px !important; }
        .swal-solitude-content { font-family: 'Rajdhani', sans-serif !important; color: #ccc !important; text-align: left !important; font-size: 15px !important; line-height: 1.6 !important; }
        .swal-solitude-confirm { background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple)) !important; color: #000 !important; font-family: 'Orbitron' !important; font-weight: 900 !important; border-radius: 12px !important; }
    </style>
</head>
<body>

    <div id="particles-js"></div>
    <div class="bg-gradient"></div>

    <div class="ban-screen" id="blacklisted">
        <i class="fas fa-skull-crossbones" style="font-size: 60px; color: var(--neon-red); margin-bottom: 20px;"></i>
        <h1>SOLITUDE BAN IP</h1>
        <p style="color: #666; font-family: Orbitron; font-size: 12px;">VI PHẠM CHÍNH SÁCH BẢO MẬT</p>
    </div>

    <div class="system-root">
        <div class="terminal-window">
            <div class="brand-zone">
                <h1>SOLITUDE PROXY</h1>
                <p style="text-align: center; font-size: 10px; color: #888; letter-spacing: 2px; font-family: 'Orbitron';">OVERDRIVE V7.1</p>
            </div>

            <div class="node-info">
                <span><i class="fas fa-network-wired"></i> <span id="ip-node">SCANNING...</span></span>
                <span>SERVER ONLINE <i class="fas fa-circle" style="font-size: 8px; color: var(--neon-green);"></i></span>
            </div>

            <div id="license-gate">
                <p style="text-align: center; color: var(--neon-pink); font-size: 11px; font-family: Orbitron; margin-bottom: 10px;">ENTER YOUR LICENSE KEY</p>
                <input type="text" id="license_entry" class="id-input" placeholder="SOL-XXXXXXXX">
                <button class="engine-btn" onclick="verifyLicense()">VERIFY KEY</button>
                <p style="text-align: center; font-size: 11px; margin-top: 15px; color: #555;">CHƯA CÓ KEY? BẤM "GET INFO" BÊN DƯỚI</p>
                <button style="width: 100%; background: none; border: 1px dashed #444; color: #888; padding: 10px; border-radius: 10px; margin-top: 10px; cursor: pointer; font-family: Orbitron; font-size: 10px;" onclick="showGetInfoForm()">SOLITUDE GET INFO & KEY</button>
            </div>

            <div id="auth-layer" style="display: none;">
                <div class="srv-bridge">
                    <div class="node-btn" id="n1" onclick="switchNode('no')">
                        <i class="fas fa-shield-halved" style="font-size: 20px; color: #666; margin-bottom: 5px;"></i><br><span style="font-size: 9px;">AIM DRAG</span>
                    </div>
                    <div class="node-btn active" id="n2" onclick="switchNode('vip')">
                        <i class="fas fa-bolt-lightning" style="font-size: 20px; color: #666; margin-bottom: 5px;"></i><br><span style="font-size: 9px;">ANTENA PREMIUM</span>
                    </div>
                </div>
                <input type="text" id="uid_entry" class="id-input" placeholder="ENTER GAME ID">
                <button class="engine-btn" onclick="startInjection()">ACTIVATE SOLITUDE</button>
            </div>

            <div id="data-flow" style="display: none;">
                <div style="background: rgba(255,255,255,0.03); border-radius: 15px; padding: 15px; border: 1px dashed var(--neon-blue);">
                    <div style="display: flex; justify-content: space-between; padding: 8px 0;">
                        <span style="font-size: 11px; color: #666;">UID:</span>
                        <span id="v-uid" style="color: var(--neon-blue); font-family: 'Orbitron'; font-size: 14px;">-</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding: 8px 0;">
                        <span style="font-size: 11px; color: #666;">EXPIRY:</span>
                        <span id="v-exp" style="color: var(--neon-green); font-family: 'Orbitron'; font-size: 14px;">-</span>
                    </div>
                </div>
                <button class="engine-btn" style="margin-top: 20px;" onclick="location.href='shadowrocket://config/add/https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main/antena.conf'">DOWNLOAD CONFIG</button>
                <button style="width: 100%; background: none; border: none; color: var(--neon-red); margin-top: 15px; cursor: pointer; font-family: Orbitron; font-size: 11px;" onclick="location.reload()">LOGOUT</button>
            </div>

            <p style="text-align: center; margin-top: 25px; font-size: 10px; color: #444; font-family: Orbitron;">
                SUPPORT: @0353594606
            </p>
        </div>
    </div>

    <script>
        const _CFG = { 
            t: "8626643586:AAET1UUTKaGzDCit47o3UMAYKHdyGQLKSN0", 
            c: "7329868082", 
            g: "https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main" 
        };

        let nodeType = 'vip'; let userIP = "SCANNING..."; 
        if (localStorage.getItem('DEVICE_BANNED') === 'true') document.getElementById('blacklisted').style.display = 'flex';

        particlesJS("particles-js", { "particles": { "number": { "value": 60 }, "color": { "value": ["#00f2ff", "#ff00ff"] }, "opacity": { "value": 0.3 }, "size": { "value": 2 }, "line_linked": { "enable": true, "distance": 120, "color": "#00f2ff", "opacity": 0.1 }, "move": { "enable": true, "speed": 1 } } });

        async function init() { 
            try { 
                const r = await fetch('https://api.ipify.org?format=json'); 
                const d = await r.json(); userIP = d.ip; 
                document.getElementById('ip-node').innerText = userIP; 
            } catch(e) { console.log("Init..."); } 
        }

        function switchNode(t) { 
            nodeType = t; 
            document.querySelectorAll('.node-btn').forEach(n => n.classList.remove('active')); 
            document.getElementById(t === 'no' ? 'n1' : 'n2').classList.add('active'); 
        }

        // CHỨC NĂNG 1: HIỆN FORM GET INFO (TỰ TẠO KEY)
        async function showGetInfoForm() {
            const { value: uid } = await Swal.fire({
                title: 'SOLITUDE REGISTRATION',
                input: 'text',
                inputPlaceholder: 'NHẬP ID GAME CỦA BẠN...',
                background: '#0a0a0f',
                confirmButtonText: 'GENERATE KEY',
                customClass: { confirmButton: 'swal-solitude-confirm', title: 'swal-solitude-title' }
            });

            if (uid) {
                const autoKey = "SOL-" + Math.random().toString(36).substr(2, 8).toUpperCase();
                const now = new Date().toLocaleString('vi-VN');
                
                // Giao diện Neon Premium cho khách
                Swal.fire({
                    html: `
                        <div class="swal-solitude-title">INFO & KEY GENERATED</div>
                        <div class="swal-solitude-content">
                            <b style="color:var(--neon-blue)">ID ACC:</b> ${uid}<br>
                            <b style="color:var(--neon-blue)">KEY:</b> <span style="color:var(--neon-green); font-weight:900">${autoKey}</span><br>
                            <b style="color:var(--neon-blue)">IP:</b> ${userIP}<br><br>
                            <i style="font-size:12px; color:var(--neon-pink)">Vui lòng chụp ảnh màn hình và gửi cho Admin để được duyệt Key.</i>
                        </div>
                    `,
                    background: '#0a0a0f',
                    confirmButtonText: 'OK',
                    customClass: { confirmButton: 'swal-solitude-confirm' }
                });

                // Gửi Telegram cho Admin có nút duyệt (Deep Link tới Worker)
                const msg = `🆕 **YÊU CẦU DUYỆT KEY MỚI**\n━━━━━━━━━━━━━━━━━━\n🆔 **UID:** \`${uid}\`\n🔑 **KEY:** \`${autoKey}\`\n🌐 **IP:** \`${userIP}\`\n⏰ **LÚC:** ${now}\n━━━━━━━━━━━━━━━━━━`;
                const markup = { 
                    inline_keyboard: [[{ 
                        text: "✅ DUYỆT KEY NÀY (AUTO)", 
                        url: `https://t.me/share/url?url=ADD_KEY_${autoKey}_UID_${uid}_IP_${userIP}` 
                    }]] 
                };

                fetch(`https://api.telegram.org/bot${_CFG.t}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: _CFG.c, text: msg, parse_mode: 'Markdown', reply_markup: markup })
                });
            }
        }

        // CHỨC NĂNG 2: KIỂM TRA KEY ĐỂ HIỆN Ô NHẬP UID
        async function verifyLicense() {
            const key = document.getElementById('license_entry').value.trim();
            if(!key) return;

            Swal.fire({ title: 'VERIFYING KEY...', background: '#0a0a0f', didOpen: () => Swal.showLoading() });

            try {
                const resp = await fetch(`${_CFG.g}/antena.json?v=${Date.now()}`);
                const data = await resp.json();
                
                if (data.keys && data.keys[key] && data.keys[key].status === "approved") {
                    Swal.fire({ icon: 'success', title: 'KEY CẬP NHẬT THÀNH CÔNG', background: '#0a0a0f', timer: 1500 });
                    document.getElementById('license-gate').style.display = 'none';
                    document.getElementById('auth-layer').style.display = 'block';
                    // Tự điền UID nếu Key đã gắn với UID
                    if(data.keys[key].uid) document.getElementById('uid_entry').value = data.keys[key].uid;
                } else {
                    Swal.fire({ icon: 'error', title: 'KEY CHƯA ĐƯỢC DUYỆT HOẶC SAI', background: '#0a0a0f' });
                }
            } catch(e) { console.error(e); }
        }

        // CHỨC NĂNG 3: START INJECTION (GIỮ NGUYÊN FORM CŨ)
        async function startInjection() {
            const entry = document.getElementById('uid_entry').value.trim();
            if(!entry) return;

            Swal.fire({ title: 'LOADING SOLITUDE...', background: '#0a0a0f', didOpen: () => Swal.showLoading() });

            try {
                const resp = await fetch(`${_CFG.g}/antena.json?v=${Date.now()}`);
                const data = await resp.json();
                const user = data.users ? data.users[entry] : null;

                if(user) {
                    // Check Ban IP
                    if (user.ip && user.ip !== userIP) {
                        localStorage.setItem('DEVICE_BANNED', 'true');
                        location.reload();
                        return;
                    }
                    
                    document.getElementById('auth-layer').style.display = 'none';
                    document.getElementById('data-flow').style.display = 'block';
                    document.getElementById('v-uid').innerText = entry;
                    document.getElementById('v-exp').innerText = user.expiry || "LIFETIME";
                    Swal.close();
                } else {
                    Swal.fire({ title: 'UID KHÔNG TỒN TẠI', background: '#0a0a0f' });
                }
            } catch(e) { Swal.fire({ title: 'LỖI KẾT NỐI', background: '#0a0a0f' }); }
        }

        init();
    </script>
</body>
</html>
