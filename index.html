<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQUY TA SYSTEM | PREMIUM BYPASS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-red: #ff003c;
            --bg-dark: #050a14;
            --glass: rgba(10, 20, 40, 0.9);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg-dark);
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
        }

        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a2a4a 0%, #050a14 100%);
            z-index: -1;
        }

        .container {
            width: 95%; max-width: 450px;
            background: var(--glass);
            padding: 30px; border-radius: 30px;
            border: 1px solid rgba(0, 242, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            font-size: 26px;
            background: linear-gradient(to right, var(--neon-blue), #fff, var(--neon-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .ip-badge {
            display: inline-block;
            background: rgba(0, 242, 255, 0.1);
            padding: 5px 15px; border-radius: 20px;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue); font-size: 12px;
            margin-bottom: 20px; font-family: monospace;
        }

        input {
            width: 100%; padding: 18px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #2a3a5a; border-radius: 15px;
            color: var(--neon-blue); font-size: 16px;
            text-align: center; outline: none; margin-bottom: 20px;
        }

        .btn {
            width: 100%; padding: 16px; border-radius: 15px; border: none;
            font-weight: bold; text-transform: uppercase; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            color: white; box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4);
        }

        /* GIAO DIỆN KHI BỊ BAN */
        .ban-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: var(--neon-red); text-align: center; padding: 20px;
        }
        .ban-overlay i { font-size: 100px; margin-bottom: 20px; text-shadow: 0 0 20px var(--neon-red); }

        #vip-panel { display: none; }
        .result-box { background: rgba(0, 0, 0, 0.3); padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: left; }
        .result-line { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
        .result-line b { color: var(--neon-blue); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="bg-animate"></div>

    <div class="container" id="main-content">
        <h1>HQUY TA SYSTEM</h1>
        <div class="ip-badge">IP: <span id="my-ip">ĐANG KIỂM TRA...</span></div>

        <div id="auth-section">
            <input type="text" id="uid_input" placeholder="NHẬP MÃ UID VIP">
            <button class="btn btn-primary" onclick="handleVerify()">
                <i class="fas fa-shield-alt"></i> XÁC MINH TRUY CẬP
            </button>
        </div>

        <div id="vip-panel">
            <div class="result-box">
                <div class="result-line"><span>ID:</span><b id="res-uid">---</b></div>
                <div class="result-line"><span>HẠN DÙNG:</span><b id="res-expiry" style="color:#39ff14">---</b></div>
                <div class="result-line"><span>MÁY CHỦ:</span><b>ANTENA VIP</b></div>
            </div>
            <button class="btn btn-primary" style="background: #39ff14; color: #000;" onclick="window.location.href='shadowrocket://config/add/https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main/antena.conf'">
                <i class="fas fa-download"></i> CÀI CONFIG NGAY
            </button>
        </div>

        <button class="btn" style="background:rgba(255,255,255,0.05); margin-top:15px; color:#888; font-size:12px" onclick="window.location.href='https://t.me/0353594606'">
            <i class="fab fa-telegram"></i> HỖ TRỢ TELE: 0353594606
        </button>
    </div>

    <script>
        const CONFIG = {
            TELE_TOKEN: "8433633651:AAeskPVzmcJJODy0-J1m-PkIs-lSYFFxRJQ",
            CHAT_ID: "7329868082",
            BASE_GITHUB: "https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main/antena.json"
        };

        let currentIP = "";

        // 1. KIỂM TRA BAN IP NGAY KHI VÀO TRANG
        async function checkAccess() {
            try {
                // Lấy IP người dùng
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                currentIP = ipData.ip;
                document.getElementById('my-ip').innerText = currentIP;

                // Lấy danh sách BAN từ GitHub
                const dbRes = await fetch(CONFIG.BASE_GITHUB + "?t=" + Date.now());
                const dbData = await dbRes.json();

                // Nếu IP nằm trong danh sách banned_ips -> Khóa web luôn
                if (dbData.banned_ips && dbData.banned_ips.includes(currentIP)) {
                    document.body.innerHTML = `
                        <div class="ban-overlay">
                            <i class="fas fa-user-slash"></i>
                            <h1 style="color:white">TRUY CẬP BỊ TỪ CHỐI</h1>
                            <p style="color:#ff003c">IP của bạn (${currentIP}) đã bị cấm khỏi hệ thống.</p>
                            <p style="color:#555">Vui lòng liên hệ Admin để được hỗ trợ.</p>
                        </div>`;
                    return false;
                }
                return true;
            } catch (e) {
                console.error("Lỗi bảo mật");
                return true;
            }
        }

        // 2. XỬ LÝ XÁC MINH UID
        async function handleVerify() {
            const uid = document.getElementById('uid_input').value.trim();
            if (!uid) return alert("Vui lòng nhập UID!");

            const btn = document.querySelector('.btn-primary');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ĐANG KIỂM TRA...';

            try {
                const res = await fetch(CONFIG.BASE_GITHUB + "?t=" + Date.now());
                const data = await res.json();
                const user = data.users[uid];

                if (user && user.status !== "banned") {
                    document.getElementById('auth-section').style.display = 'none';
                    document.getElementById('vip-panel').style.display = 'block';
                    document.getElementById('res-uid').innerText = uid;
                    document.getElementById('res-expiry').innerText = user.expiry;

                    // GỬI TELEGRAM CHI TIẾT
                    sendTele(uid, user.expiry);
                } else {
                    alert("UID SAI HOẶC ĐÃ BỊ KHÓA!");
                    btn.innerHTML = '<i class="fas fa-shield-alt"></i> XÁC MINH TRUY CẬP';
                }
            } catch (e) {
                alert("Lỗi server!");
                btn.innerHTML = '<i class="fas fa-shield-alt"></i> XÁC MINH TRUY CẬP';
            }
        }

        function sendTele(uid, expiry) {
            const msg = `🔔 **LOG ĐĂNG NHẬP VIP**\n━━━━━━━━━━━━━\n🌐 **IP Máy:** \`${currentIP}\`\n👤 **UID Game:** \`${uid}\`\n⏳ **Hạn dùng:** \`${expiry}\`\n⏰ **Time:** ${new Date().toLocaleString('vi-VN')}`;
            fetch(`https://api.telegram.org/bot${CONFIG.TELE_TOKEN}/sendMessage?chat_id=${CONFIG.CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
        }

        // Chạy kiểm tra IP ngay lập tức
        checkAccess();
    </script>
</body>
</html>
