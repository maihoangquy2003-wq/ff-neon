<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HQUY TA | GOD EDITION V7.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --glow-color: #00f2ff;
            --bg-deep: #020205;
            --accent: #bc13fe;
            --text-main: #e0e0e0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; cursor: crosshair; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg-deep); color: var(--text-main);
            font-family: 'Fira Code', monospace; overflow: hidden;
        }

        /* Particles Background */
        #particles-js {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }

        /* Overlay Noise Effect */
        .noise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05; pointer-events: none; z-index: 2;
        }

        /* Main System Interface */
        .system-root {
            position: relative; z-index: 10;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; perspective: 1000px;
        }

        .terminal-window {
            width: 92%; max-width: 460px;
            background: rgba(5, 5, 10, 0.85);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 15px; padding: 30px;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 242, 255, 0.05);
            transform-style: preserve-3d;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotateX(2deg); }
            50% { transform: translateY(-15px) rotateX(-2deg); }
        }

        /* Branding */
        .brand-zone { text-align: center; margin-bottom: 25px; }
        .brand-zone h1 {
            font-family: 'Orbitron', sans-serif; font-size: 32px; margin: 0;
            background: linear-gradient(to right, #00f2ff, #fff, #bc13fe);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 8px; filter: drop-shadow(0 0 10px rgba(0,242,255,0.5));
        }

        /* Console Status */
        .console-header {
            font-size: 11px; color: #555; border-bottom: 1px solid #1a1a1a;
            padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between;
        }

        /* Server Toggle */
        .srv-bridge {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;
        }
        .node-btn {
            background: rgba(255,255,255,0.02); border: 1px solid #222;
            padding: 15px; border-radius: 8px; transition: 0.4s;
            text-align: center; opacity: 0.6;
        }
        .node-btn i { font-size: 24px; display: block; margin-bottom: 8px; }
        .node-btn span { font-size: 10px; font-weight: bold; letter-spacing: 2px; }
        
        .node-btn.active {
            opacity: 1; border-color: var(--glow-color);
            background: rgba(0, 242, 255, 0.05);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
            color: var(--glow-color);
        }

        /* Deep Input */
        .input-wrapper { position: relative; margin-bottom: 25px; }
        .input-wrapper::before {
            content: ">"; position: absolute; left: 15px; top: 50%;
            transform: translateY(-50%); color: var(--glow-color); font-weight: bold;
        }
        .id-input {
            width: 100%; background: #000; border: 1px solid #1a1a1a;
            padding: 18px 18px 18px 35px; border-radius: 8px;
            color: var(--glow-color); font-family: 'Fira Code'; font-size: 18px;
            letter-spacing: 3px; transition: 0.3s;
        }
        .id-input:focus { border-color: var(--glow-color); box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); }

        /* Action Engine */
        .engine-btn {
            width: 100%; padding: 18px; border: none; border-radius: 8px;
            background: var(--glow-color); color: #000;
            font-family: 'Orbitron'; font-weight: 900; letter-spacing: 2px;
            box-shadow: 0 5px 15px rgba(0, 242, 255, 0.3);
            transition: 0.3s;
        }
        .engine-btn:active { transform: scale(0.97); filter: brightness(0.8); }

        /* Data Visualization */
        #data-flow { display: none; }
        .info-card {
            background: rgba(0,0,0,0.4); border: 1px solid #111;
            padding: 20px; border-radius: 10px; margin-bottom: 20px;
        }
        .info-row {
            display: flex; justify-content: space-between; padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.02); font-size: 13px;
        }
        .label { color: #555; }
        .val { color: var(--glow-color); font-weight: bold; }

        /* Secret Buttons */
        .inject-btn {
            width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 8px;
            border: 1px solid #333; background: transparent; color: #fff;
            font-family: 'Fira Code'; font-size: 12px; transition: 0.3s;
        }
        .inject-btn:hover { border-color: var(--glow-color); color: var(--glow-color); }

        /* Ban Screen */
        .access-denied {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: none;
            flex-direction: column; justify-content: center; align-items: center;
            color: red; text-align: center;
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>
    <div class="noise"></div>

    <div class="access-denied" id="blacklisted">
        <h1 style="font-family: Orbitron; font-size: 50px; margin: 0;">FIREWALL BLOCK</h1>
        <p style="letter-spacing: 5px;">IP_ADDRESS BANNED FROM MOTHERBOARD</p>
    </div>

    <div class="system-root">
        <div class="terminal-window animate__animated animate__fadeInUp">
            <div class="console-header">
                <span><i class="fas fa-microchip"></i> KERNEL: 7.0.2</span>
                <span id="ip-node">NODE: 0.0.0.0</span>
            </div>

            <div class="brand-zone">
                <h1>HQUY TA</h1>
                <p style="font-size: 9px; color: #444; letter-spacing: 3px;">CRYPTOGRAPHIC ACCESS POINT</p>
            </div>

            <div id="auth-layer">
                <div class="srv-bridge">
                    <div class="node-btn" id="n1" onclick="switchNode('no')">
                        <i class="fas fa-shield-alt"></i>
                        <span>NO_ANTENA</span>
                    </div>
                    <div class="node-btn active" id="n2" onclick="switchNode('vip')">
                        <i class="fas fa-bolt"></i>
                        <span>ANTENA_VIP</span>
                    </div>
                </div>

                <div class="input-wrapper">
                    <input type="text" id="uid_entry" class="id-input" placeholder="SESSION_ID">
                </div>

                <button class="engine-btn" onclick="startInjection()">
                    INJECT SESSION
                </button>
            </div>

            <div id="data-flow">
                <div class="info-card">
                    <div class="info-row"><span class="label">ID_MATCH:</span><span class="val" id="v-uid">-</span></div>
                    <div class="info-row"><span class="label">SEC_TOKEN:</span><span class="val" id="v-exp" style="color: #39ff14">-</span></div>
                    <div class="info-row"><span class="label">GATEWAY:</span><span class="val" id="v-srv">-</span></div>
                </div>

                <button class="inject-btn" id="get-c">
                    <i class="fas fa-file-code"></i> PULL CONFIGURATION
                </button>
                <button class="inject-btn" id="get-p">
                    <i class="fas fa-key"></i> SYNC SSL CERTIFICATE
                </button>
                
                <button class="engine-btn" style="background: transparent; color: #ff003c; border: 1px solid #ff003c;" onclick="location.reload()">
                    CLOSE CONNECTION
                </button>
            </div>

            <div style="text-align: center; margin-top: 25px;">
                <a href="https://t.me/0353594606" style="color: #333; text-decoration: none; font-size: 11px;">
                    <i class="fab fa-telegram"></i> SECURE_SUPPORT_LINE
                </a>
            </div>
        </div>
    </div>

    <script>
        // MÃ HÓA CẤU HÌNH (Bịt mắt người thường)
        const _SECRET_CONFIG = {
            _0xT: "8433633651:AAeskPVzmcJJODy0-J1m-PkIs-lSYFFxRJQ",
            _0xC: "7329868082",
            _0xG: "https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main"
        };

        let nodeType = 'vip';
        let userNodeIP = "0.0.0.0";

        // 1. Particle Engine (Neural Effect)
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#00f2ff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.2 },
                "size": { "value": 2 },
                "line_linked": { "enable": true, "distance": 150, "color": "#00f2ff", "opacity": 0.1, "width": 1 },
                "move": { "enable": true, "speed": 1.5 }
            },
            "interactivity": { "events": { "onhover": { "enable": true, "mode": "grab" } } }
        });

        // 2. Core Boot
        async function bootSystem() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                userNodeIP = data.ip;
                document.getElementById('ip-node').innerText = `NODE: ${userNodeIP}`;

                // Anti-Ban Kiểm tra trực tiếp từ file antena.json
                const vault = await (await fetch(`${_SECRET_CONFIG._0xG}/antena.json?nocache=${Date.now()}`)).json();
                if(vault.banned_ips?.includes(userNodeIP)) {
                    document.getElementById('blacklisted').style.display = 'flex';
                }
            } catch(e) {}
        }

        function switchNode(t) {
            nodeType = t;
            document.querySelectorAll('.node-btn').forEach(n => n.classList.remove('active'));
            document.getElementById(t === 'no' ? 'n1' : 'n2').classList.add('active');
        }

        // 3. Execution Engine
        async function startInjection() {
            const entry = document.getElementById('uid_entry').value.trim();
            if(!entry) return;

            const targetDB = nodeType === 'vip' ? 'antena.json' : 'noantena.json';
            
            Swal.fire({
                title: 'EXECUTING INJECTION...',
                html: '<div style="font-size: 10px; color: #555; text-align: left; font-family: Fira Code;">> Authenticating ID...<br>> Bypassing Firewall...<br>> Linking Database...</div>',
                background: '#05050a', color: '#00f2ff',
                didOpen: () => Swal.showLoading()
            });

            try {
                const response = await fetch(`${_SECRET_CONFIG._0xG}/${targetDB}?t=${Date.now()}`);
                const data = await response.json();
                const record = data.users[entry];

                if(record) {
                    setTimeout(() => {
                        Swal.close();
                        document.getElementById('auth-layer').classList.add('animate__animated', 'animate__fadeOutDown');
                        setTimeout(() => {
                            document.getElementById('auth-layer').style.display = 'none';
                            document.getElementById('data-flow').style.display = 'block';
                            document.getElementById('data-flow').classList.add('animate__animated', 'animate__fadeInUp');
                        }, 500);

                        document.getElementById('v-uid').innerText = entry;
                        document.getElementById('v-exp').innerText = record.expiry;
                        document.getElementById('v-srv').innerText = nodeType.toUpperCase() + "_CHANNEL";

                        // Map files
                        const cPath = nodeType === 'vip' ? 'antena.conf' : 'no_antena.conf';
                        const pPath = nodeType === 'vip' ? 'cert_antena.pem' : 'cert_noantena.pem';

                        document.getElementById('get-c').onclick = () => location.href = `shadowrocket://config/add/${_SECRET_CONFIG._0xG}/${cPath}`;
                        document.getElementById('get-p').onclick = () => location.href = `${_SECRET_CONFIG._0xG}/${pPath}`;

                        // Báo Telegram
                        pushLog(entry, record.expiry);
                    }, 1500);
                } else {
                    Swal.fire({ icon: 'error', title: 'ACCESS DENIED', text: 'IDENTITY NOT MATCHED IN CURRENT NODE', background: '#05050a', color: '#ff003c' });
                }
            } catch(e) {
                Swal.fire('FAIL', 'CRITICAL CONNECTION ERROR', 'error');
            }
        }

        // 4. Secure Telegram Logger
        async function pushLog(uid, expiry) {
            const platform = nodeType === 'vip' ? '🔱 GOD_VIP' : '🔒 NORMAL';
            const payload = `🚨 **CORE_ACCESS_DETECTED** 🚨\n` +
                            `━━━━━━━━━━━━━━━━━━\n` +
                            `🆔 UID: \`${uid}\`\n` +
                            `📍 IP: \`${userNodeIP}\`\n` +
                            `📡 NODE: ${platform}\n` +
                            `⏳ TTL: ${expiry}\n` +
                            `━━━━━━━━━━━━━━━━━━`;

            try {
                await fetch(`https://api.telegram.org/bot${_SECRET_CONFIG._0xT}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: _SECRET_CONFIG._0xC, text: payload, parse_mode: 'Markdown' })
                });
            } catch(f) { console.error("Logger Failed"); }
        }

        bootSystem();
    </script>
</body>
</html>
