<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQUY TA | NEON VIP SYSTEM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon: #00f2ff;
            --bg: #02060c;
            --antena-color: #ff0055;
            --no-antena-color: #39ff14;
            --gold: #ffae00;
        }
        * { box-sizing: border-box; }
        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        #canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }

        .container {
            width: 95%;
            max-width: 450px;
            background: rgba(5, 15, 25, 0.9);
            backdrop-filter: blur(15px);
            border: 2px solid var(--neon);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 26px; margin: 0; color: var(--neon); text-shadow: 0 0 10px var(--neon); font-weight: 900; }

        .section-title {
            font-size: 11px; color: var(--neon); font-weight: bold;
            display: flex; align-items: center; gap: 8px; margin: 20px 0 10px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .section-title::after { content: ""; flex: 1; height: 1px; background: rgba(0, 242, 255, 0.2); }

        input {
            width: 100%; padding: 15px; border-radius: 12px; margin-bottom: 15px;
            background: #000; border: 1px solid #1a2a3a;
            color: var(--neon); font-size: 16px; text-align: center; outline: none;
        }

        .btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            font-weight: 900; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary { background: linear-gradient(90deg, #0082ff, #00f2ff); color: white; }

        #vip_dashboard { display: none; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .config-selection {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 10px;
        }
        
        .config-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px 5px;
            text-align: center;
            transition: 0.3s;
        }
        .config-card:hover { border-color: var(--neon); background: rgba(0, 242, 255, 0.05); }

        .config-card i { font-size: 22px; margin-bottom: 8px; }
        .config-card h3 { font-size: 10px; margin: 5px 0 10px; line-height: 1.3; }
        
        .btn-dl {
            padding: 10px 5px; border-radius: 8px; font-size: 9px; font-weight: bold;
            text-decoration: none; display: block; margin-top: 5px;
            cursor: pointer;
        }

        .no-antena { color: var(--no-antena-color); }
        .btn-no-antena { border: 1px solid var(--no-antena-color); color: var(--no-antena-color); background: transparent; }

        .has-antena { color: var(--antena-color); }
        .btn-has-antena { border: 1px solid var(--antena-color); color: var(--antena-color); background: transparent; }

        .btn-cert { border: 1px dashed var(--gold); color: var(--gold); background: transparent; }

        .zalo-box { margin-top: 25px; text-align: center; font-size: 11px; color: #444; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="container">
        <div class="header">
            <h1>HQUY TA SYSTEM</h1>
            <p style="font-size: 10px; color: #555; letter-spacing: 2px;">V3.5 PREMIUM EDITION</p>
        </div>

        <div id="auth_section">
            <div class="section-title">KÍCH HOẠT THUÊ BAO</div>
            <input type="text" id="uid_input" placeholder="NHẬP UID VIP CỦA BẠN">
            <button class="btn btn-primary" onclick="checkUID()">TRUY CẬP HỆ THỐNG</button>
        </div>

        <div id="vip_dashboard">
            <div class="section-title">THÔNG TIN KHÁCH HÀNG</div>
            <div style="background: rgba(255,255,255,0.03); padding: 12px; border-radius: 10px; font-size: 12px; margin-bottom: 15px; text-align: center;">
                ID: <b id="show_id" style="color: var(--neon);"></b><br>
                HẠN DÙNG: <b id="show_expiry" style="color: var(--no-antena-color);"></b>
            </div>

            <div class="section-title">CHỌN SEVER ĐÃ MUA</div>
            <div class="config-selection">
                <div class="config-card">
                    <i class="fas fa-shield-check no-antena"></i>
                    <h3 class="no-antena">SEVER<br>NO ANTENA</h3>
                    <button onclick="downloadAction('noantena', 'cfg')" class="btn-dl btn-no-antena">CÀI CONFIG</button>
                    <button onclick="downloadAction('noantena', 'cert')" class="btn-dl btn-cert">TẢI CERT</button>
                </div>

                <div class="config-card">
                    <i class="fas fa-broadcast-tower has-antena"></i>
                    <h3 class="has-antena">SEVER<br>ANTENA VIP</h3>
                    <button onclick="downloadAction('antena', 'cfg')" class="btn-dl btn-has-antena">CÀI CONFIG</button>
                    <button onclick="downloadAction('antena', 'cert')" class="btn-dl btn-cert">TẢI CERT</button>
                </div>
            </div>
            <p style="font-size: 9px; color: #555; text-align: center;">*Vui lòng chọn đúng Sever ứng với gói ID bạn đã thanh toán.</p>
        </div>

        <div class="zalo-box">GIA HẠN: <a href="https://zalo.me/0353594606" style="color: var(--neon); text-decoration: none;">0353594606 (HQUY)</a></div>
    </div>

    <script>
        // Matrix background
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        const drops = new Array(Math.floor(canvas.width/20)).fill(1);
        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00f2ff'; ctx.font = '15px monospace';
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random()*2), i*20, y*20);
                if (y*20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 50);

        // Biến lưu trữ loại user sau khi login
        let currentUserType = ""; 
        const baseUrl = "https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main";

        async function checkUID() {
            const id = document.getElementById("uid_input").value;
            if(!id) return alert("Vui lòng nhập UID!");
            const ts = Date.now();

            try {
                const [resNo, resAt] = await Promise.all([
                    fetch(`${baseUrl}/noantena.json?t=${ts}`),
                    fetch(`${baseUrl}/antena.json?t=${ts}`)
                ]);
                const dataNo = await resNo.json();
                const dataAt = await resAt.json();

                let user = null;
                if (dataNo.users && dataNo.users[id]) {
                    user = dataNo.users[id];
                    currentUserType = "noantena";
                } else if (dataAt.users && dataAt.users[id]) {
                    user = dataAt.users[id];
                    currentUserType = "antena";
                }

                if (!user) return alert("UID KHÔNG TỒN TẠI!");
                if (new Date() > new Date(user.expiry)) return alert("UID HẾT HẠN!");

                document.getElementById("show_id").innerText = id;
                document.getElementById("show_expiry").innerText = user.expiry;
                document.getElementById("auth_section").style.display = "none";
                document.getElementById("vip_dashboard").style.display = "block";
                alert("Đăng nhập thành công!");
            } catch (e) { alert("Lỗi kết nối Server!"); }
        }

        function downloadAction(selectedType, fileType) {
            // Kiểm tra xem khách có chọn đúng sever mình mua không
            if (selectedType !== currentUserType) {
                alert("LỖI: UID của bạn không thuộc Sever này. Vui lòng chọn Sever còn lại!");
                return;
            }

            if (selectedType === 'noantena') {
                if (fileType === 'cfg') window.location.href = `shadowrocket://config/add/${baseUrl}/no_antena.conf`;
                else window.location.href = `${baseUrl}/cert_no_antena.pem`;
            } else {
                if (fileType === 'cfg') window.location.href = `shadowrocket://config/add/${baseUrl}/antena.conf`;
                else window.location.href = `${baseUrl}/cert_antena.pem`;
            }
        }
    </script>
</body>
</html>
