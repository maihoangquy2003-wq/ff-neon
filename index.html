<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQUY TA SEVER | PREMIUM SYSTEM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --bg-dark: #02060c;
            --card-bg: rgba(5, 12, 25, 0.9);
            --text-color: #e0faff;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            background: var(--bg-dark);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Nền hiệu ứng */
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        .container {
            width: 92%;
            max-width: 420px;
            background: var(--card-bg);
            border: 2px solid var(--neon-blue);
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.3), inset 0 0 15px rgba(0, 242, 255, 0.1);
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 10;
        }

        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { 
            font-size: 28px; margin: 0; color: var(--neon-blue); 
            text-shadow: 0 0 15px var(--neon-blue); font-weight: 900; 
            letter-spacing: 1.5px;
        }
        .header p { font-size: 10px; color: #507a80; text-transform: uppercase; letter-spacing: 4px; margin-top: 5px; }

        /* Bảng trạng thái hệ thống */
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .status-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 242, 255, 0.2);
            padding: 12px; border-radius: 12px; text-align: center;
        }
        .status-box span { display: block; font-size: 9px; color: #507a80; margin-bottom: 4px; }
        .status-box b { font-size: 12px; color: #39ff14; text-shadow: 0 0 8px #39ff14; }

        .section-title {
            font-size: 11px; color: var(--neon-blue); font-weight: bold;
            display: flex; align-items: center; gap: 8px; margin-bottom: 15px;
            text-transform: uppercase;
        }
        .section-title::after { content: ""; flex: 1; height: 1px; background: linear-gradient(90deg, var(--neon-blue), transparent); }

        /* Form nhập */
        .input-group { position: relative; margin-bottom: 20px; }
        input {
            width: 100%; padding: 16px; border-radius: 12px; background: #000;
            border: 1px solid #1a2a3a; color: var(--neon-blue); font-size: 18px;
            text-align: center; outline: none; transition: 0.3s;
            font-weight: bold; box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.05);
        }
        input:focus { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }

        .btn-main {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, #0082ff, #00f2ff);
            color: white; font-weight: 900; cursor: pointer;
            text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 4px 15px rgba(0, 130, 255, 0.4); transition: 0.3s;
        }
        .btn-main:active { transform: scale(0.98); }

        /* Bảng điều khiển VIP */
        #vip-panel { display: none; margin-top: 25px; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .info-card {
            background: rgba(0, 242, 255, 0.03); border: 1px dashed var(--neon-blue);
            padding: 15px; border-radius: 12px; margin-bottom: 15px;
        }
        .info-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; }
        .info-row span { color: #80a0a5; }
        .info-row b { color: var(--neon-blue); }

        .download-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-dl {
            padding: 12px; border-radius: 10px; text-decoration: none; font-size: 11px;
            font-weight: bold; text-align: center; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .btn-config { border: 1px solid #39ff14; color: #39ff14; }
        .btn-cert { border: 1px solid #ffae00; color: #ffae00; }
        .btn-dl:hover { background: rgba(255,255,255,0.1); }

        .footer { text-align: center; margin-top: 25px; font-size: 11px; color: #507a80; }
        .footer a { color: var(--neon-blue); text-decoration: none; font-weight: bold; }

        /* Thông báo lỗi xịn */
        .alert {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #ff004c; color: white; padding: 12px 25px; border-radius: 10px;
            font-weight: bold; z-index: 1000; display: none; box-shadow: 0 0 20px rgba(255,0,76,0.4);
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div id="custom-alert" class="alert"></div>

    <div class="container">
        <div class="header">
            <h1>HQUY TA SEVER</h1>
            <p>Premium Bypass System</p>
        </div>

        <div class="section-title"><i class="fas fa-microchip"></i> THÔNG TIN HỆ THỐNG</div>
        <div class="status-grid">
            <div class="status-box"><span>SERVER</span><b>STABLE (ONLINE)</b></div>
            <div class="status-box"><span>PHIÊN BẢN</span><b style="color:var(--neon-blue)">V3.5.0 ULTRA</b></div>
        </div>

        <div id="auth-form">
            <div class="section-title"><i class="fas fa-fingerprint"></i> KÍCH HOẠT THUÊ BAO</div>
            <div class="input-group">
                <input type="text" id="uid_input" placeholder="NHẬP MÃ UID VIP">
            </div>
            <button class="btn-main" onclick="verifyUID()">
                <i class="fas fa-shield-halved"></i> XÁC MINH UID SERVER
            </button>
        </div>

        <div id="vip-panel">
            <div class="section-title"><i class="fas fa-crown"></i> BẢNG ĐIỀU KHIỂN VIP</div>
            <div class="info-card">
                <div class="info-row"><span>ID NGƯỜI DÙNG:</span><b id="res-uid">---</b></div>
                <div class="info-row"><span>LOẠI GÓI:</span><b id="res-type">PREMIUM</b></div>
                <div class="info-row"><span>HẠN SỬ DỤNG:</span><b id="res-expiry" style="color:#39ff14">---</b></div>
            </div>
            <div class="download-grid">
                <a href="shadowrocket://config/add/https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main/config.conf" class="btn-dl btn-config">
                    <i class="fas fa-cloud-arrow-down"></i> CÀI CONFIG
                </a>
                <a href="https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main/hquysevervip.pem" class="btn-dl btn-cert">
                    <i class="fas fa-certificate"></i> TẢI CERT
                </a>
            </div>
        </div>

        <div class="footer">
            LIÊN HỆ TELE: <a href="https://t.me/0353594605">0353594605 (HQUY)</a>
        </div>
    </div>

    <script>
        // Hiệu ứng Matrix & Hoa Anh Đào
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        const sakuraImage = new Image();
        sakuraImage.src = 'https://www.pngmart.com/files/15/Falling-Sakura-Petals-PNG-Photos.png';

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const petals = [];
        for(let i = 0; i < 30; i++) {
            petals.push({
                x: Math.random() * width,
                y: Math.random() * height,
                s: Math.random() * 2 + 1,
                r: Math.random() * 10
            });
        }

        function draw() {
            ctx.fillStyle = 'rgba(2, 6, 12, 0.2)';
            ctx.fillRect(0, 0, width, height);
            
            // Vẽ cánh hoa
            petals.forEach(p => {
                p.y += p.s;
                p.x += Math.sin(p.y / 20);
                if(p.y > height) p.y = -20;
                
                ctx.beginPath();
                ctx.fillStyle = '#ffb7c5';
                ctx.arc(p.x, p.y, p.s * 2, 0, Math.PI * 2);
                ctx.fill();
            });

            requestAnimationFrame(draw);
        }
        draw();

        // Xử lý logic UID
        async function verifyUID() {
            const input = document.getElementById('uid_input').value.trim();
            const btn = document.querySelector('.btn-main');
            const alertBox = document.getElementById('custom-alert');

            if(!input) return showAlert("Vui lòng nhập UID!");

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ĐANG KIỂM TRA...';

            try {
                const response = await fetch('https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main/member.json');
                const data = await response.json();
                
                const user = data.users[input];

                if(!user) {
                    showAlert("UID KHÔNG TỒN TẠI TRÊN HỆ THỐNG!");
                } else if(user.status === "banned") {
                    showAlert("BẢN ID CỦA BẠN ĐÃ BỊ KHÓA!");
                } else {
                    const expiryDate = new Date(user.expiry);
                    const now = new Date();

                    if(now > expiryDate) {
                        showAlert("BẢN ID ĐÃ HẾT THỜI GIAN SỬ DỤNG!");
                    } else {
                        // Thành công
                        document.getElementById('auth-form').style.display = 'none';
                        document.getElementById('vip-panel').style.display = 'block';
                        document.getElementById('res-uid').innerText = input;
                        document.getElementById('res-type').innerText = user.type || "PREMIUM VIP";
                        document.getElementById('res-expiry').innerText = user.expiry;
                    }
                }
            } catch (error) {
                showAlert("LỖI KẾT NỐI SERVER!");
            }
            btn.innerHTML = '<i class="fas fa-shield-halved"></i> XÁC MINH UID SERVER';
        }

        function showAlert(msg) {
            const box = document.getElementById('custom-alert');
            box.innerText = msg;
            box.style.display = 'block';
            setTimeout(() => { box.style.display = 'none'; }, 3000);
        }
    </script>
</body>
</html>
