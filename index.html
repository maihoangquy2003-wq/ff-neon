<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOLITUDE PROXY | V8.0 NEON</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --neon: #00f2ff; 
            --pink: #ff00ff; 
            --dark-bg: #050508;
            --glass: rgba(10, 10, 15, 0.98);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            font-family: 'Rajdhani', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* Hiệu ứng hạt Neon nền */
        body::before {
            content: ""; position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.05), transparent 70%);
            z-index: -1;
        }

        .terminal { 
            width: 92%; 
            max-width: 420px; 
            background: var(--glass); 
            border: 1.5px solid #1a1a2e; 
            border-radius: 30px; 
            padding: 35px 25px; 
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,1), 0 0 20px rgba(0, 242, 255, 0.1);
            position: relative;
        }

        /* MOD CHỮ SOLITUDE SIÊU ĐẬM */
        .logo { 
            font-family: 'Orbitron'; 
            font-weight: 900; 
            font-size: 38px; 
            letter-spacing: 5px; 
            margin: 0;
            background: linear-gradient(180deg, #FFFFFF 15%, var(--neon) 50%, var(--pink) 90%);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.6));
        }

        .version { 
            font-family: 'Orbitron'; 
            font-size: 10px; 
            color: #444; 
            letter-spacing: 4px; 
            margin-bottom: 20px; 
            text-transform: uppercase;
        }

        /* Thanh IP Neon */
        .info-bar {
            background: rgba(0,0,0,0.5);
            border: 1px solid #111;
            border-radius: 50px;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            font-family: 'Orbitron';
            font-size: 8px;
            margin-bottom: 25px;
            color: var(--neon);
            box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.05);
        }

        .srv-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px; }

        .node { 
            background: #08080f; 
            border: 1.5px solid #151525; 
            padding: 18px 5px; 
            border-radius: 20px; 
            cursor: pointer; 
            transition: 0.3s; 
            text-align: center;
        }

        .node.active { 
            border-color: var(--neon); 
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); 
            background: rgba(0, 242, 255, 0.02);
        }

        .node span { 
            font-size: 7px; 
            font-weight: 900; 
            color: #222; 
            font-family: 'Orbitron'; 
            display: block;
            margin-top: 5px;
        }

        .node.active span { color: #fff; }
        .node i { font-size: 18px; color: #222; }
        .node.active i { color: var(--neon); text-shadow: 0 0 10px var(--neon); }

        .input-box { 
            width: 100%; 
            padding: 18px; 
            background: #000; 
            border: 1.5px solid #1a1a2e; 
            border-radius: 15px; 
            color: #fff; 
            margin-bottom: 12px; 
            font-family: 'Orbitron'; 
            text-align: center; 
            outline: none; 
            font-size: 13px;
            transition: 0.3s;
        }

        .input-box:focus { border-color: var(--neon); box-shadow: 0 0 15px rgba(0, 242, 255, 0.1); }

        .btn-main { 
            width: 100%; 
            padding: 18px; 
            border: none; 
            border-radius: 15px; 
            background: linear-gradient(90deg, var(--neon), var(--pink)); 
            color: #000; 
            font-weight: 900; 
            cursor: pointer; 
            text-transform: uppercase; 
            margin-bottom: 12px; 
            font-family: 'Orbitron'; 
            box-shadow: 0 10px 30px rgba(255, 0, 255, 0.3);
            transition: 0.3s;
        }

        .btn-main:active { transform: scale(0.98); }

        .func-grid { display: none; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }

        .btn-func { 
            padding: 15px 5px; 
            border-radius: 15px; 
            border: 1.5px solid var(--neon); 
            background: rgba(0, 242, 255, 0.05); 
            color: #fff; 
            font-size: 9px; 
            font-family: 'Orbitron'; 
            cursor: pointer; 
            text-decoration: none; 
            text-align: center; 
            font-weight: 900;
            transition: 0.3s;
        }

        .btn-func:hover { background: var(--neon); color: #000; }

        #ban-ui { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: none; flex-direction: column; justify-content: center; 
            align-items: center; text-align: center; 
        }

        .free-status-text { font-family: 'Orbitron'; font-size: 10px; margin-bottom: 15px; font-weight: 900; }

    </style>
</head>
<body oncontextmenu="return false;">

    <div id="ban-ui">
        <i class="fas fa-user-slash" style="font-size: 50px; color: #ff003c; margin-bottom: 20px; filter: drop-shadow(0 0 15px #ff003c);"></i>
        <h1 style="color: #ff003c; font-family: 'Orbitron'; letter-spacing: 5px;">ACCESS DENIED</h1>
        <p style="color: #444; font-size: 12px; margin-bottom: 30px;">HỆ THỐNG ĐÃ KHÓA IP CỦA BẠN.</p>
        <button onclick="location.href='https://t.me/lukajust'" class="btn-main" style="width: 250px;">LIÊN HỆ MỞ KHÓA</button>
    </div>

    <div class="terminal">
        <h1 class="logo">SOLITUDE</h1>
        <div class="version">NEON OVERDRIVE V8.0</div>

        <div class="info-bar">
            <span>IP: <span id="my-ip" style="color: #fff;">SCANNING...</span></span>
            <span>STATUS: <span style="color: #39ff14;">SECURED ●</span></span>
        </div>
        
        <div class="srv-grid">
            <div class="node active" onclick="switchSV('no', this)">
                <i class="fas fa-shield-halved"></i>
                <span>NO ANTENA</span>
            </div>
            <div class="node" onclick="switchSV('antena', this)">
                <i class="fas fa-bolt"></i>
                <span>ANTENA VIP</span>
            </div>
            <div class="node" onclick="switchSV('free', this)">
                <i class="fas fa-unlock"></i>
                <span>FREE SERVER</span>
            </div>
        </div>

        <div id="auth-layer">
            <button class="btn-main" style="background:none; border: 1.5px dashed var(--pink); color: var(--pink); box-shadow: none;" onclick="getInfo()">
                <i class="fas fa-fingerprint"></i> GET INFO & KEY
            </button>
            <input type="text" id="uid_in" class="input-box" placeholder="ENTER PLAYER UID">
            <input type="text" id="key_in" class="input-box" placeholder="ENTER SYSTEM KEY" style="border-color: var(--pink);">
            <button class="btn-main" onclick="verify()">VERIFY SYSTEM</button>
        </div>

        <div id="func-layer" class="func-grid">
            <a href="https://proxycuongcrack.io.vn/gen.php" target="_blank" class="btn-func">KÍCH HOẠT KEY</a>
            <a href="https://t.me/lukajust" target="_blank" class="btn-func">LẤY KEY KÍCH</a>
            <a id="link_cfg" href="#" class="btn-func">TẢI FILE CFG</a>
            <a id="link_cert" href="#" class="btn-func">TẢI FILE CERT</a>
        </div>

        <div id="free-layer" style="display:none; text-align: center;">
            <p id="free-status" class="free-status-text"></p>
            <button id="btn-free" class="btn-main" onclick="location.href='https://snote.vip/notes/LY66K7'" style="display:none;">
                <i class="fas fa-globe"></i> PROXY SEVER FREE
            </button>
        </div>
    </div>

    <script>
        // HIỆN IP MÁY
        fetch('https://api.ipify.org?format=json')
            .then(r => r.json())
            .then(d => document.getElementById('my-ip').innerText = d.ip)
            .catch(() => document.getElementById('my-ip').innerText = "127.0.0.1");

        // CHỐNG F12
        document.onkeydown = function(e) { 
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) || (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) return false; 
        };

        let currentSV = 'no';

        async function switchSV(sv, el) {
            currentSV = sv;
            document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('auth-layer').style.display = (sv === 'free') ? 'none' : 'block';
            document.getElementById('func-layer').style.display = 'none';
            document.getElementById('free-layer').style.display = (sv === 'free') ? 'block' : 'none';

            if (sv === 'free') {
                const r = await fetch('api.php', {method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:'action=check_free'});
                const d = await r.json();
                const statusTxt = document.getElementById('free-status');
                if (d.status === 'on') {
                    statusTxt.innerText = "SERVER ONLINE";
                    statusTxt.style.color = "#39ff14";
                    document.getElementById('btn-free').style.display = 'block';
                } else {
                    statusTxt.innerText = "SERVER FREE ĐÃ ĐÓNG";
                    statusTxt.style.color = "#ff003c";
                    document.getElementById('btn-free').style.display = 'none';
                }
            }
        }

        async function getInfo() {
            const uid = document.getElementById('uid_in').value;
            if (!uid) return Swal.fire({text: 'Vui lòng nhập UID!', icon: 'warning', background: '#0a0a0f', color: '#fff'});
            const r = await fetch('api.php', {method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:`action=get_info&uid=${uid}&sv=${currentSV}`});
            const d = await r.json();
            if (d.status === 'banned') return showBan();
            if (d.status === 'success') Swal.fire({title: 'KEY: ' + d.key, text: 'Gửi key này cho Admin và chờ duyệt ON!', icon: 'success', background: '#0a0a0f', color: '#fff'});
        }

        async function verify() {
            const uid = document.getElementById('uid_in').value;
            const key = document.getElementById('key_in').value;
            const r = await fetch('api.php', {method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:`action=verify&uid=${uid}&key=${key}&sv=${currentSV}`});
            const d = await r.json();

            if (d.status === 'banned') return showBan();
            if (d.status === 'success') {
                document.getElementById('auth-layer').style.display = 'none';
                document.getElementById('func-layer').style.display = 'grid';
                const cfg = (currentSV === 'no') ? 'NO_ANTENA.CONF' : 'ANTENA.CONF';
                const cert = (currentSV === 'no') ? 'NO_ANTEAN.cert' : 'ANTEAN.cert';
                
                document.getElementById('link_cfg').href = `shadowrocket://add/https://${window.location.host}/${cfg}`;
                document.getElementById('link_cert').onclick = () => { location.href = cert; };
                Swal.fire({title: 'XÁC MINH XONG!', icon: 'success', background: '#0a0a0f', color: '#fff'});
            } else { 
                Swal.fire({text: d.msg, icon: 'error', background: '#0a0a0f', color: '#fff'}); 
            }
        }

        function showBan() { document.getElementById('ban-ui').style.display = 'flex'; }
    </script>
</body>
</html>
