<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOLITUDE PROXY | NEON ULTIMATE V8.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { 
            --neon-blue: #00f2ff; --neon-pink: #ff00ff; --neon-purple: #bc13fe; 
            --neon-green: #39ff14; --neon-red: #ff003c; --bg-dark: #050505; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-dark); color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; }
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .bg-gradient { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.1), transparent 70%); z-index: 2; pointer-events: none; }
        
        .system-root { position: relative; z-index: 10; display: flex; justify-content: center; align-items: center; height: 100vh; padding: 15px; }
        
        /* Cửa sổ Terminal với hiệu ứng Neon rực rỡ */
        .terminal-window { 
            width: 100%; max-width: 440px; background: rgba(10, 10, 15, 0.95); 
            border-radius: 25px; padding: 30px 20px; position: relative; 
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3), inset 0 0 15px rgba(0, 242, 255, 0.1); 
        }

        .brand-zone h1 { 
            font-family: 'Orbitron', sans-serif; font-size: 30px; margin: 0; 
            background: linear-gradient(90deg, var(--neon-blue), #fff, var(--neon-purple)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            text-align: center; letter-spacing: 5px; filter: drop-shadow(0 0 12px var(--neon-blue));
        }

        /* 3 Server Bố cục đẹp */
        .srv-bridge { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 20px 0; }
        .node-btn { 
            background: rgba(255, 255, 255, 0.02); border: 1px solid #333; 
            padding: 15px 5px; border-radius: 12px; cursor: pointer; 
            transition: 0.3s; text-align: center; color: #555;
        }
        .node-btn i { font-size: 20px; margin-bottom: 5px; display: block; }
        .node-btn span { font-size: 9px; font-weight: bold; font-family: 'Orbitron'; }
        
        /* Hiệu ứng Active cho từng server */
        .node-btn.active[data-type="aim"] { border-color: var(--neon-green); color: var(--neon-green); box-shadow: 0 0 15px var(--neon-green); }
        .node-btn.active[data-type="no"] { border-color: var(--neon-purple); color: var(--neon-purple); box-shadow: 0 0 15px var(--neon-purple); }
        .node-btn.active[data-type="antena"] { border-color: var(--neon-blue); color: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); }
        .node-btn.active[data-type="free"] { border-color: var(--neon-pink); color: var(--neon-pink); box-shadow: 0 0 15px var(--neon-pink); }

        .id-input { 
            width: 100%; background: rgba(0,0,0,0.8); border: 2px solid #333; 
            padding: 18px; border-radius: 12px; color: #fff; font-family: 'Orbitron'; 
            font-size: 18px; text-align: center; margin-bottom: 12px; transition: 0.3s;
        }
        .id-input:focus { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }

        .engine-btn { 
            width: 100%; padding: 18px; border: none; border-radius: 12px; 
            font-family: 'Orbitron'; font-weight: 900; cursor: pointer; 
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple)); 
            color: #000; text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 5px 20px rgba(0, 242, 255, 0.4);
        }

        .ua-btn { 
            width: 100%; padding: 12px; background: rgba(255, 0, 255, 0.05);
            border: 1px dashed var(--neon-pink); border-radius: 10px; 
            font-family: 'Orbitron'; font-size: 10px; cursor: pointer; 
            color: var(--neon-pink); margin-bottom: 15px; box-shadow: 0 0 10px rgba(255, 0, 255, 0.1);
        }

        /* Dashboard & Get Button Neon */
        #get-uid-container { display: none; margin-top: 15px; } 
        .btn-get-neon {
            background: linear-gradient(90deg, #39ff14, #00f2ff);
            color: #000; font-weight: 900; box-shadow: 0 0 25px rgba(57, 255, 20, 0.5);
        }

        .ban-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .ban-screen h1 { font-family: 'Orbitron'; color: var(--neon-red); text-shadow: 0 0 20px var(--neon-red); }

        .support-btn {
            display: block; width: 100%; text-align: center; margin-top: 20px; 
            color: #444; text-decoration: none; font-size: 11px; font-family: 'Orbitron';
            padding: 10px; border: 1px solid #222; border-radius: 10px; transition: 0.3s;
        }
        .support-btn:hover { color: var(--neon-blue); border-color: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }
    </style>
</head>
<body>

    <div id="particles-js"></div>
    <div class="bg-gradient"></div>

    <div class="ban-screen" id="ban-ui">
        <i class="fas fa-user-slash" style="font-size: 80px; color: var(--neon-red); margin-bottom: 20px; filter: drop-shadow(0 0 15px var(--neon-red));"></i>
        <h1>ACCESS DENIED</h1>
        <p id="ban-info" style="color: #888; margin: 15px 0;"></p>
        <button onclick="requestUnban()" style="padding: 15px 30px; background: none; border: 2px solid var(--neon-red); color: var(--neon-red); font-family: 'Orbitron'; cursor: pointer; border-radius: 12px; box-shadow: 0 0 15px var(--neon-red);">GỠ BAN (30K)</button>
    </div>

    <div class="system-root">
        <div class="terminal-window">
            <div class="brand-zone">
                <h1>SOLITUDE PROXY</h1>
                <p style="text-align: center; font-size: 10px; color: #444; letter-spacing: 3px; margin: 5px 0;">NEON OVERDRIVE V8.0</p>
            </div>

            <div style="display: flex; justify-content: space-between; font-size: 11px; color: #555; margin: 15px 0; border-bottom: 1px solid #111; padding-bottom: 10px;">
                <span>IP: <span id="ip-node" style="color: var(--neon-blue);">SCANNING...</span></span>
                <span>SYSTEM: <span style="color: var(--neon-green);">ONLINE</span></span>
            </div>

            <div class="srv-bridge">
                <div class="node-btn active" onclick="switchSV('no', this)" data-type="no">
                    <i class="fas fa-shield-halved"></i><span>NO ANTENA</span>
                </div>
                <div class="node-btn" onclick="switchSV('antena', this)" data-type="antena">
                    <i class="fas fa-bolt-lightning"></i><span>ANTENA VIP</span>
                </div>
                <div class="node-btn" onclick="switchSV('free', this)" data-type="free">
                    <i class="fas fa-unlock"></i><span>FREE SERVER</span>
                </div>
            </div>

            <div id="login-layer">
                <button class="ua-btn" onclick="generateKey()">
                    <i class="fas fa-fingerprint"></i> GET INFO & KEY GENERATOR
                </button>

                <input type="text" id="key_entry" class="id-input" placeholder="ENTER SYSTEM KEY" style="border-color: var(--neon-purple); font-size: 13px;">
                <input type="text" id="uid_entry" class="id-input" placeholder="ENTER UID PLAYER">
                
                <button class="engine-btn" id="verify-btn" onclick="verifyAccess()">VERIFY SYSTEM</button>
            </div>

            <div id="get-uid-container">
                <div style="text-align: center; margin-bottom: 15px; color: var(--neon-green); font-family: 'Orbitron'; font-size: 12px; text-shadow: 0 0 5px var(--neon-green);">
                    <i class="fas fa-check-circle"></i> ACCESS GRANTED
                </div>
                <button class="engine-btn btn-get-neon" id="final-get-btn" onclick="getFinalUID()">GET UID & CONFIG</button>
                <button onclick="location.reload()" style="width:100%; background:none; border:none; color:#444; margin-top:15px; cursor:pointer; font-size:10px; font-family:'Orbitron';">LOGOUT SESSION</button>
            </div>

            <a href="https://t.me/0353594606" class="support-btn">
                <i class="fab fa-telegram"></i> JOIN SUPPORT GROUP
            </a>
        </div>
    </div>

    <script>
        const _CFG = {
            t: "8626643586:AAET1UUTKaGzDCit47o3UMAYKHdyGQLKSN0",
            c: "7329868082",
            correct_key: "SOLITUDE-PRO", 
            free_status: "open" 
        };

        let currentSV = 'no';
        let userIP = '';

        async function getIP() {
            try {
                const r = await fetch('https://api.ipify.org?format=json');
                const d = await r.json(); userIP = d.ip;
                document.getElementById('ip-node').innerText = userIP;
                if(localStorage.getItem('DEVICE_BANNED')) showBanUI("SECURITY VIOLATION");
            } catch(e) { document.getElementById('ip-node').innerText = "ERROR"; }
        }

        function switchSV(type, el) {
            currentSV = type;
            document.querySelectorAll('.node-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');

            const keyInput = document.getElementById('key_entry');
            const verifyBtn = document.getElementById('verify-btn');
            const getContainer = document.getElementById('get-uid-container');
            const loginLayer = document.getElementById('login-layer');

            if (type === 'free') {
                if (_CFG.free_status === "closed") {
                    Swal.fire({ icon: 'error', title: 'SERVER CLOSED', text: 'Server Free đã đóng!', background: '#0a0a0f', color: '#fff' });
                    return;
                }
                // Server Free: Hiện luôn nút Get UID
                keyInput.style.display = 'none';
                loginLayer.style.display = 'none';
                getContainer.style.display = 'block';
            } else {
                // Server trả phí: Ẩn nút Get UID, hiện ô nhập key
                keyInput.style.display = 'block';
                loginLayer.style.display = 'block';
                getContainer.style.display = 'none';
            }
        }

        function generateKey() {
            const uid = document.getElementById('uid_entry').value || "N/A";
            const autoKey = "SLT-" + Math.floor(1000 + Math.random() * 9000);
            const time = new Date().toLocaleString();
            
            // Layout gửi Tele (Yêu cầu 4)
            const msg = `🔍 **SOLITUDE INFO REQUEST**\n` +
                        `━━━━━━━━━━━━━━━━━━\n` +
                        `🆔 UID: \`${uid}\`\n` +
                        `🌐 IP: \`${userIP}\`\n` +
                        `🔑 KEY: \`${autoKey}\`\n` +
                        `⏰ TIME: \`${time}\`\n` +
                        `━━━━━━━━━━━━━━━━━━\n` +
                        `[THIẾT LẬP LỆNH: /ADD ${uid} 1]`; // Mặc định 1 ngày

            sendTeleWithButtons(msg, [
                [{ text: "✅ DUYỆT UID", callback_data: `approve_${uid}` }, { text: "❌ BAN IP", callback_data: `ban_${userIP}` }],
                [{ text: "🔓 MỞ SERVER FREE", callback_data: "free_on" }, { text: "🔒 ĐÓNG SERVER FREE", callback_data: "free_off" }]
            ]);
            
            Swal.fire({ title: 'SENT!', text: 'Yêu cầu đã gửi về Telegram. Vui lòng chờ Admin duyệt!', icon: 'success', background: '#0a0a0f', color: '#fff' });
        }

        async function verifyAccess() {
            const uid = document.getElementById('uid_entry').value.trim();
            const key = document.getElementById('key_entry').value.trim();
            if (!uid || !key) {
                Swal.fire({ icon: 'warning', title: 'THIẾU THÔNG TIN', text: 'Vui lòng nhập UID và Key!', background: '#0a0a0f', color: '#fff' });
                return;
            }

            if (key !== _CFG.correct_key) {
                autoBan(uid, "SAI KEY/MƯỢN UID TRÁI PHÉP"); 
                return;
            }

            // Verify thành công mới mở nút Get cho server trả phí
            document.getElementById('login-layer').style.display = 'none';
            document.getElementById('get-uid-container').style.display = 'block';
            
            const successMsg = `🌟 **THÊM UID THÀNH CÔNG**\n` +
                             `━━━━━━━━━━━━━━━━━━\n` +
                             `🆔 UID: \`${uid}\`\n` +
                             `🌐 IP: \`${userIP}\`\n` +
                             `🔑 KEY: \`${key}\`\n` +
                             `⏳ HẠN SỬ DỤNG: 1 NGÀY\n` +
                             `━━━━━━━━━━━━━━━━━━`;
            sendTele(successMsg);
        }

        function autoBan(uid, reason) {
            localStorage.setItem('DEVICE_BANNED', 'true');
            const alertMsg = `🚫 **AUTO BAN VIOLATION**\n━━━━━━━━━━━━━━━━━━\n🆔 UID: \`${uid}\`\n🌐 IP: \`${userIP}\`\n⚠️ LÝ DO: \`${reason}\`\n━━━━━━━━━━━━━━━━━━`;
            sendTele(alertMsg);
            showBanUI(reason);
        }

        function showBanUI(reason) {
            document.getElementById('ban-ui').style.display = 'flex';
            document.getElementById('ban-info').innerText = `Lý do: ${reason}\nThiết bị của bạn đã bị khóa hệ thống.`;
        }

        function requestUnban() {
            const uid = document.getElementById('uid_entry').value || "Unknown";
            sendTele(`🆘 **UNBAN REQUEST**\nUID: \`${uid}\`\nIP: \`${userIP}\``);
            Swal.fire({ title: 'ĐÃ GỬI!', text: 'Yêu cầu gỡ ban đã gửi tới Admin.', icon: 'info', background: '#0a0a0f', color: '#fff' });
        }

        function sendTele(text) {
            fetch(`https://api.telegram.org/bot${_CFG.t}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: _CFG.c, text: text, parse_mode: 'Markdown' })
            });
        }

        function sendTeleWithButtons(text, buttons) {
            fetch(`https://api.telegram.org/bot${_CFG.t}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    chat_id: _CFG.c, 
                    text: text, 
                    parse_mode: 'Markdown',
                    reply_markup: { inline_keyboard: buttons }
                })
            });
        }

        function getFinalUID() {
            Swal.fire({ title: 'SUCCESS', text: 'Đang tải cấu hình Solitude...', icon: 'success', timer: 2000, showConfirmButton: false, background: '#0a0a0f', color: '#fff' });
        }

        particlesJS("particles-js", { "particles": { "number": { "value": 60 }, "color": { "value": "#00f2ff" }, "shape": { "type": "circle" }, "opacity": { "value": 0.2 }, "size": { "value": 2 }, "line_linked": { "enable": true, "distance": 150, "color": "#00f2ff", "opacity": 0.1, "width": 1 }, "move": { "enable": true, "speed": 1 } } });
        getIP();
    </script>
</body>
</html>
