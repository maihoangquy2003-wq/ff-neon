<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HQUY TA PREMIUM SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #bc13fe;
            --danger: #ff003c;
            --success: #39ff14;
            --warning: #ffae00;
            --bg: #02050a;
            --card-bg: rgba(10, 20, 40, 0.85);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Hiệu ứng Matrix Background */
        #matrix-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.15;
        }

        .main-card {
            width: 92%; max-width: 460px;
            background: var(--card-bg);
            border-radius: 40px;
            border: 2px solid rgba(0, 242, 255, 0.2);
            padding: 35px 25px;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.1), inset 0 0 20px rgba(255, 255, 255, 0.05);
            text-align: center;
            position: relative;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .logo-area h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px; font-weight: 900; margin: 0;
            background: linear-gradient(to right, var(--primary), #fff, var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; letter-spacing: 4px;
            filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.5));
        }

        .ip-badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(0,0,0,0.6); padding: 8px 18px; border-radius: 50px;
            border: 1px solid var(--primary); color: var(--primary);
            font-weight: bold; font-size: 14px; margin: 20px 0;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        /* Server Selector */
        .server-title { text-align: left; font-size: 11px; color: #666; margin: 10px 0 10px 15px; letter-spacing: 2px; }
        .server-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        
        .srv-option {
            background: rgba(255,255,255,0.03); border: 2px solid #1a2a3a;
            padding: 20px 10px; border-radius: 25px; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .srv-option i { font-size: 24px; color: #444; margin-bottom: 8px; display: block; }
        .srv-option span { font-weight: 700; font-size: 13px; color: #666; }

        .srv-option.active {
            border-color: var(--danger); background: rgba(255, 0, 60, 0.1);
            transform: scale(1.05); box-shadow: 0 8px 20px rgba(255, 0, 60, 0.2);
        }
        .srv-option.active i { color: var(--danger); filter: drop-shadow(0 0 5px var(--danger)); }
        .srv-option.active span { color: #fff; }

        /* Input UID */
        .input-group { position: relative; margin-bottom: 20px; }
        .uid-input {
            width: 100%; padding: 22px; background: #000;
            border: 1px solid #1a2a3a; border-radius: 25px;
            color: var(--primary); font-family: 'Orbitron', sans-serif;
            font-size: 18px; text-align: center; letter-spacing: 3px;
            transition: 0.3s;
        }
        .uid-input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }

        .btn-main {
            width: 100%; padding: 18px; border-radius: 25px; border: none;
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 16px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: 0.4s; text-transform: uppercase;
        }
        .btn-verify { background: linear-gradient(135deg, var(--primary), #00a2ff); color: #000; }
        .btn-verify:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 242, 255, 0.4); }

        /* Result Area (Hidden initially) */
        #result-panel { display: none; margin-top: 30px; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .info-table {
            background: rgba(0,0,0,0.4); padding: 20px; border-radius: 25px;
            border: 1px dashed rgba(255,255,255,0.1); margin-bottom: 20px;
        }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .info-row span { color: #888; font-size: 14px; }
        .info-row b { color: var(--primary); font-size: 15px; }

        .btn-cfg { background: var(--success); color: #000; margin-bottom: 15px; }
        .btn-cert { background: var(--warning); color: #000; }

        /* Band Overlay */
        .band-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: none;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .band-screen i { font-size: 80px; color: var(--danger); margin-bottom: 20px; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>

    <div class="band-screen" id="band-ui">
        <i class="fas fa-user-slash"></i>
        <h1 style="color: var(--danger); letter-spacing: 5px;">ACCESS DENIED</h1>
        <p style="color: #444;">IP CỦA BẠN ĐÃ BỊ CHẶN KHỎI HỆ THỐNG</p>
    </div>

    <div class="main-card" id="app-ui">
        <div class="logo-area">
            <h1>HQUY TA</h1>
            <p style="font-size: 10px; color: #444; letter-spacing: 3px; margin-top: 5px;">PREMIUM V3.5 SYSTEM</p>
        </div>

        <div class="ip-badge">
            <i class="fas fa-network-wired"></i>
            IP: <span id="user-ip">Đang quét...</span>
        </div>

        <div id="auth-form">
            <div class="server-title">CHỌN MÁY CHỦ BẠN ĐÃ MUA:</div>
            <div class="server-grid">
                <div class="srv-option" id="srv-no" onclick="selectSrv('no')">
                    <i class="fas fa-shield-alt"></i>
                    <span>NO ANTENA</span>
                </div>
                <div class="srv-option active" id="srv-vip" onclick="selectSrv('vip')">
                    <i class="fas fa-satellite-dish"></i>
                    <span>ANTENA VIP</span>
                </div>
            </div>

            <div class="input-group">
                <input type="text" id="uid_field" class="uid-input" placeholder="NHẬP MÃ UID VIP">
            </div>

            <button class="btn-main btn-verify" onclick="handleVerify()">
                <i class="fas fa-fingerprint"></i> XÁC MINH TRUY CẬP
            </button>
        </div>

        <div id="result-panel">
            <div class="info-table">
                <div class="info-row"><span>UID KHÁCH:</span><b id="res-uid">-</b></div>
                <div class="info-row"><span>HẠN SỬ DỤNG:</span><b id="res-exp" style="color: var(--success)">-</b></div>
                <div class="info-row"><span>LOẠI SEVER:</span><b id="res-srv">-</b></div>
            </div>

            <button class="btn-main btn-cfg" id="dl-config">
                <i class="fas fa-cloud-download-alt"></i> CÀI CONFIG NGAY
            </button>
            <button class="btn-main btn-cert" id="dl-cert">
                <i class="fas fa-file-contract"></i> CÀI FILE CERT (SSL)
            </button>
        </div>

        <div style="margin-top: 30px;">
            <a href="https://t.me/0353594606" style="text-decoration: none; color: #555; font-size: 12px; font-weight: bold;">
                <i class="fab fa-telegram"></i> HỖ TRỢ: 0353594606
            </a>
        </div>
    </div>

    <script>
        const CONFIG = {
            BOT_TOKEN: "8433633651:AAeskPVzmcJJODy0-J1m-PkIs-lSYFFxRJQ",
            CHAT_ID: "7329868082",
            GITHUB_REPO: "https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main"
        };

        let currentType = 'vip';
        let clientIP = "";

        // Khởi tạo hiệu ứng Matrix & Kiểm tra IP
        async function init() {
            startMatrix();
            try {
                const r = await fetch('https://api.ipify.org?format=json');
                const d = await r.json();
                clientIP = d.ip;
                document.getElementById('user-ip').innerText = clientIP;

                // Kiểm tra band IP từ file antena.json (File chính quản lý IP)
                const db = await (await fetch(`${CONFIG.GITHUB_REPO}/antena.json?t=${Date.now()}`)).json();
                if(db.banned_ips?.includes(clientIP)) {
                    document.getElementById('band-ui').style.display = 'flex';
                    document.getElementById('app-ui').style.display = 'none';
                }
            } catch(e) { console.log("Network error"); }
        }

        function selectSrv(type) {
            currentType = type;
            document.querySelectorAll('.srv-option').forEach(el => el.classList.remove('active'));
            document.getElementById(type === 'no' ? 'srv-no' : 'srv-vip').classList.add('active');
        }

        async function handleVerify() {
            const uid = document.getElementById('uid_field').value.trim();
            if(!uid) return alert("VUI LÒNG NHẬP UID!");

            // XÁC ĐỊNH FILE JSON TƯƠNG ỨNG
            const fileName = currentType === 'vip' ? 'antena.json' : 'noantena.json';

            try {
                const response = await fetch(`${CONFIG.GITHUB_REPO}/${fileName}?t=${Date.now()}`);
                if(!response.ok) throw new Error();
                
                const data = await response.json();
                const user = data.users[uid];

                if(user) {
                    // XÁC MINH THÀNH CÔNG
                    document.getElementById('auth-form').style.display = 'none';
                    document.getElementById('result-panel').style.display = 'block';

                    document.getElementById('res-uid').innerText = uid;
                    document.getElementById('res-exp').innerText = user.expiry;
                    document.getElementById('res-srv').innerText = currentType === 'vip' ? 'ANTENA VIP' : 'NO ANTENA';

                    // Gán link tải file RIÊNG BIỆT
                    const cfgFile = currentType === 'vip' ? 'antena.conf' : 'no_antena.conf';
                    const certFile = currentType === 'vip' ? 'cert_antena.pem' : 'cert_noantena.pem'; // Bạn sẽ tạo sau

                    document.getElementById('dl-config').onclick = () => window.location.href = `shadowrocket://config/add/${CONFIG.GITHUB_REPO}/${cfgFile}`;
                    document.getElementById('dl-cert').onclick = () => window.location.href = `${CONFIG.GITHUB_REPO}/${certFile}`;

                    sendToTele(uid, user.expiry);
                } else {
                    alert("UID KHÔNG CÓ QUYỀN TRUY CẬP MÁY CHỦ NÀY!");
                }
            } catch(e) {
                alert("LỖI KẾT NỐI SERVER: " + fileName.toUpperCase());
            }
        }

        async function sendToTele(uid, exp) {
            const srvName = currentType === 'vip' ? '💎 ANTENA VIP' : '🛡️ NO ANTENA';
            const message = `🚀 **KHÁCH LOGIN THÀNH CÔNG**\n` +
                          `━━━━━━━━━━━━━━━━━━\n` +
                          `👤 UID: \`${uid}\`\n` +
                          `🌐 IP: \`${clientIP}\`\n` +
                          `📡 SEVER: \`${srvName}\`\n` +
                          `⏳ HẠN: \`${exp}\`\n` +
                          `━━━━━━━━━━━━━━━━━━`;

            await fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CONFIG.CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            });
        }

        // Hiệu ứng Matrix
        function startMatrix() {
            const canvas = document.getElementById('matrix-bg');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const letters = "0101010101010101";
            const fontSize = 10;
            const columns = canvas.width / fontSize;
            const drops = Array(Math.floor(columns)).fill(1);
            function draw() {
                ctx.fillStyle = "rgba(2, 5, 10, 0.05)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#00f2ff";
                ctx.font = fontSize + "px monospace";
                drops.forEach((y, i) => {
                    const text = letters[Math.floor(Math.random() * letters.length)];
                    ctx.fillText(text, i * fontSize, y * fontSize);
                    if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                });
            }
            setInterval(draw, 33);
        }

        init();
    </script>
</body>
</html>
