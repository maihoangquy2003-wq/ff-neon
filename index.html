<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQUY AIM SERVER VIP</title>
    <style>
        :root { --neon-color: #00f2ff; --bg-color: #0b0e14; }
        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        /* Khung viền Neon giống ảnh của bạn */
        .panel {
            width: 90%;
            max-width: 400px;
            background: #0f1219;
            border: 2px solid var(--neon-color);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2), inset 0 0 15px rgba(0, 242, 255, 0.1);
            position: relative;
        }
        h1 {
            color: var(--neon-color);
            font-size: 24px;
            text-shadow: 0 0 10px var(--neon-color);
            margin-bottom: 5px;
        }
        .status {
            color: #39ff14;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 15px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
            font-size: 16px;
            text-align: center;
            margin-bottom: 15px;
        }
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 16px;
            margin-bottom: 10px;
        }
        /* Nút Kiểm tra xanh dương */
        .btn-check {
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
        }
        /* Nút Tải xanh lá */
        .btn-download {
            background: #44a644;
            color: white;
            display: none; /* Ẩn mặc định */
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(68, 166, 68, 0.4);
        }
        #info_display {
            margin: 15px 0;
            padding: 10px;
            border-radius: 8px;
            background: rgba(0, 242, 255, 0.05);
            border: 1px dashed var(--neon-color);
            display: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="panel">
    <h1>HQUY AIM SERVER VIP</h1>
    <div class="status">● SYSTEM ONLINE</div>
    
    <input type="text" id="uid_input" placeholder="NHẬP UID ĐỂ SỬ DỤNG">
    
    <button class="btn-check" onclick="checkUID()">KIỂM TRA ID SERVER</button>

    <div id="info_display"></div>

    <a id="link_download" href="shadowrocket://config/add/https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main/config.conf">
        <button class="btn-download" id="download_btn">CÀI CẤU HÌNH SHADOW (1 CHẠM)</button>
    </a>
</div>

<script>
    async function checkUID() {
        const inputID = document.getElementById("uid_input").value;
        const btnDownload = document.getElementById("download_btn");
        const info = document.getElementById("info_display");

        if(!inputID) { alert("Vui lòng nhập UID!"); return; }

        try {
            // Lấy dữ liệu từ file member.json trên GitHub của bạn
            const response = await fetch('https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main/member.json?t=' + Date.now());
            const data = await response.json();
            const user = data.users[inputID];

            if (!user) {
                alert("ID không tồn tại trên hệ thống!");
                btnDownload.style.display = "none";
                info.style.display = "none";
                return;
            }

            if (user.status === "banned") {
                alert("ID này đã bị khóa!");
                return;
            }

            const now = new Date();
            const expiry = new Date(user.expiry);

            if (now > expiry) {
                alert("ID đã hết hạn sử dụng!");
                info.style.display = "block";
                info.innerHTML = "<span style='color:red'>Hết hạn: " + user.expiry + "</span>";
                btnDownload.style.display = "none";
            } else {
                alert("Xác nhận thành công!");
                info.style.display = "block";
                info.innerHTML = "✅ UID: " + inputID + "<br>✅ TRẠNG THÁI: HỢP LỆ<br>⏳ Hạn dùng: " + user.expiry;
                btnDownload.style.display = "block";
            }
        } catch (e) {
            alert("Lỗi kết nối server hoặc file member.json sai định dạng!");
        }
    }
</script>

</body>
</html>
