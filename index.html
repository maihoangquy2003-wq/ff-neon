<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQUY TA SYSTEM | V3.5 VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #050a14;
            --glass: rgba(10, 20, 40, 0.9);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg-dark);
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .container {
            width: 95%; max-width: 420px;
            background: var(--glass);
            padding: 25px; border-radius: 30px;
            border: 1px solid rgba(0, 242, 255, 0.3);
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            position: relative;
        }

        h1 { font-size: 26px; color: var(--neon-blue); margin: 0; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px var(--neon-blue); }
        .sub-title { font-size: 10px; color: #555; margin-bottom: 20px; letter-spacing: 1px; }

        .ip-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 15px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            font-size: 13px;
            color: var(--neon-blue);
            margin-bottom: 20px;
        }

        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .status-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; border: 1px solid #1a2a4a; }
        .status-card span { display: block; font-size: 9px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        .status-card b { font-size: 14px; }

        /* Server Selection */
        .section-label { text-align: left; font-size: 11px; color: var(--neon-blue); margin: 0 0 10px 5px; text-transform: uppercase; }
        .server-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .server-item {
            background: rgba(255,255,255,0.05);
            border: 2px solid #1a2a4a;
            padding: 15px; border-radius: 15px; cursor: pointer; transition: 0.3s;
        }
        .server-item i { font-size: 24px; margin-bottom: 8px; display: block; color: #444; }
        .server-item.active { border-color: #ff003c; background: rgba(255, 0, 60, 0.1); }
        .server-item.active i { color: #ff003c; }

        input {
            width: 100%; padding: 18px; border-radius: 15px; background: #000;
            border: 1px solid #1a2a3a; color: var(--neon-blue); font-size: 16px;
            text-align: center; outline: none; margin-bottom: 15px;
        }

        .btn-main {
            width: 100%; padding: 16px; border-radius: 15px; border: none;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            color: white; font-weight: bold; cursor: pointer; text-transform: uppercase;
        }

        /* Result Panel - Nơi chứa File Cert ẩn */
        #vip-panel { display: none; margin-top: 20px; text-align: left; background: rgba(0,0,0,0.6); padding: 20px; border-radius: 20px; border: 1px solid var(--neon-blue); }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; }
        .info-row b { color: var(--neon-blue); }
        
        .action-btns { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .btn-dl { 
            width: 100%; padding: 14px; border-radius: 15px; text-decoration: none; 
            text-align: center; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .btn-support {
            margin-top: 20px; background: rgba(255,255,255,0.05); border: 1px solid #1a2a4a;
            color: #888; padding: 12px; border-radius: 15px; font-size: 12px; cursor: pointer; width: 100%;
        }
    </style>
</head>
<body>

    <div class="container" id="main-content">
        <h1>HQUY TA SEVER</h1>
        <div class="sub-title">HQUY PREMIUM SERVER</div>

        <div class="ip-box">
            <i class="fas fa-globe"></i> IP CỦA BẠN: <span id="user-ip">...</span>
        </div>

        <div class="status-grid">
            <div class="status-card"><span>TRẠNG THÁI</span><b style="color: #39ff14;">ONLINE</b></div>
            <div class="status-card"><span>PHIÊN BẢN</span><b style="color: var(--neon-purple);">V3.5 VIP</b></div>
        </div>

        <div id="auth-section">
            <div class="section-label">CHỌN SERVER BẠN ĐÃ MUA</div>
            <div class="server-grid">
                <div class="server-item" id="srv-no" onclick="selectServer('no')">
                    <i class="fas fa-shield-alt"></i>
                    <span>NO ANTENA</span>
                </div>
                <div class="server-item active" id="srv-vip" onclick="selectServer('vip')">
                    <i class="fas fa-broadcast-tower"></i>
                    <span>ANTENA VIP</span>
                </div>
            </div>

            <input type="text" id="uid_input" placeholder="NHẬP MÃ UID VIP">
            <button class="btn-main" onclick="handleVerify()">XÁC MINH TRUY CẬP</button>
        </div>

        <div id="vip-panel">
            <div class="info-row"><span>ID:</span><b id="res-uid">-</b></div>
            <div class="info-row"><span>HẠN DÙNG:</span><b id="res-expiry" style="color: #39ff14;">-</b></div>
            <div class="info-row"><span>MÁY CHỦ:</span><b id="res-server">-</b></div>
            
            <div class="action-btns">
                <a id="link-cfg" href="#" class="btn-dl" style="background: #39ff14; color: #000;">
                    <i class="fas fa-download"></i> CÀI CONFIG NGAY
                </a>
                <a id="link-cert" href="#" class="btn-dl" style="background: #ffae00; color: #000;">
                    <i class="fas fa-certificate"></i> CÀI FILE CERT (CHỨNG CHỈ)
                </a>
            </div>
        </div>

        <button class="btn-support" onclick="window.location.href='https://t.me/0353594606'">
            <i class="fab fa-telegram-plane"></i> HỖ TRỢ TELE: 0353594606
        </button>
    </div>

    <script>
        const CONFIG = {
            TOKEN: "8433633651:AAeskPVzmcJJODy0-J1m-PkIs-lSYFFxRJQ", //
            CHAT_ID: "7329868082", 
            GITHUB: "https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main" //
        };

        let selectedType = "vip"; 
        let userIP = "";

        // Tự động lấy IP và kiểm tra Band ID
        async function initSystem() {
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                userIP = ipData.ip;
                document.getElementById('user-ip').innerText = userIP;

                // Kiểm tra danh sách đen từ GitHub
                const res = await fetch(`${CONFIG.GITHUB}/antena.json?t=${Date.now()}`);
                const data = await res.json();
                if(data.banned_ips && data.banned_ips.includes(userIP)) {
                    document.getElementById('main-content').innerHTML = "<h2 style='color:red;'>BỊ CHẶN TRUY CẬP</h2><p>Thiết bị của bạn đã bị cấm khỏi hệ thống.</p>";
                }
            } catch(e) {}
        }

        function selectServer(type) {
            selectedType = type;
            document.querySelectorAll('.server-item').forEach(el => el.classList.remove('active'));
            document.getElementById(type === 'no' ? 'srv-no' : 'srv-vip').classList.add('active');
        }

        async function handleVerify() {
            const uidInput = document.getElementById('uid_input').value.trim();
            if(!uidInput) return alert("Vui lòng nhập UID!");

            try {
                const res = await fetch(`${CONFIG.GITHUB}/antena.json?t=${Date.now()}`);
                const data = await res.json();
                const userData = data.users[uidInput];

                if(userData) {
                    // Hiển thị bảng kết quả và nút Cert
                    document.getElementById('auth-section').style.display = 'none';
                    document.getElementById('vip-panel').style.display = 'block';
                    
                    document.getElementById('res-uid').innerText = uidInput;
                    document.getElementById('res-expiry').innerText = userData.expiry;
                    document.getElementById('res-server').innerText = selectedType === "vip" ? "ANTENA VIP" : "NO ANTENA";

                    // Gán link tải file
                    const cfgFile = selectedType === "vip" ? "antena.conf" : "no_antena.conf";
                    document.getElementById('link-cfg').href = `shadowrocket://config/add/${CONFIG.GITHUB}/${cfgFile}`;
                    document.getElementById('link-cert').href = `${CONFIG.GITHUB}/cert_antena.pem`;

                    // GỬI TELEGRAM - ĐÃ FIX LỖI TỰ GỬI ID
                    sendToBot(uidInput, userData.expiry);
                } else {
                    alert("UID KHÔNG TỒN TẠI!");
                }
            } catch(e) { alert("Lỗi kết nối Server!"); }
        }

        function sendToBot(uid, expiry) {
            const srvName = selectedType === "vip" ? "ANTENA VIP" : "NO ANTENA";
            const timeStr = new Date().toLocaleString('vi-VN');
            const message = `🚀 **THÔNG BÁO LOGIN**\n👤 UID: \`${uid}\`\n🌐 IP: \`${userIP}\`\n📡 Server: \`${srvName}\`\n⏳ Hạn: \`${expiry}\`\n⏰ Lúc: \`${timeStr}\``;
            
            fetch(`https://api.telegram.org/bot${CONFIG.TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CONFIG.CHAT_ID, text: message, parse_mode: 'Markdown' })
            });
        }

        initSystem();
    </script>
</body>
</html>
