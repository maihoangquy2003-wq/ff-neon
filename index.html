<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQUY TA | NEON VIP SYSTEM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon: #00f2ff;
            --bg: #02060c;
            --antena-color: #ff0055;
            --no-antena-color: #39ff14;
            --gold: #ffae00;
        }
        * { box-sizing: border-box; }
        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        #canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }

        .container {
            width: 95%;
            max-width: 450px;
            background: rgba(5, 15, 25, 0.9);
            backdrop-filter: blur(15px);
            border: 2px solid var(--neon);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 26px; margin: 0; color: var(--neon); text-shadow: 0 0 10px var(--neon); font-weight: 900; }

        .section-title {
            font-size: 11px; color: var(--neon); font-weight: bold;
            display: flex; align-items: center; gap: 8px; margin: 20px 0 10px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .section-title::after { content: ""; flex: 1; height: 1px; background: rgba(0, 242, 255, 0.2); }

        input {
            width: 100%; padding: 15px; border-radius: 12px; margin-bottom: 15px;
            background: #000; border: 1px solid #1a2a3a;
            color: var(--neon); font-size: 16px; text-align: center; outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--neon); box-shadow: 0 0 10px rgba(0, 242, 255, 0.3); }

        .btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            font-weight: 900; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary { background: linear-gradient(90deg, #0082ff, #00f2ff); color: white; box-shadow: 0 4px 15px rgba(0, 130, 255, 0.3); }

        #vip_dashboard { display: none; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .config-selection {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 10px;
        }
        
        .config-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px 10px;
            text-align: center;
            transition: 0.4s;
            filter: grayscale(1);
            opacity: 0.3;
            pointer-events: none;
        }
        
        .config-card.active {
            filter: grayscale(0);
            opacity: 1;
            pointer-events: auto;
            border-color: var(--neon);
            background: rgba(0, 242, 255, 0.05);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
        }

        .config-card i { font-size: 24px; margin-bottom: 8px; }
        .config-card h3 { font-size: 11px; margin: 5px 0 12px; line-height: 1.4; }
        
        .btn-dl {
            padding: 10px 5px; border-radius: 8px; font-size: 10px; font-weight: bold;
            text-decoration: none; display: block; margin-top: 8px;
            transition: 0.3s;
        }

        .no-antena { color: var(--no-antena-color); }
        .btn-no-antena { border: 1px solid var(--no-antena-color); color: var(--no-antena-color); }
        .btn-no-antena:hover { background: var(--no-antena-color); color: #000; }

        .has-antena { color: var(--antena-color); }
        .btn-has-antena { border: 1px solid var(--antena-color); color: var(--antena-color); }
        .btn-has-antena:hover { background: var(--antena-color); color: #000; }

        .btn-cert { border: 1px dashed var(--gold); color: var(--gold); }
        .btn-cert:hover { background: var(--gold); color: #000; }

        .zalo-box { margin-top: 25px; text-align: center; font-size: 11px; color: #444; }
        .status-tag {
            display: inline-block; padding: 4px 10px; border-radius: 20px;
            font-size: 10px; font-weight: bold; margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="container">
        <div class="header">
            <h1>HQUY TA SYSTEM</h1>
            <p style="font-size: 10px; color: #555; letter-spacing: 2px;">V3.5 PREMIUM EDITION</p>
        </div>

        <div id="auth_section">
            <div class="section-title">XÁC MINH UID VIP</div>
            <input type="text" id="uid_input" placeholder="NHẬP UID ĐỂ MỞ KHÓA">
            <button class="btn btn-primary" onclick="checkUID()">
                <i class="fas fa-unlock-alt"></i> TRUY CẬP HỆ THỐNG
            </button>
        </div>

        <div id="vip_dashboard">
            <div class="section-title">THÔNG TIN THUÊ BAO</div>
            <div style="background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid rgba(0,242,255,0.1);">
                <div class="status-tag" id="tag_type" style="background: var(--neon); color: #000;">DANG KIEM TRA...</div>
                <div style="font-size: 13px;">ID: <b id="show_id" style="color: var(--neon);"></b></div>
                <div style="font-size: 11px; color: #888; margin-top: 5px;">HẾT HẠN: <b id="show_expiry" style="color: var(--no-antena-color);"></b></div>
            </div>

            <div class="section-title">DỮ LIỆU CẤU HÌNH</div>
            <div class="config-selection">
                <div class="config-card" id="card_noantena">
                    <i class="fas fa-shield-check no-antena"></i>
                    <h3 class="no-antena">AIM DRAG<br>NO ANTENA</h3>
                    <a id="cfg_no" href="#" class="btn-dl btn-no-antena">CÀI CONFIG</a>
                    <a id="cert_no" href="#" download class="btn-dl btn-cert">TẢI CERT</a>
                </div>

                <div class="config-card" id="card_antena">
                    <i class="fas fa-eye has-antena"></i>
                    <h3 class="has-antena">AIM DRAG<br>+ ANTENA</h3>
                    <a id="cfg_has" href="#" class="btn-dl btn-has-antena">CÀI CONFIG</a>
                    <a id="cert_has" href="#" download class="btn-dl btn-cert">TẢI CERT</a>
                </div>
            </div>
            
            <p style="font-size: 10px; color: #555; text-align: center; font-style: italic;">*Lưu ý: Chỉ cài đặt Config dành riêng cho ID của bạn.</p>
        </div>

        <div class="zalo-box">HỖ TRỢ GIA HẠN: <a href="https://zalo.me/0353594606" style="color: var(--neon); text-decoration: none; font-weight: bold;">0353594606 (HQUY)</a></div>
    </div>

    <script>
        // Matrix Effect
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        const drops = new Array(Math.floor(canvas.width/20)).fill(1);
        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00f2ff'; ctx.font = '15px monospace';
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random()*2), i*20, y*20);
                if (y*20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 50);

        // LOGIC KIỂM TRA 2 FILE JSON, 2 CERT, 2 CFG
        async function checkUID() {
            const id = document.getElementById("uid_input").value;
            if(!id) return alert("Vui lòng nhập UID!");

            const baseUrl = "https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main";
            const ts = Date.now();

            try {
                // Fetch đồng thời cả 2 file JSON
                const [resNo, resAntena] = await Promise.all([
                    fetch(`${baseUrl}/noantena.json?t=${ts}`),
                    fetch(`${baseUrl}/antena.json?t=${ts}`)
                ]);

                const dataNo = await resNo.json();
                const dataAntena = await resAntena.json();

                let userData = null;
                let userType = "";

                // Phân loại ID
                if (dataNo.users && dataNo.users[id]) {
                    userData = dataNo.users[id];
                    userType = "noantena";
                } else if (dataAntena.users && dataAntena.users[id]) {
                    userData = dataAntena.users[id];
                    userType = "antena";
                }

                if (!userData) return alert("UID KHÔNG CÓ TRÊN HỆ THỐNG!");
                if (new Date() > new Date(userData.expiry)) return alert("UID NÀY ĐÃ HẾT HẠN SỬ DỤNG!");

                // Hiển thị giao diện
                document.getElementById("auth_section").style.display = "none";
                document.getElementById("vip_dashboard").style.display = "block";
                document.getElementById("show_id").innerText = id;
                document.getElementById("show_expiry").innerText = userData.expiry;

                // Gán link và mở khóa theo loại khách
                if (userType === "noantena") {
                    document.getElementById("tag_type").innerText = "GÓI: NO ANTENA";
                    document.getElementById("tag_type").style.background = "var(--no-antena-color)";
                    document.getElementById("card_noantena").classList.add("active");
                    
                    // Gán link riêng bản No Antena
                    document.getElementById("cfg_no").href = `shadowrocket://config/add/${baseUrl}/no_antena.conf`;
                    document.getElementById("cert_no").href = `${baseUrl}/cert_no_antena.pem`;
                } else {
                    document.getElementById("tag_type").innerText = "GÓI: CÓ ANTENA";
                    document.getElementById("tag_type").style.background = "var(--antena-color)";
                    document.getElementById("card_antena").classList.add("active");

                    // Gán link riêng bản Antena
                    document.getElementById("cfg_has").href = `shadowrocket://config/add/${baseUrl}/antena.conf`;
                    document.getElementById("cert_has").href = `${baseUrl}/cert_antena.pem`;
                }

                alert("XÁC MINH THÀNH CÔNG!");

            } catch (e) {
                alert("LỖI KẾT NỐI: Kiểm tra lại 2 file json trên GitHub!");
            }
        }
    </script>
</body>
</html>
