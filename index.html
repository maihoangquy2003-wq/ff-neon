<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQUY TA | NEON VIP SERVER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon: #00f2ff;
            --neon-dark: #0082ff;
            --bg: #02060c;
        }
        * { box-sizing: border-box; }
        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        #canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.2; }

        .container {
            width: 95%;
            max-width: 450px;
            background: rgba(5, 15, 25, 0.85);
            backdrop-filter: blur(20px);
            border: 2px solid var(--neon);
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3), inset 0 0 20px rgba(0, 242, 255, 0.1);
            position: relative;
        }

        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { 
            font-size: 30px; margin: 0; color: var(--neon); 
            text-shadow: 0 0 15px var(--neon); letter-spacing: 2px;
            font-weight: 900;
        }
        .header p { font-size: 11px; color: #555; letter-spacing: 4px; text-transform: uppercase; }

        .section-title {
            font-size: 13px; color: var(--neon); font-weight: bold;
            display: flex; align-items: center; gap: 8px; margin-bottom: 15px;
        }
        .section-title::after { content: ""; flex: 1; height: 1px; background: rgba(0, 242, 255, 0.2); }

        .server-info {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;
        }
        .info-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }
        .info-card span { display: block; font-size: 10px; color: #888; }
        .info-card b { font-size: 13px; color: #39ff14; }

        .input-area { position: relative; margin-bottom: 15px; }
        input {
            width: 100%; padding: 18px; border-radius: 12px;
            background: #000; border: 1px solid #1a2a3a;
            color: var(--neon); font-size: 16px; font-weight: bold;
            text-align: center; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--neon); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }

        .btn {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            font-weight: 900; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; font-size: 14px;
        }
        .btn-primary {
            background: linear-gradient(90deg, #0082ff, #00f2ff);
            color: white; box-shadow: 0 5px 15px rgba(0, 130, 255, 0.4);
        }
        .btn-primary:hover { transform: translateY(-3px); filter: brightness(1.2); }

        #vip_dashboard { display: none; margin-top: 25px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .vip-box {
            background: rgba(0, 242, 255, 0.05);
            border: 1px dashed var(--neon); border-radius: 15px; padding: 15px;
            margin-bottom: 20px;
        }
        .vip-line { display: flex; justify-content: space-between; font-size: 13px; margin: 5px 0; }
        .vip-line b { color: var(--neon); }

        /* Style cho nhóm nút cài đặt */
        .download-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-success {
            background: transparent; border: 2px solid #39ff14; color: #39ff14;
            display: flex; align-items: center; justify-content: center; gap: 5px;
            font-size: 11px; padding: 12px 5px;
        }
        .btn-success:hover { background: #39ff14; color: #000; box-shadow: 0 0 20px #39ff14; }

        .btn-cert {
            background: transparent; border: 2px solid #ffae00; color: #ffae00;
            display: flex; align-items: center; justify-content: center; gap: 5px;
            font-size: 11px; padding: 12px 5px;
        }
        .btn-cert:hover { background: #ffae00; color: #000; box-shadow: 0 0 20px #ffae00; }

        .zalo-box {
            margin-top: 25px; text-align: center; font-size: 12px; color: #444;
        }
        .zalo-box a { color: var(--neon); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="container">
        <div class="header">
            <h1>HQUY TA SEVER</h1>
            <p>Hquy Premium Server</p>
        </div>

        <div class="section-title"><i class="fas fa-server"></i> THÔNG TIN HỆ THỐNG</div>
        <div class="server-info">
            <div class="info-card"><span>TRẠNG THÁI</span><b>ONLINE</b></div>
            <div class="info-card"><span>PHIÊN BẢN</span><b>V3.0.3 VIP</b></div>
        </div>

        <div class="section-title"><i class="fas fa-key"></i> KÍCH HOẠT THUÊ BAO</div>
        <div class="input-area">
            <input type="text" id="uid_input" placeholder="NHẬP MÃ UID VIP">
        </div>
        <button class="btn btn-primary" onclick="checkUID()">
            <i class="fas fa-fingerprint"></i> XÁC MINH UID SERVER
        </button>

        <div id="vip_dashboard">
            <div class="section-title"><i class="fas fa-user-crown"></i> BẢNG ĐIỀU KHIỂN VIP</div>
            <div class="vip-box">
                <div class="vip-line">UID: <b id="show_id">-</b></div>
                <div class="vip-line">LOẠI: <b>PREMIUM HTTP</b></div>
                <div class="vip-line">HẠN DÙNG: <b id="show_expiry">-</b></div>
            </div>
            
            <div class="download-group">
                <a href="shadowrocket://config/add/https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main/config.conf" style="text-decoration: none;">
                    <button class="btn btn-success"><i class="fas fa-cloud-download-alt"></i> CÀI CONFIG</button>
                </a>
                
                <a href="https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main/Hquysevervip.pem" download style="text-decoration: none;">
                    <button class="btn btn-cert"><i class="fas fa-certificate"></i> TẢI CERT</button>
                </a>
            </div>
        </div>

        <div class="zalo-box">
            LIÊN HỆ GIA HẠN: <a href="https://zalo.me/0353594606">0353594606 (HQUY)</a>
        </div>
    </div>

    <script>
        // MATRIX BACKGROUND
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const columns = canvas.width / 20;
        const drops = new Array(Math.floor(columns)).fill(1);
        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00f2ff';
            ctx.font = '15px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = Math.floor(Math.random() * 2);
                ctx.fillText(text, i * 20, drops[i] * 20);
                if (drops[i] * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 50);

        // LOGIC XỬ LÝ UID
        async function checkUID() {
            const id = document.getElementById("uid_input").value;
            const dash = document.getElementById("vip_dashboard");
            if(!id) return alert("VUI LÒNG NHẬP UID!");

            try {
                const currentRepo = "maihoangquy2003-wq/ff-neon";
                const url = `https://raw.githubusercontent.com/${currentRepo}/main/member.json?t=${new Date().getTime()}`;

                const res = await fetch(url);
                if (!res.ok) throw new Error("Server Error");
                
                const data = await res.json();
                const user = data.users[id];

                if(!user) {
                    alert("UID KHÔNG TỒN TẠI!");
                    return;
                }

                if(user.status === "banned") {
                    alert("ID ĐÃ BỊ KHÓA!");
                    return;
                }

                const expiryDate = new Date(user.expiry);
                const today = new Date();

                if(today > expiryDate) {
                    alert("ID ĐÃ HẾT HẠN!");
                } else {
                    document.getElementById("show_id").innerText = id;
                    document.getElementById("show_expiry").innerText = user.expiry;
                    dash.style.display = "block";
                    dash.scrollIntoView({ behavior: 'smooth' });
                    alert("XÁC MINH THÀNH CÔNG!");
                }
            } catch(e) {
                alert("LỖI KẾT NỐI! VUI LÒNG KIỂM TRA LẠI FILE MEMBER.JSON");
            }
        }
    </script>
</body>
</html>
