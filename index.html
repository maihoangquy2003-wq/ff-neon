<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQUY TA SEVER | VIP SYSTEM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon: #00f2ff;
            --bg: #02060c;
            --card-bg: rgba(20, 25, 35, 0.8);
            --no-antena: #39ff14;
            --has-antena: #ff0055;
        }
        * { box-sizing: border-box; }
        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at center, #0a1525 0%, #02060c 100%);
        }

        #canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.1; }

        .container {
            width: 90%;
            max-width: 420px;
            background: rgba(5, 12, 20, 0.95);
            border: 1.5px solid var(--neon);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.2);
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 26px; margin: 0; color: var(--neon); text-shadow: 0 0 15px var(--neon); font-weight: 800; }
        .header p { font-size: 10px; color: #555; letter-spacing: 2px; margin-top: 5px; }

        .section-title {
            font-size: 11px; color: var(--neon); font-weight: bold;
            display: flex; align-items: center; gap: 10px; margin: 20px 0 12px;
            text-transform: uppercase;
        }
        .section-title::after { content: ""; flex: 1; height: 1px; background: rgba(0, 242, 255, 0.1); }

        /* Bảng trạng thái */
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .status-box {
            background: var(--card-bg); padding: 12px; border-radius: 12px; 
            text-align: center; border: 1px solid rgba(255,255,255,0.05);
        }
        .status-box span { display: block; font-size: 9px; color: #666; margin-bottom: 3px; }
        .status-box b { font-size: 12px; color: var(--no-antena); }

        /* Server Selection - Hiện sẵn */
        .server-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .server-item {
            background: var(--card-bg);
            border: 2px solid rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .server-item i { font-size: 24px; margin-bottom: 10px; transition: 0.3s; }
        .server-item h3 { font-size: 11px; margin: 0; color: #aaa; }

        /* Khi chọn Server */
        .server-item.selected-no { border-color: var(--no-antena); background: rgba(57, 255, 20, 0.05); }
        .server-item.selected-no i { color: var(--no-antena); text-shadow: 0 0 10px var(--no-antena); }
        .server-item.selected-no h3 { color: #fff; }

        .server-item.selected-at { border-color: var(--has-antena); background: rgba(255, 0, 85, 0.05); }
        .server-item.selected-at i { color: var(--has-antena); text-shadow: 0 0 10px var(--has-antena); }
        .server-item.selected-at h3 { color: #fff; }

        /* Login & Download Section */
        #action_box { display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        input {
            width: 100%; padding: 15px; border-radius: 12px; margin-bottom: 12px;
            background: #000; border: 1px solid #1a2a3a;
            color: var(--neon); font-size: 16px; text-align: center; outline: none;
        }

        .btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            font-weight: bold; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-verify { background: linear-gradient(90deg, #0082ff, #00f2ff); color: white; }
        
        .download-area { display: none; margin-top: 15px; }
        .btn-dl { 
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--neon);
            background: transparent; color: var(--neon); margin-bottom: 8px; font-size: 12px;
            font-weight: bold; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center;
        }
        .btn-dl:hover { background: var(--neon); color: #000; }
        .btn-cert { border-color: #ffae00; color: #ffae00; }
        .btn-cert:hover { background: #ffae00; color: #000; }

        .footer { text-align: center; margin-top: 25px; font-size: 10px; color: #444; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="container">
        <div class="header">
            <h1>HQUY TA SEVER</h1>
            <p>HQUY PREMIUM SERVER</p>
        </div>

        <div class="status-grid">
            <div class="status-box"><span>TRẠNG THÁI</span><b>ONLINE</b></div>
            <div class="status-box"><span>PHIÊN BẢN</span><b style="color:var(--neon)">V3.5 VIP</b></div>
        </div>

        <div class="section-title"><i class="fas fa-list"></i> CHỌN SERVER BẠN ĐÃ MUA</div>
        <div class="server-grid">
            <div class="server-item" id="btn_no" onclick="selectServer('noantena')">
                <i class="fas fa-shield-alt"></i>
                <h3>NO ANTENA</h3>
            </div>
            <div class="server-item" id="btn_at" onclick="selectServer('antena')">
                <i class="fas fa-broadcast-tower"></i>
                <h3>ANTENA VIP</h3>
            </div>
        </div>

        <div id="action_box">
            <div class="section-title"><i class="fas fa-fingerprint"></i> XÁC MINH UID</div>
            <div id="login_form">
                <input type="text" id="uid_input" placeholder="NHẬP MÃ UID VIP">
                <button class="btn btn-verify" onclick="verifyNow()">XÁC MINH TRUY CẬP</button>
            </div>

            <div id="download_area" class="download-area">
                <div style="background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 11px; text-align: center;">
                    HẠN DÙNG: <b id="show_expiry" style="color:var(--no-antena)"></b>
                </div>
                <a id="link_cfg" href="#" class="btn-dl">CÀI ĐẶT CẤU HÌNH</a>
                <a id="link_cert" href="#" download class="btn-dl btn-cert">TẢI CHỨNG CHỈ MITM</a>
            </div>
        </div>

        <div class="footer">LIÊN HỆ GIA HẠN: <a href="https://zalo.me/0353594606" style="color:var(--neon); text-decoration:none;">0353594606</a></div>
    </div>

    <script>
        // Matrix Effect
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        const drops = new Array(Math.floor(canvas.width/20)).fill(1);
        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00f2ff'; ctx.font = '15px monospace';
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random()*2), i*20, y*20);
                if (y*20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 50);

        // Logic xử lý
        let selectedServer = "";
        const baseUrl = "https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main";

        function selectServer(type) {
            selectedServer = type;
            // Reset giao diện chọn
            document.getElementById('btn_no').className = 'server-item';
            document.getElementById('btn_at').className = 'server-item';
            
            // Highlight server được chọn
            if(type === 'noantena') {
                document.getElementById('btn_no').classList.add('selected-no');
            } else {
                document.getElementById('btn_at').classList.add('selected-at');
            }

            // Hiện khung nhập UID
            document.getElementById('action_box').style.display = 'block';
            document.getElementById('download_area').style.display = 'none';
            document.getElementById('login_form').style.display = 'block';
        }

        async function verifyNow() {
            const id = document.getElementById('uid_input').value;
            if(!id) return alert("Vui lòng nhập UID!");
            
            const fileName = selectedServer === 'noantena' ? 'noantena.json' : 'antena.json';
            const ts = Date.now();

            try {
                const response = await fetch(`${baseUrl}/${fileName}?t=${ts}`);
                const data = await response.json();

                if (data.users && data.users[id]) {
                    const user = data.users[id];
                    if (new Date() > new Date(user.expiry)) return alert("UID NÀY ĐÃ HẾT HẠN!");

                    // Thành công: Hiện nút tải
                    alert("XÁC MINH THÀNH CÔNG!");
                    document.getElementById('login_form').style.display = 'none';
                    document.getElementById('download_area').style.display = 'block';
                    document.getElementById('show_expiry').innerText = user.expiry;

                    // Gán link tương ứng
                    if(selectedServer === 'noantena') {
                        document.getElementById('link_cfg').href = `shadowrocket://config/add/${baseUrl}/no_antena.conf`;
                        document.getElementById('link_cert').href = `${baseUrl}/cert_no_antena.pem`;
                    } else {
                        document.getElementById('link_cfg').href = `shadowrocket://config/add/${baseUrl}/antena.conf`;
                        document.getElementById('link_cert').href = `${baseUrl}/cert_antena.pem`;
                    }
                } else {
                    alert("UID KHÔNG TỒN TẠI TRONG SERVER NÀY!");
                }
            } catch (e) {
                alert("LỖI: Không tìm thấy dữ liệu Server!");
            }
        }
    </script>
</body>
</html>
