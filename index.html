<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOLITUDE-TA | SOLITUDE OVERDRIVE V7.1</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff00ff; --neon-purple: #bc13fe; --neon-green: #39ff14; --neon-red: #ff003c; --bg-dark: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-dark); color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; }
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .bg-gradient { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, rgba(188, 19, 254, 0.15), transparent 60%); z-index: 2; pointer-events: none; }
        .system-root { position: relative; z-index: 10; display: flex; justify-content: center; align-items: center; height: 100vh; padding: 15px; }
        .terminal-window { width: 100%; max-width: 440px; background: rgba(10, 10, 15, 0.9); border-radius: 25px; padding: 35px 25px; position: relative; overflow: hidden; box-shadow: 0 0 40px rgba(0, 242, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.1); }
        .terminal-window::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(transparent, var(--neon-blue), var(--neon-purple), var(--neon-pink), transparent); animation: rotateRGB 4s linear infinite; z-index: -1; }
        .terminal-window::after { content: ''; position: absolute; inset: 4px; background: rgba(10, 10, 15, 0.95); border-radius: 21px; z-index: -1; }
        @keyframes rotateRGB { 100% { transform: rotate(360deg); } }
        .brand-zone h1 { font-family: 'Orbitron', sans-serif; font-size: 36px; margin: 0; background: linear-gradient(90deg, var(--neon-blue), #fff, var(--neon-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; letter-spacing: 5px; filter: drop-shadow(0 0 15px var(--neon-blue)); animation: glowText 2s infinite alternate; }
        @keyframes glowText { from { filter: drop-shadow(0 0 10px var(--neon-blue)); } to { filter: drop-shadow(0 0 20px var(--neon-pink)); } }
        
        .node-info { background: rgba(255, 255, 255, 0.05); border-radius: 100px; padding: 8px 15px; margin: 20px 0; display: flex; justify-content: space-between; font-size: 12px; border: 1px solid rgba(0, 242, 255, 0.2); color: var(--neon-blue); box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.1); }
        .srv-bridge { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .node-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid #222; padding: 20px 10px; border-radius: 15px; cursor: pointer; transition: 0.4s; text-align: center; }
        .node-btn.active#n1 { border-color: var(--neon-purple); box-shadow: 0 0 20px rgba(188, 19, 254, 0.6); transform: translateY(-2px); }
        .node-btn.active#n2 { border-color: var(--neon-blue); box-shadow: 0 0 20px rgba(0, 242, 255, 0.6); transform: translateY(-2px); }
        
        .id-input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid #333; padding: 20px; border-radius: 15px; color: #fff; font-family: 'Orbitron'; font-size: 20px; text-align: center; letter-spacing: 3px; margin-bottom: 25px; transition: 0.3s; }
        .id-input:focus { border-color: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); outline: none; }
        
        /* Hiệu ứng ô Key đặc biệt */
        .key-input { border: 1px solid var(--neon-pink); box-shadow: 0 0 10px rgba(255, 0, 255, 0.2); }
        .key-input:focus { border-color: var(--neon-pink); box-shadow: 0 0 20px var(--neon-pink); }

        .engine-btn { width: 100%; padding: 20px; border: none; border-radius: 15px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple)); color: #000; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; box-shadow: 0 5px 25px rgba(0, 242, 255, 0.5); }
        .ua-btn { width: 100%; padding: 10px; border: 1px dashed var(--neon-pink); border-radius: 10px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; background: rgba(255, 0, 255, 0.05); color: var(--neon-pink); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        
        .ban-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .ban-screen h1 { font-family: 'Orbitron'; font-size: 40px; text-align: center; background: linear-gradient(90deg, var(--neon-red), #fff, var(--neon-red)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 20px var(--neon-red)); letter-spacing: 8px; }
        .btn-unban { transition: 0.3s; padding: 12px 25px; background: transparent; border: 1px solid var(--neon-red); color: var(--neon-red); font-family: 'Orbitron'; cursor: pointer; border-radius: 10px; font-weight: bold; }
        .btn-unban:hover { background: var(--neon-red); color: #fff; box-shadow: 0 0 30px var(--neon-red); }

        /* Animation cho ẩn/hiện mượt mà */
        .fade-in { animation: fadeIn 0.5s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="particles-js"></div>
    <div class="bg-gradient"></div>

    <div class="ban-screen" id="blacklisted">
        <i class="fas fa-skull-crossbones" style="font-size: 80px; color: var(--neon-red); margin-bottom: 20px;"></i>
        <h1>SOLITUDE BAN IP</h1>
        <button class="btn-unban" onclick="requestUnban()">SOLITUDE UNBAN (30K)</button>
    </div>

    <div class="system-root">
        <div class="terminal-window">
            <div class="brand-zone">
                <h1>SOLITUDE PROXY</h1>
                <p style="text-align: center; font-size: 10px; color: #888; font-family: 'Orbitron'; margin-bottom: 20px;">SOLITUDE OVERDRIVE V7.1</p>
            </div>

            <div class="node-info">
                <span><i class="fas fa-network-wired"></i> <span id="ip-node">SCANNING...</span></span>
                <span>SOLITUDE SERVER ONLINE <i class="fas fa-circle" style="font-size: 8px; color: var(--neon-green);"></i></span>
            </div>

            <div id="auth-layer">
                <div class="srv-bridge">
                    <div class="node-btn" id="n1" onclick="switchNode('no')">
                        <i class="fas fa-shield-halved" style="font-size: 24px; color: #666;"></i><br>
                        <span style="font-size: 10px;">AIM DRAG</span>
                    </div>
                    <div class="node-btn active" id="n2" onclick="switchNode('vip')">
                        <i class="fas fa-bolt-lightning" style="font-size: 24px; color: #666;"></i><br>
                        <span style="font-size: 10px;">ANTENA PREMIUM</span>
                    </div>
                </div>

                <input type="text" id="uid_entry" class="id-input" placeholder="NHẬP UID GAME ĐỂ LẤY KEY">
                <button class="ua-btn" onclick="getAutomationKey()">
                    <i class="fas fa-key"></i> GET INFO & GENERATE KEY
                </button>

                <hr style="border: 0.5px solid rgba(255,255,255,0.05); margin: 20px 0;">

                <input type="text" id="key_verification" class="id-input key-input" placeholder="NHẬP KEY ĐÃ ĐƯỢC DUYỆT" oninput="checkKeyLive()">

                <div id="hidden-injection" style="display: none;" class="fade-in">
                    <p style="text-align: center; color: var(--neon-green); font-size: 12px; margin-bottom: 10px;">✅ KEY HỢP LỆ! NHẤN KÍCH HOẠT</p>
                    <button class="engine-btn" onclick="startInjection()">SOLITUDE KÍCH HOẠT</button>
                </div>
            </div>

            <div id="data-flow" style="display: none;">
                <div style="background: rgba(255,255,255,0.03); border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px dashed var(--neon-blue);">
                    <div style="display: flex; justify-content: space-between; padding: 10px 0;">
                        <span style="font-size: 11px; color: #666;">USER ID:</span>
                        <span id="v-uid" style="color: var(--neon-blue); font-family: 'Orbitron';">-</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding: 10px 0;">
                        <span style="font-size: 11px; color: #666;">EXPIRY:</span>
                        <span id="v-exp" style="color: var(--neon-green); font-family: 'Orbitron';">-</span>
                    </div>
                </div>
                <button class="btn-sub" id="get-c" style="width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px; background: rgba(57, 255, 20, 0.1); border: 1px solid var(--neon-green); color: var(--neon-green); font-weight: bold; cursor: pointer;">DOWNLOAD CONFIG</button>
                <button class="engine-btn" style="background: #111; color: var(--neon-red); border: 1px solid var(--neon-red); box-shadow: none;" onclick="location.reload()">LOGOUT SERVER</button>
            </div>

            <p style="text-align: center; margin-top: 25px; font-size: 11px; color: #444; font-family: Orbitron;">
                <i class="fab fa-telegram"></i> SUPPORT: @0353594606
            </p>
        </div>
    </div>

    <script>
        const _CFG = { 
            t: "8626643586:AAET1UUTKaGzDCit47o3UMAYKHdyGQLKSN0", 
            c: "7329868082", 
            g: "https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main",
            w: "https://ten-worker-cua-ban.workers.dev" // Thay link Cloudflare Worker của bạn vào đây
        };

        let nodeType = 'vip'; let userIP = "SCANNING..."; 
        if (localStorage.getItem('DEVICE_BANNED') === 'true') document.getElementById('blacklisted').style.display = 'flex';

        particlesJS("particles-js", { "particles": { "number": { "value": 80 }, "color": { "value": ["#00f2ff", "#ff00ff"] }, "shape": { "type": "circle" }, "opacity": { "value": 0.4 }, "size": { "value": 2 }, "line_linked": { "enable": true, "distance": 150, "color": "#00f2ff", "opacity": 0.1, "width": 1 }, "move": { "enable": true, "speed": 2 } } });

        async function init() { 
            try { 
                const r = await fetch('https://api.ipify.org?format=json'); 
                const d = await r.json(); userIP = d.ip; 
                document.getElementById('ip-node').innerText = userIP; 
            } catch(e) { console.log("Init..."); } 
        }

        function switchNode(t) { 
            nodeType = t; 
            document.querySelectorAll('.node-btn').forEach(n => n.classList.remove('active')); 
            document.getElementById(t === 'no' ? 'n1' : 'n2').classList.add('active'); 
        }

        // TỰ ĐỘNG HÓA 1: GET INFO + GENERATE KEY + SEND TELE
        async function getAutomationKey() {
            const entry = document.getElementById('uid_entry').value.trim();
            if(!entry) return Swal.fire({ text: 'VUI LÒNG NHẬP UID!', background: '#0a0a0f' });

            const tempKey = 'SOL-' + Math.random().toString(36).substr(2, 6).toUpperCase();
            const ua = navigator.userAgent;
            const now = new Date().toLocaleString('vi-VN');

            // Gửi Tele kèm nút Duyệt
            const msg = `🔐 **YÊU CẦU DUYỆT KEY MỚI**\n━━━━━━━━━━━━━━━━━━\n🆔 **UID:** \`${entry}\`\n🌐 **IP:** \`${userIP}\`\n🔑 **KEY TẠO:** \`${tempKey}\`\n🖥 **SERVER:** ${nodeType.toUpperCase()}\n⏰ **TIME:** ${now}\n━━━━━━━━━━━━━━━━━━`;
            
            // Nút bấm này sẽ gọi đến Worker để tự động thêm vào Database GitHub
            const markup = {
                inline_keyboard: [[
                    { text: "✅ DUYỆT KEY NÀY", url: `${_CFG.w}/approve?uid=${entry}&key=${tempKey}&ip=${userIP}` }
                ]]
            };

            fetch(`https://api.telegram.org/bot${_CFG.t}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: _CFG.c, text: msg, parse_mode: 'Markdown', reply_markup: markup })
            });

            Swal.fire({
                html: `<h2 class="swal-neon-title">ĐÃ GỬI YÊU CẦU!</h2><p style="color:#aaa; font-size:12px;">Key của bạn: <b>${tempKey}</b><br>Vui lòng đợi Admin bấm Duyệt trên Telegram.</p>`,
                background: '#0a0a0f'
            });
        }

        // TỰ ĐỘNG HÓA 2: KIỂM TRA KEY LIVE (Real-time)
        async function checkKeyLive() {
            const inputKey = document.getElementById('key_verification').value.trim();
            const entry = document.getElementById('uid_entry').value.trim();
            if (inputKey.length < 5) return;

            try {
                const resp = await fetch(`${_CFG.g}/antena.json?v=${Date.now()}`);
                const data = await resp.json();
                
                // Nếu Key tồn tại trong DB và chưa dùng và đúng UID
                if (data.keys && data.keys[inputKey] && data.keys[inputKey].uid === entry) {
                    document.getElementById('hidden-injection').style.display = 'block';
                } else {
                    document.getElementById('hidden-injection').style.display = 'none';
                }
            } catch(e) { console.log(e); }
        }

        async function startInjection() { 
            const entry = document.getElementById('uid_entry').value.trim(); 
            const keyUsed = document.getElementById('key_verification').value.trim();

            Swal.fire({ html: '<h2 class="swal-neon-title">SOLITUDE LOADING...</h2>', background: '#0a0a0f', showConfirmButton: false, didOpen: () => Swal.showLoading() });

            try { 
                const targetFile = (nodeType === 'no') ? 'noantena.json' : 'antena.json'; 
                const resp = await fetch(`${_CFG.g}/${targetFile}?v=${Date.now()}`); 
                const data = await resp.json(); 

                const user = data.users ? data.users[entry] : null; 
                if(user) { 
                    // Chuyển UI
                    document.getElementById('auth-layer').style.display = 'none'; 
                    document.getElementById('data-flow').style.display = 'block'; 
                    document.getElementById('v-uid').innerText = entry; 
                    document.getElementById('v-exp').innerText = user.expiry || "LIFETIME"; 

                    // Gửi Tele báo cáo thành công
                    fetch(`https://api.telegram.org/bot${_CFG.t}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            chat_id: _CFG.c, 
                            text: `🚀 **LOGIN THÀNH CÔNG**\nID: \`${entry}\` vừa dùng Key \`${keyUsed}\` để vào Sever.`,
                            parse_mode: 'Markdown' 
                        })
                    });

                    const conf = (nodeType === 'no') ? 'no_antena.conf' : 'antena.conf'; 
                    document.getElementById('get-c').onclick = () => location.href = `shadowrocket://config/add/${_CFG.g}/${conf}`; 
                    Swal.close();
                }
            } catch(e) { Swal.fire({ text: 'ERROR CONNECTION', background: '#0a0a0f' }); } 
        }
        init();
    </script>
</body>
</html>
