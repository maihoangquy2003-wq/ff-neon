<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HQUY TA | GOD MODE V6.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --neon: #00f2ff;
            --pink: #ff00ff;
            --dark: #050505;
            --row-bg: rgba(0, 242, 255, 0.03);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; background: var(--dark); color: #fff; font-family: 'Share Tech Mono', monospace; overflow: hidden; height: 100vh; }

        /* Scanning Grid Background */
        #grid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px; z-index: -1; animation: gridMove 20s linear infinite;
        }
        @keyframes gridMove { from { background-position: 0 0; } to { background-position: 0 600px; } }

        /* Main Console Layout */
        .console-container {
            display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px;
        }

        .glass-console {
            width: 100%; max-width: 450px;
            background: rgba(10, 10, 10, 0.95);
            border: 2px solid var(--neon);
            border-radius: 20px; padding: 40px 30px;
            position: relative; box-shadow: 0 0 40px rgba(0, 242, 255, 0.2);
            overflow: hidden;
        }

        /* Scanline Effect */
        .glass-console::before {
            content: " "; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(0, 242, 255, 0.5); z-index: 10; animation: scan 4s linear infinite;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .header h1 {
            font-family: 'Orbitron', sans-serif; font-size: 28px; text-align: center;
            letter-spacing: 5px; margin: 0; color: var(--neon); text-shadow: 0 0 10px var(--neon);
        }

        /* IP System Display */
        .status-bar {
            background: #000; border: 1px solid #111; border-radius: 5px;
            padding: 8px 15px; font-size: 12px; margin: 20px 0;
            display: flex; justify-content: space-between; color: var(--neon);
        }

        /* Server Selection Custom */
        .srv-selector { display: flex; gap: 10px; margin-bottom: 25px; }
        .srv-btn {
            flex: 1; padding: 15px; background: transparent; border: 1px solid #222;
            border-radius: 10px; color: #444; cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .srv-btn i { font-size: 20px; }
        .srv-btn.active { border-color: var(--pink); color: #fff; background: rgba(255, 0, 255, 0.05); box-shadow: 0 0 15px rgba(255, 0, 255, 0.2); }

        /* Input UID Styling */
        .input-group { position: relative; margin-bottom: 25px; }
        .main-input {
            width: 100%; background: #000; border: 1px solid #222;
            padding: 20px; border-radius: 12px; color: var(--neon);
            font-size: 20px; text-align: center; letter-spacing: 5px;
        }
        .main-input:focus { border-color: var(--neon); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }

        /* Action Buttons */
        .btn-fire {
            width: 100%; padding: 18px; border: none; border-radius: 12px;
            font-family: 'Orbitron', sans-serif; font-weight: 900;
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
            background: var(--neon); color: #000;
        }
        .btn-fire:hover { filter: brightness(1.2); transform: scale(1.02); }

        /* Result View */
        #result-view { display: none; text-align: left; }
        .data-table { background: #000; border-radius: 10px; padding: 15px; margin-bottom: 20px; border: 1px solid #111; }
        .data-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #111; }
        .data-row:last-child { border: none; }
        .label { color: #555; font-size: 11px; text-transform: uppercase; }
        .val { color: var(--neon); font-weight: bold; }

        /* Secret Button styling */
        .btn-secret { background: #111; color: #fff; border: 1px solid #222; margin-bottom: 10px; }
        .btn-secret:hover { border-color: var(--neon); color: var(--neon); }

        /* Ban Overlay */
        .ban-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000; display: none;
            flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <div id="grid-bg"></div>
    
    <div class="ban-screen" id="ban-ui">
        <h1 style="color:red; font-size: 50px;">ACCESS DENIED</h1>
        <p>YOUR IP IS PERMANENTLY BLACKLISTED</p>
    </div>

    <div class="console-container">
        <div class="glass-console" id="main-console">
            <div class="header">
                <h1>SYSTEM V6.0</h1>
            </div>

            <div class="status-bar">
                <span><i class="fas fa-terminal"></i> IP_ADDR:</span>
                <span id="my-ip">FETCHING...</span>
            </div>

            <div id="login-form">
                <div class="srv-selector">
                    <div class="srv-btn" id="s1" onclick="selectSrv('no')">
                        <i class="fas fa-user-secret"></i>
                        <span style="font-size: 10px;">NO_ANTENA</span>
                    </div>
                    <div class="srv-btn active" id="s2" onclick="selectSrv('vip')">
                        <i class="fas fa-dragon"></i>
                        <span style="font-size: 10px;">ANTENA_VIP</span>
                    </div>
                </div>

                <div class="input-group">
                    <input type="text" id="uid_field" class="main-input" placeholder="ID_863XXXX">
                </div>

                <button class="btn-fire" onclick="executeSystem()">
                    <i class="fas fa-bolt"></i> EXECUTE SECURITY
                </button>
            </div>

            <div id="result-view">
                <div class="data-table">
                    <div class="data-row"><span class="label">IDENTITY:</span><span class="val" id="r-uid">-</span></div>
                    <div class="data-row"><span class="label">EXPIRE_ON:</span><span class="val" id="r-exp" style="color:#39ff14">-</span></div>
                    <div class="data-row"><span class="label">STATION:</span><span class="val" id="r-srv">-</span></div>
                </div>

                <button class="btn-fire btn-secret" id="dl-c">
                    <i class="fas fa-code-branch"></i> INJECT CONFIG (.CONF)
                </button>
                <button class="btn-fire btn-secret" id="dl-p">
                    <i class="fas fa-shield-alt"></i> DOWNLOAD ENCRYPTED CERT
                </button>
                <button class="btn-fire" style="background:#ff003c; color:#fff" onclick="location.reload()">
                    <i class="fas fa-unlink"></i> TERMINATE SESSION
                </button>
            </div>
        </div>
    </div>

    <script>
        // MÃ HÓA CƠ BẢN ĐỂ GIẤU LINK TRONG SOURCE
        const _0xAlpha = "8433633651:AAeskPVzmcJJODy0-J1m-PkIs-lSYFFxRJQ"; // Bot Token
        const _0xBeta = "7329868082"; // Chat ID
        const _0xBase = "https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main";

        let currentType = 'vip';
        let userIP = "";

        async function init() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                userIP = data.ip;
                document.getElementById('my-ip').innerText = userIP;

                // Tự động quét Band IP từ antena.json
                const check = await (await fetch(`${_0xBase}/antena.json?v=${Date.now()}`)).json();
                if(check.banned_ips?.includes(userIP)) {
                    document.getElementById('ban-ui').style.display = 'flex';
                }
            } catch(e) {}
        }

        function selectSrv(t) {
            currentType = t;
            document.querySelectorAll('.srv-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(t === 'no' ? 's1' : 's2').classList.add('active');
        }

        async function executeSystem() {
            const uid = document.getElementById('uid_field').value.trim();
            if(!uid) return Swal.fire({ icon: 'error', title: 'EMPTY ID', background: '#000', color: '#fff' });

            // File đích tương ứng
            const dbPath = currentType === 'vip' ? 'antena.json' : 'noantena.json';
            
            Swal.fire({ title: 'CONNECTING...', allowOutsideClick: false, background: '#000', color: '#00f2ff', didOpen: () => Swal.showLoading() });

            try {
                const resp = await fetch(`${_0xBase}/${dbPath}?v=${Date.now()}`);
                const db = await resp.json();
                const user = db.users[uid];

                if(user) {
                    Swal.close();
                    document.getElementById('login-form').style.display = 'none';
                    document.getElementById('result-view').style.display = 'block';
                    
                    document.getElementById('r-uid').innerText = uid;
                    document.getElementById('r-exp').innerText = user.expiry;
                    document.getElementById('r-srv').innerText = currentType.toUpperCase();

                    // Gán logic tải file (Kín kẽ)
                    const cFile = currentType === 'vip' ? 'antena.conf' : 'no_antena.conf';
                    const pFile = currentType === 'vip' ? 'cert_antena.pem' : 'cert_noantena.pem';

                    document.getElementById('dl-c').onclick = () => {
                        window.location.href = `shadowrocket://config/add/${_0xBase}/${cFile}`;
                    };
                    document.getElementById('dl-p').onclick = () => {
                        window.location.href = `${_0xBase}/${pFile}`;
                    };

                    // Gửi tin nhắn Tele ngầm (Fix lỗi)
                    sendLog(uid, user.expiry);
                } else {
                    Swal.fire({ icon: 'warning', title: 'INVALID ID', text: `ID NOT FOUND IN ${dbPath.toUpperCase()}`, background: '#000', color: '#fff' });
                }
            } catch(e) {
                Swal.fire('SERVER ERROR', 'FAILED TO LINK TO GITHUB DATABASE', 'error');
            }
        }

        async function sendLog(id, exp) {
            const mode = currentType === 'vip' ? '💎 VIP' : '🛡️ NORMAL';
            const text = `⚠️ **GOD-MODE LOG** ⚠️\n` +
                         `━━━━━━━━━━━━━━━━━━\n` +
                         `👤 USER: \`${id}\`\n` +
                         `🌐 IP: \`${userIP}\`\n` +
                         `📡 MODE: ${mode}\n` +
                         `⏳ EXP: ${exp}\n` +
                         `━━━━━━━━━━━━━━━━━━`;

            // Sử dụng Fetch POST để đảm bảo dữ liệu về
            fetch(`https://api.telegram.org/bot${_0xAlpha}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: _0xBeta, text: text, parse_mode: 'Markdown' })
            });
        }

        init();
    </script>
</body>
</html>
