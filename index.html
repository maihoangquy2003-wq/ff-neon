<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQUY TA SYSTEM | V3.5 VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #050a14;
            --glass: rgba(10, 20, 40, 0.9);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg-dark);
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .container {
            width: 95%; max-width: 450px;
            background: var(--glass);
            padding: 25px; border-radius: 30px;
            border: 1px solid rgba(0, 242, 255, 0.3);
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        h1 { font-size: 24px; color: var(--neon-blue); margin: 0; text-transform: uppercase; letter-spacing: 2px; }

        /* Server Selection */
        .server-title { text-align: left; font-size: 12px; color: var(--neon-blue); margin: 20px 0 10px 5px; text-transform: uppercase; }
        .server-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .server-item {
            background: rgba(255,255,255,0.05);
            border: 2px solid #1a2a4a;
            padding: 15px; border-radius: 15px; cursor: pointer; transition: 0.3s;
        }
        .server-item i { font-size: 24px; margin-bottom: 8px; display: block; color: #555; }
        .server-item span { font-size: 13px; font-weight: bold; }
        .server-item.active { border-color: #ff003c; background: rgba(255, 0, 60, 0.1); }
        .server-item.active i { color: #ff003c; }

        /* Input & Button */
        input {
            width: 100%; padding: 18px; border-radius: 15px; background: #000;
            border: 1px solid #1a2a3a; color: var(--neon-blue); font-size: 16px;
            text-align: center; outline: none; margin-bottom: 15px;
        }

        .btn-main {
            width: 100%; padding: 16px; border-radius: 15px; border: none;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            color: white; font-weight: bold; cursor: pointer; text-transform: uppercase;
        }

        /* Result Panel */
        #vip-panel { display: none; margin-top: 20px; text-align: left; background: rgba(0,0,0,0.4); padding: 20px; border-radius: 20px; border: 1px solid var(--neon-blue); }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
        .info-row b { color: var(--neon-blue); }
        
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn-dl { 
            padding: 12px; font-size: 12px; border-radius: 10px; text-decoration: none; 
            text-align: center; font-weight: bold; border: 1px solid; 
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }

        .ban-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center; color: red; }
    </style>
</head>
<body>

    <div class="container">
        <h1>HQUY TA SEVER</h1>
        <p style="font-size: 10px; color: #555; margin-bottom: 20px;">HQUY PREMIUM SERVER</p>

        <div class="server-title"><i class="fas fa-tasks"></i> CHỌN SERVER ĐÃ MUA</div>
        <div class="server-grid">
            <div class="server-item" id="srv-no" onclick="selectServer('no')">
                <i class="fas fa-shield-alt"></i>
                <span>NO ANTENA</span>
            </div>
            <div class="server-item active" id="srv-vip" onclick="selectServer('vip')">
                <i class="fas fa-broadcast-tower"></i>
                <span>ANTENA VIP</span>
            </div>
        </div>

        <div id="auth-section">
            <input type="text" id="uid_input" placeholder="NHẬP MÃ UID VIP">
            <button class="btn-main" onclick="handleVerify()">XÁC MINH TRUY CẬP</button>
        </div>

        <div id="vip-panel">
            <div class="info-row"><span>ID:</span><b id="res-uid">-</b></div>
            <div class="info-row"><span>HẠN DÙNG:</span><b id="res-expiry" style="color: #39ff14;">-</b></div>
            <div class="info-row"><span>SERVER:</span><b id="res-server">-</b></div>
            <div class="info-row"><span>IP CỦA BẠN:</span><b id="res-ip">-</b></div>
            
            <div class="action-btns">
                <a id="link-cfg" href="#" class="btn-dl" style="border-color: #39ff14; color: #39ff14;">
                    <i class="fas fa-download"></i> CÀI CONFIG
                </a>
                <a id="link-cert" href="#" class="btn-dl" style="border-color: #ffae00; color: #ffae00;">
                    <i class="fas fa-certificate"></i> TẢI CERT
                </a>
            </div>
        </div>

        <p style="margin-top:25px; font-size: 11px; color: #888;">LIÊN HỆ GIA HẠN: 0353594606</p>
    </div>

    <script>
        const CONFIG = {
            TOKEN: "8433633651:AAeskPVzmcJJODy0-J1m-PkIs-lSYFFxRJQ",
            CHAT_ID: "7329868082",
            GITHUB: "https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main"
        };

        let selectedType = "vip"; 
        let userIP = "Đang lấy...";

        fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => userIP = d.ip);

        function selectServer(type) {
            selectedType = type;
            document.querySelectorAll('.server-item').forEach(el => el.classList.remove('active'));
            if(type === 'no') {
                document.getElementById('srv-no').classList.add('active');
            } else {
                document.getElementById('srv-vip').classList.add('active');
            }
        }

        async function handleVerify() {
            const uid = document.getElementById('uid_input').value.trim();
            if(!uid) return alert("Vui lòng nhập UID!");

            try {
                const res = await fetch(`${CONFIG.GITHUB}/antena.json?t=${Date.now()}`);
                const data = await res.json();

                // Kiểm tra BAN IP
                if(data.banned_ips && data.banned_ips.includes(userIP)) {
                    document.body.innerHTML = `<div class="ban-overlay"><h1>TRUY CẬP BỊ TỪ CHỐI</h1><p>IP ${userIP} đã bị khóa.</p></div>`;
                    return;
                }

                const user = data.users[uid];
                if(user && user.status !== "banned") {
                    showResult(uid, user.expiry);
                    sendTele(uid, user.expiry);
                } else {
                    alert("UID KHÔNG HỢP LỆ!");
                }
            } catch(e) { alert("Lỗi kết nối Server!"); }
        }

        function showResult(uid, expiry) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('vip-panel').style.display = 'block';
            
            document.getElementById('res-uid').innerText = uid;
            document.getElementById('res-expiry').innerText = expiry;
            document.getElementById('res-ip').innerText = userIP;
            
            const serverName = selectedType === "vip" ? "ANTENA VIP" : "NO ANTENA";
            document.getElementById('res-server').innerText = serverName;

            // Link Config & Cert riêng biệt
            const configFile = selectedType === "vip" ? "antena.conf" : "noantena.conf";
            document.getElementById('link-cfg').href = `shadowrocket://config/add/${CONFIG.GITHUB}/${configFile}`;
            document.getElementById('link-cert').href = `${CONFIG.GITHUB}/cert_antena.pem`;
        }

        function sendTele(uid, expiry) {
            const serverName = selectedType === "vip" ? "ANTENA VIP" : "NO ANTENA";
            const msg = `🚀 **KHÁCH ĐĂNG NHẬP**\n👤 UID: \`${uid}\`\n🌐 IP: \`${userIP}\`\n📡 Server: \`${serverName}\`\n⏳ Hạn: \`${expiry}\``;
            
            fetch(`https://api.telegram.org/bot${CONFIG.TOKEN}/sendMessage?chat_id=${CONFIG.CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
        }
    </script>
</body>
</html>
