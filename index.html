<!DOCTYPE html>
<html>
<head>
    <title>HQuy Aim Server VIP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Phần này để làm giao diện đẹp giống ảnh bạn gửi */
        body { background-color: #0b0e14; color: white; text-align: center; font-family: sans-serif; }
        .container { border: 2px solid #00f2ff; border-radius: 15px; margin: 50px auto; padding: 20px; width: 80%; max-width: 400px; box-shadow: 0 0 20px #00f2ff; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; background: #1a1d23; color: white; }
        button { width: 95%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; background: linear-gradient(to right, #00c6ff, #0072ff); color: white; font-weight: bold; cursor: pointer; }
        #download_btn { display: none; background: #28a745; } /* Mặc định ẩn nút tải */
        #info_display { margin-top: 10px; font-size: 0.9em; color: #00f2ff; }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="color: #00f2ff;">HQUY AIM SERVER VIP</h2>
        <p style="color: #00ff00;">● SYSTEM ONLINE</p>
        
        <input type="text" id="uid_input" placeholder="NHẬP UID ĐỂ SỬ DỤNG">
        
        <button onclick="checkUID()">KIỂM TRA ID SERVER</button>
        
        <div id="info_display"></div>

        <a id="download_link" href="https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main/config.conf" style="text-decoration: none;">
            <button id="download_btn">TẢI CẤU HÌNH VIP</button>
        </a>
    </div>

    <script>
        // ĐÂY LÀ ĐOẠN CODE LOGIC BẠN ĐÃ DÁN NHẦM
        async function checkUID() {
            const inputID = document.getElementById("uid_input").value;
            const downloadBtn = document.getElementById("download_btn");
            const infoDisplay = document.getElementById("info_display");

            try {
                // Gọi tới file member.json bạn đã tạo
                const response = await fetch('https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main/member.json');
                const data = await response.json();
                const userData = data.users[inputID];

                if (!userData) {
                    alert("ID không tồn tại trên hệ thống!");
                    return;
                }

                if (userData.status === "banned") {
                    alert("ID của bạn đã bị khóa!");
                    downloadBtn.style.display = "none";
                    return;
                }

                const now = new Date();
                const expiryDate = new Date(userData.expiry);

                if (now > expiryDate) {
                    alert("ID của bạn đã hết hạn!");
                    downloadBtn.style.display = "none";
                    infoDisplay.innerHTML = "Trạng thái: Hết hạn (" + userData.expiry + ")";
                } else {
                    alert("Xác nhận thành công!");
                    infoDisplay.innerHTML = "Hạn dùng đến: " + userData.expiry;
                    downloadBtn.style.display = "block"; // HIỆN NÚT TẢI
                }
            } catch (error) {
                alert("Lỗi kết nối máy chủ! Hãy chắc chắn bạn đã tạo file member.json");
            }
        }
    </script>
</body>
</html>
