[General]
# Thiết lập cơ bản để tối ưu DNS
dns-server = 1.1.1.1, 8.8.8.8, 223.5.5.5
fallback-common-name = false

[Rule]
# Tập trung bắt gói tin từ các server bạn đã cung cấp trong ảnh nhật ký
DOMAIN-SUFFIX,garena.com,PROXY
DOMAIN-SUFFIX,msdk.garena.com,PROXY
DOMAIN-SUFFIX,ggpolarbear.com,PROXY
DOMAIN-SUFFIX,freefiremobile.com,PROXY
DOMAIN-SUFFIX,ggblueshark.com,PROXY

# Các quy tắc phụ để tránh nghẽn mạng
DOMAIN-KEYWORD,facebook,DIRECT
DOMAIN-KEYWORD,google,DIRECT
FINAL,DIRECT

[Script]
# Kịch bản này sẽ tự động in dữ liệu UID ra tab Nhật ký (Logging)
Solitude_Logger = type=request,pattern=^https?:\/\/.*(msdk\.garena|loginbp\.ggpolarbear),script-path=https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main/solitude_logger.js

[MITM]
# ĐÂY LÀ PHẦN QUAN TRỌNG NHẤT: Ép giải mã các server chứa UID
# Dựa trên ảnh bạn gửi, chúng ta cần giải mã các host này
hostname = %APPEND% *.garena.com, *.msdk.garena.com, loginbp.ggpolarbear.com, vnevent.ggblueshark.com
enable = true
