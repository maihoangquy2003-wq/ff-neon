<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQUY TA SEVER | PREMIUM SYSTEM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #02060c;
            --card-bg: rgba(7, 10, 20, 0.95);
            --text-color: #e0faff;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            background: var(--bg-dark);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Nền hiệu ứng hoa anh đào */
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        .container {
            width: 92%;
            max-width: 440px;
            background: var(--card-bg);
            /* Viền trộn màu Blue - Purple */
            border: 2px solid;
            border-image: linear-gradient(45deg, var(--neon-blue), var(--neon-purple)) 1;
            padding: 30px 20px;
            box-shadow: 0 0 25px rgba(188, 19, 254, 0.2), inset 0 0 15px rgba(0, 242, 255, 0.1);
            backdrop-filter: blur(12px);
            position: relative;
            z-index: 10;
        }

        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { 
            font-size: 28px; margin: 0; 
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900; letter-spacing: 1.5px;
            filter: drop-shadow(0 0 8px rgba(0, 242, 255, 0.5));
        }
        .header p { font-size: 10px; color: #7a82ab; text-transform: uppercase; letter-spacing: 4px; margin-top: 5px; }

        /* Bảng trạng thái */
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .status-box {
            background: rgba(20, 20, 40, 0.6);
            border: 1px solid rgba(188, 19, 254, 0.3);
            padding: 12px; border-radius: 12px; text-align: center;
        }
        .status-box span { display: block; font-size: 9px; color: #7a82ab; margin-bottom: 4px; }
        .status-box b { font-size: 12px; color: #39ff14; text-shadow: 0 0 8px #39ff14; }

        .section-title {
            font-size: 11px; color: var(--neon-blue); font-weight: bold;
            display: flex; align-items: center; gap: 8px; margin: 15px 0;
            text-transform: uppercase;
        }
        .section-title::after { content: ""; flex: 1; height: 1px; background: linear-gradient(90deg, var(--neon-purple), transparent); }

        /* Chọn Server */
        .server-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .server-card {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px; padding: 15px 10px; text-align: center;
            cursor: pointer; transition: 0.3s;
        }
        .server-card i { font-size: 22px; margin-bottom: 8px; color: #555; transition: 0.3s; }
        .server-card h3 { font-size: 11px; margin: 0; color: #777; transition: 0.3s; }

        /* Hiệu ứng khi chọn Server */
        .server-card.active-no { border-color: var(--neon-blue); background: rgba(0, 242, 255, 0.05); }
        .server-card.active-no i, .server-card.active-no h3 { color: var(--neon-blue); }
        
        .server-card.active-at { border-color: var(--neon-purple); background: rgba(188, 19, 254, 0.05); }
        .server-card.active-at i, .server-card.active-at h3 { color: var(--neon-purple); }

        /* Nhập UID */
        #auth-section { display: none; animation: fadeIn 0.4s ease; }
        input {
            width: 100%; padding: 16px; border-radius: 12px; background: #000;
            border: 1px solid #1a2a3a; color: var(--neon-blue); font-size: 18px;
            text-align: center; outline: none; transition: 0.3s; font-weight: bold;
            margin-bottom: 15px;
        }
        input:focus { border-color: var(--neon-purple); box-shadow: 0 0 15px rgba(188, 19, 254, 0.2); }

        .btn-main {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            color: white; font-weight: 900; cursor: pointer;
            text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 4px 15px rgba(188, 19, 254, 0.3);
        }

        /* Panel VIP */
        #vip-panel { display: none; margin-top: 20px; animation: slideUp 0.5s ease; }
        .info-card {
            background: rgba(188, 19, 254, 0.03); border: 1px dashed var(--neon-purple);
            padding: 15px; border-radius: 12px; margin-bottom: 15px;
        }
        .info-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; }
        .info-row b { color: var(--neon-blue); }

        .download-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-dl {
            padding: 12px; border-radius: 10px; text-decoration: none; font-size: 11px;
            font-weight: bold; text-align: center; border: 1px solid; display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .btn-config { border-color: #39ff14; color: #39ff14; }
        .btn-cert { border-color: #ffae00; color: #ffae00; }

        .footer { text-align: center; margin-top: 25px; font-size: 11px; color: #7a82ab; }
        .footer a { color: var(--neon-blue); text-decoration: none; font-weight: bold; }

        .alert {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #ff004c; color: white; padding: 12px 25px; border-radius: 10px;
            font-weight: bold; z-index: 1000; display: none; box-shadow: 0 0 20px rgba(255,0,76,0.4);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div id="custom-alert" class="alert"></div>

    <div class="container">
        <div class="header">
            <h1>HQUY TA SEVER</h1>
            <p>Premium Bypass System</p>
        </div>

        <div class="status-grid">
            <div class="status-box"><span>SERVER</span><b>ONLINE</b></div>
            <div class="status-box"><span>PHIÊN BẢN</span><b style="color:var(--neon-purple)">V3.5.0 VIP</b></div>
        </div>

        <div class="section-title"><i class="fas fa-layer-group"></i> CHỌN SERVER BẠN ĐÃ MUA</div>
        <div class="server-grid">
            <div class="server-card" id="btn-no" onclick="selectServer('noantena')">
                <i class="fas fa-shield-halved"></i>
                <h3>NO ANTENA</h3>
            </div>
            <div class="server-card" id="btn-at" onclick="selectServer('antena')">
                <i class="fas fa-broadcast-tower"></i>
                <h3>ANTENA VIP</h3>
            </div>
        </div>

        <div id="auth-section">
            <div class="section-title"><i class="fas fa-key"></i> KÍCH HOẠT UID</div>
            <input type="text" id="uid_input" placeholder="NHẬP MÃ UID VIP">
            <button class="btn-main" onclick="verifyUID()">
                <i class="fas fa-microchip"></i> XÁC MINH TRUY CẬP
            </button>
        </div>

        <div id="vip-panel">
            <div class="section-title"><i class="fas fa-crown"></i> BẢNG ĐIỀU KHIỂN VIP</div>
            <div class="info-card">
                <div class="info-row"><span>ID NGƯỜI DÙNG:</span><b id="res-uid">---</b></div>
                <div class="info-row"><span>GÓI SERVER:</span><b id="res-server" style="color:var(--neon-purple)">---</b></div>
                <div class="info-row"><span>HẠN SỬ DỤNG:</span><b id="res-expiry" style="color:#39ff14">---</b></div>
            </div>
            <div class="download-grid">
                <a id="link-cfg" href="#" class="btn-dl btn-config"><i class="fas fa-download"></i> CÀI CONFIG</a>
                <a id="link-cert" href="#" class="btn-dl btn-cert"><i class="fas fa-file-contract"></i> TẢI CERT</a>
            </div>
        </div>

        <div class="footer">
            HỖ TRỢ TELEGRAM: <a href="https://t.me/0353594605">0353594605 (HQUY)</a>
        </div>
    </div>

    <script>
        // Hiệu ứng Hoa Anh Đào
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        const petals = [];
        for(let i = 0; i < 40; i++) {
            petals.push({ x: Math.random() * width, y: Math.random() * height, s: Math.random() * 1.5 + 0.5, r: Math.random() * 5 });
        }

        function draw() {
            ctx.fillStyle = 'rgba(2, 6, 12, 0.2)'; ctx.fillRect(0, 0, width, height);
            petals.forEach(p => {
                p.y += p.s; p.x += Math.sin(p.y / 20);
                if(p.y > height) p.y = -20;
                ctx.beginPath(); ctx.fillStyle = '#ffb7c5';
                ctx.arc(p.x, p.y, p.s * 2, 0, Math.PI * 2); ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();

        // Logic chọn Server
        let currentType = "";
        const baseUrl = "https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main";

        function selectServer(type) {
            currentType = type;
            document.getElementById('btn-no').className = 'server-card' + (type === 'noantena' ? ' active-no' : '');
            document.getElementById('btn-at').className = 'server-card' + (type === 'antena' ? ' active-at' : '');
            document.getElementById('auth-section').style.display = 'block';
            document.getElementById('vip-panel').style.display = 'none';
        }

        async function verifyUID() {
            const uid = document.getElementById('uid_input').value.trim();
            if(!uid) return showAlert("Vui lòng nhập UID!");

            const jsonFile = currentType === 'noantena' ? 'noantena.json' : 'antena.json';
            
            try {
                const response = await fetch(`${baseUrl}/${jsonFile}?t=${Date.now()}`);
                const data = await response.json();
                const user = data.users[uid];

                if(!user) {
                    showAlert("UID KHÔNG TỒN TẠI Ở SERVER NÀY!");
                } else if(user.status === "banned") {
                    showAlert("BẢN ID CỦA BẠN ĐÃ BỊ KHÓA!");
                } else {
                    const expiry = new Date(user.expiry);
                    if(new Date() > expiry) {
                        showAlert("BẢN ID ĐÃ HẾT THỜI GIAN SỬ DỤNG!");
                    } else {
                        // Thành công
                        document.getElementById('auth-section').style.display = 'none';
                        document.getElementById('vip-panel').style.display = 'block';
                        document.getElementById('res-uid').innerText = uid;
                        document.getElementById('res-server').innerText = currentType.toUpperCase();
                        document.getElementById('res-expiry').innerText = user.expiry;

                        // Gán link tải
                        document.getElementById('link-cfg').href = `shadowrocket://config/add/${baseUrl}/${currentType === 'noantena' ? 'no_antena.conf' : 'antena.conf'}`;
                        document.getElementById('link-cert').href = `${baseUrl}/${currentType === 'noantena' ? 'cert_no_antena.pem' : 'cert_antena.pem'}`;
                        
                        showAlert("XÁC MINH THÀNH CÔNG!", "#39ff14");
                    }
                }
            } catch (e) { showAlert("LỖI KẾT NỐI SERVER!"); }
        }

        function showAlert(msg, color = "#ff004c") {
            const box = document.getElementById('custom-alert');
            box.innerText = msg; box.style.background = color; box.style.display = 'block';
            setTimeout(() => box.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
