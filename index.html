<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQUY TA SYSTEM | ULTRA PREMIUM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #02060c;
            --card-bg: rgba(7, 10, 25, 0.98);
        }

        body {
            background: var(--bg-dark);
            color: #e0faff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        .container {
            width: 90%;
            max-width: 420px;
            background: var(--card-bg);
            border-radius: 25px;
            padding: 25px;
            position: relative;
            z-index: 10;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .header h1 { 
            text-align: center;
            font-size: 28px;
            background: linear-gradient(to right, var(--neon-blue), #fff, var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.5);
            margin: 10px 0;
        }

        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .status-box {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 242, 255, 0.3);
            padding: 10px; border-radius: 12px; text-align: center;
        }
        .status-box b { color: #39ff14; font-size: 13px; }

        input {
            width: 100%; padding: 15px; border-radius: 12px; background: #000;
            border: 1px solid #1a2a3a; color: var(--neon-blue); font-size: 18px;
            text-align: center; outline: none; margin-bottom: 15px; font-weight: bold;
        }

        .btn-main {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            color: white; font-weight: bold; cursor: pointer;
            text-transform: uppercase; transition: 0.3s;
        }

        #vip-panel { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #333; }
        .info-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; }
        .info-row b { color: var(--neon-blue); }

        .btn-dl {
            padding: 12px; border-radius: 10px; text-decoration: none; font-size: 12px;
            font-weight: bold; text-align: center; border: 1px solid; display: inline-block; width: 48%;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <div class="header">
            <h1>HQUY TA SYSTEM</h1>
            <p style="text-align: center; font-size: 10px; color: #555;">V3.5 PREMIUM EDITION</p>
        </div>

        <div class="status-grid">
            <div class="status-box"><span>SERVER</span><br><b>ONLINE</b></div>
            <div class="status-box"><span>IP CỦA BẠN</span><br><b id="display-ip" style="color:var(--neon-blue)">ĐANG LẤY...</b></div>
        </div>

        <div id="auth-section">
            <p style="font-size: 11px; color: var(--neon-blue);">XÁC MINH UID VIP</p>
            <input type="text" id="uid_input" placeholder="NHẬP MÃ UID CỦA BẠN">
            <button class="btn-main" onclick="verifyUID()">TRUY CẬP HỆ THỐNG</button>
        </div>

        <div id="vip-panel">
            <div class="info-row"><span>ID:</span><b id="res-uid">---</b></div>
            <div class="info-row"><span>IP:</span><b id="res-ip">0.0.0.0</b></div>
            <div class="info-row"><span>HẠN DÙNG:</span><b id="res-expiry" style="color:#39ff14">2026-12-31</b></div>
            
            <div style="margin-top: 15px;">
                <a id="link-cfg" href="#" class="btn-dl" style="border-color: #39ff14; color: #39ff14;">CÀI CONFIG</a>
                <a id="link-cert" href="#" class="btn-dl" style="border-color: #ffae00; color: #ffae00; float: right;">TẢI CERT</a>
            </div>
        </div>

        <p style="text-align: center; font-size: 11px; color: #555; margin-top: 20px;">
            HỖ TRỢ GIA HẠN: <a href="https://t.me/0353594605" style="color:var(--neon-blue); text-decoration:none;">0353594605 (HQUY)</a>
        </p>
    </div>

    <script>
        // TOKEN ĐÃ TÍCH HỢP TỪ BOT CỦA BẠN
        const TELE_TOKEN = "8433633651:AAeskPVzmcJJODy0-J1m-PkIs-lSYFFxRJQ";
        const TELE_CHAT_ID = "0353594605"; // Đảm bảo đây là ID dãy số lấy từ @userinfobot

        let userIP = "Đang lấy...";
        
        // Tự động lấy IP
        fetch('https://api.ipify.org?format=json')
            .then(r => r.json())
            .then(d => {
                userIP = d.ip;
                document.getElementById('display-ip').innerText = userIP;
            });

        async function verifyUID() {
            const uid = document.getElementById('uid_input').value.trim();
            if(!uid) return alert("Vui lòng nhập UID!");

            const baseUrl = "https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main";
            try {
                const response = await fetch(`${baseUrl}/antena.json?t=${Date.now()}`);
                const data = await response.json();
                const user = data.users[uid];

                if(user && user.status !== "banned") {
                    document.getElementById('auth-section').style.display = 'none';
                    document.getElementById('vip-panel').style.display = 'block';
                    document.getElementById('res-uid').innerText = uid;
                    document.getElementById('res-ip').innerText = userIP;
                    document.getElementById('res-expiry').innerText = user.expiry;

                    document.getElementById('link-cfg').href = `shadowrocket://config/add/${baseUrl}/antena.conf`;
                    document.getElementById('link-cert').href = `${baseUrl}/cert_antena.pem`;

                    // GỬI THÔNG BÁO VỀ TELEGRAM
                    const msg = `🚀 **LOG ĐĂNG NHẬP HỆ THỐNG**\n━━━━━━━━━━━━━\n👤 **UID:** \`${uid}\`\n🌐 **IP:** \`${userIP}\`\n📅 **Hạn dùng:** \`${user.expiry}\`\n⏰ **Thời gian:** ${new Date().toLocaleString('vi-VN')}`;
                    
                    fetch(`https://api.telegram.org/bot${TELE_TOKEN}/sendMessage?chat_id=${TELE_CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);

                } else {
                    alert("UID KHÔNG TỒN TẠI HOẶC ĐÃ BỊ KHÓA!");
                }
            } catch(e) { 
                alert("Lỗi kết nối Server! Vui lòng kiểm tra internet."); 
            }
        }
    </script>
</body>
</html>
