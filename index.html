<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOLITUDE PROXY | NEON OVERDRIVE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* GIỮ NGUYÊN CSS GỐC VÀ THÊM NEON EFFECTS */
        :root { 
            --neon-blue: #00f2ff; --neon-pink: #ff00ff; --neon-purple: #bc13fe; 
            --neon-green: #39ff14; --neon-red: #ff003c; --bg-dark: #050505; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-dark); color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; }
        
        #particles-js { position: fixed; inset: 0; z-index: 1; }
        .bg-gradient { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.1), transparent 70%); z-index: 2; pointer-events: none; }

        .system-root { position: relative; z-index: 10; display: flex; justify-content: center; align-items: center; height: 100vh; padding: 15px; }
        
        /* Bảng Terminal: Neon-Box-Shadow rực rỡ */
        .terminal-window { 
            width: 100%; max-width: 440px; 
            background: rgba(10, 10, 15, 0.95); 
            border-radius: 25px; 
            padding: 30px 20px; 
            position: relative; 
            border: 2px solid var(--neon-blue); /* Viền chính */
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.2); /* Neon tỏa sáng ngoài */
        }
        
        /* Header Neon */
        .brand-zone h1 { 
            font-family: 'Orbitron', sans-serif; font-size: 30px; margin: 0; 
            background: linear-gradient(90deg, var(--neon-blue), #fff, var(--neon-purple)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            text-align: center; letter-spacing: 5px; 
            filter: drop-shadow(0 0 8px var(--neon-blue)); /* Glow chữ */
        }

        /* 3 Server Grid: Neon-Box-Shadow khi hoạt động */
        .srv-bridge { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 20px 0; }
        .node-btn { 
            background: rgba(255, 255, 255, 0.02); border: 1px solid #333; 
            padding: 15px 5px; border-radius: 12px; cursor: pointer; 
            transition: 0.3s; text-align: center; color: #555;
        }
        .node-btn i { font-size: 18px; margin-bottom: 5px; display: block; }
        .node-btn span { font-size: 9px; font-weight: bold; font-family: 'Orbitron'; display: block; }
        
        /* Neon-Box-Shadow & Glow cho trạng thái Active */
        .node-btn.active[data-type="no"] { border-color: var(--neon-purple); color: var(--neon-purple); box-shadow: 0 0 15px rgba(188, 19, 254, 0.5); }
        .node-btn.active[data-type="vip"] { border-color: var(--neon-blue); color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 242, 255, 0.5); }
        .node-btn.active[data-type="free"] { border-color: var(--neon-pink); color: var(--neon-pink); box-shadow: 0 0 15px rgba(255, 0, 255, 0.5); }

        /* Ô nhập (Input): Neon-Box-Shadow rực rỡ */
        .id-input { 
            width: 100%; background: rgba(0,0,0,0.8); 
            border: 2px solid #333; 
            padding: 18px; border-radius: 12px; 
            color: #fff; font-family: 'Orbitron'; 
            font-size: 18px; text-align: center; 
            margin-bottom: 12px; transition: 0.3s;
        }
        /* Phát sáng khi focus */
        .id-input:focus { 
            border-color: var(--neon-blue); 
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.6); /* Neon tỏa sáng ngoài */
        }

        /* Nút chính (Button): Thêm Glow & Neon-Box-Shadow */
        .engine-btn { 
            width: 100%; padding: 18px; border: none; border-radius: 12px; 
            font-family: 'Orbitron'; font-weight: 900; cursor: pointer; 
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple)); 
            color: #000; text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 5px 20px rgba(0, 242, 255, 0.4); /* Neon tỏa sáng ngoài */
            transition: 0.3s;
        }
        .engine-btn:hover { 
            box-shadow: 0 8px 25px rgba(188, 19, 254, 0.6); /* Đổi màu và sáng hơn */
        }

        /* Nút phụ (UA Button): Neon-Hóa toàn diện */
        .ua-btn { 
            width: 100%; padding: 12px; 
            background: rgba(0,0,0,0.5);
            border: 1px dashed var(--neon-pink); 
            border-radius: 10px; 
            font-family: 'Orbitron'; font-size: 10px; 
            cursor: pointer; 
            color: var(--neon-pink); text-transform: uppercase; 
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.2); /* Neon tỏa sáng ngoài */
            margin-bottom: 10px; transition: 0.3s;
        }
        .ua-btn:hover { 
            box-shadow: 0 0 18px rgba(255, 0, 255, 0.5); /* Tỏa sáng mạnh hơn */
        }

        /* Màn hình BAN */
        .ban-screen { 
            position: fixed; inset: 0; background: #000; z-index: 10000; 
            display: none; flex-direction: column; justify-content: center; align-items: center; 
        }
        .ban-screen h1 { color: var(--neon-red); text-shadow: 0 0 15px var(--neon-red); }

        /* Join Telegram: Thêm Neon-Box-Shadow */
        .support-btn {
            display: inline-block; 
            margin-top: 20px; 
            padding: 8px 15px;
            border-radius: 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid #222;
            color: #444; 
            text-decoration: none;
            font-size: 12px; font-family: 'Orbitron'; 
            transition: 0.3s;
        }
        .support-btn:hover { 
            color: var(--neon-blue); 
            border-color: var(--neon-blue);
            box-shadow: 0 0 12px rgba(0, 242, 255, 0.4); /* Neon tỏa sáng ngoài */
        }

        /* Ẩn hiện nội dung */
        #data-flow { display: none; }
    </style>
</head>
<body>

    <div id="particles-js"></div>
    <div class="bg-gradient"></div>

    <div class="ban-screen" id="blacklisted">
        <i class="fas fa-skull-crossbones" style="font-size: 70px; color: var(--neon-red); margin-bottom: 20px; filter: drop-shadow(0 0 15px var(--neon-red));"></i>
        <h1>ACCESS DENIED</h1>
        <button onclick="requestUnban()" style="margin-top: 30px; padding: 12px 25px; background: transparent; border: 1px solid var(--neon-red); color: var(--neon-red); font-family: 'Orbitron'; cursor: pointer; border-radius: 10px; font-size: 12px; letter-spacing: 2px;">UNBAN DEVICE (30K)</button>
    </div>

    <div class="system-root">
        <div class="terminal-window">
            <div class="brand-zone">
                <h1>SOLITUDE PROXY</h1>
                <p style="text-align: center; font-size: 10px; color: #888; letter-spacing: 3px; margin: 10px 0;">SOLITUDE OVERDRIVE V8.0</p>
            </div>

            <div style="display: flex; justify-content: space-between; font-size: 11px; color: #555; margin-bottom: 15px; border-bottom: 1px solid #111; padding-bottom: 10px;">
                <span>IP: <span id="ip-node" style="color: var(--neon-blue);">SCANNING...</span></span>
                <span>STATUS: <span style="color: var(--neon-green);">SECURE</span></span>
            </div>

            <div class="srv-bridge">
                <div class="node-btn active" onclick="switchNode('no', this)" data-type="no">
                    <i class="fas fa-shield-halved"></i><span>NO ANTENA</span>
                </div>
                <div class="node-btn" onclick="switchNode('vip', this)" data-type="vip">
                    <i class="fas fa-bolt-lightning"></i><span>ANTENA VIP</span>
                </div>
                <div class="node-btn" onclick="switchNode('free', this)" data-type="free">
                    <i class="fas fa-unlock"></i><span>FREE SERVER</span>
                </div>
            </div>

            <div id="auth-layer">
                <button class="ua-btn" onclick="getUserAgent()">
                    <i class="fas fa-key"></i> GET INFO & GENERATE KEY
                </button>

                <input type="text" id="uid_entry" class="id-input" placeholder="ENTER UID">
                
                <button class="engine-btn" id="btn-verify" onclick="startInjection()">VERIFY ACCESS</button>
            </div>

            <div id="data-flow">
                <div style="background: rgba(0, 242, 255, 0.05); border: 1px solid var(--neon-blue); border-radius: 12px; padding: 20px; margin-bottom: 15px; text-align: center;">
                    <h3 style="margin: 0; color: var(--neon-blue); font-family: 'Orbitron';">ACCESS GRANTED</h3>
                    <p id="v-uid" style="color: #888; margin: 10px 0; font-weight: bold;"></p>
                </div>
                <button class="engine-btn" id="get-c" style="background: var(--neon-green); color:#000;">INSTALL SOLITUDE</button>
                <button class="engine-btn" id="get-p" style="background: none; border: 1px solid var(--neon-blue); color:var(--neon-blue); margin-top:10px;">INSTALL CERTIFICATE</button>
                
                <button class="support-btn" style="width:100%; text-align:center; border:none;" onclick="location.reload()">LOGOUT</button>
            </div>

            <p style="text-align: center;">
                <a href="https://t.me/0353594606" class="support-btn">
                    <i class="fab fa-telegram"></i> SUPPORT GROUP
                </a>
            </p>
        </div>
    </div>

    <script>
        const _CFG = { t: "8626643586:AAET1UUTKaGzDCit47o3UMAYKHdyGQLKSN0", c: "7329868082", g: "https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main" };
        let nodeType = 'no'; let userIP = "SCANNING...";

        if (localStorage.getItem('DEVICE_BANNED') === 'true') {
            window.onload = () => { document.getElementById('blacklisted').style.display = 'flex'; };
        }

        async function init() { 
            try { 
                const r = await fetch('https://api.ipify.org?format=json'); const d = await r.json(); userIP = d.ip; 
                document.getElementById('ip-node').innerText = userIP; 
                const resp = await fetch(`${_CFG.g}/antena.json?v=${Date.now()}`); const vault = await resp.json(); 
                if((vault.banned_ips && vault.banned_ips.includes(userIP)) || (vault.banned_uas && vault.banned_uas.includes(navigator.userAgent))) { document.getElementById('blacklisted').style.display = 'flex'; } 
            } catch(e) {} 
        }

        function switchNode(t, el) { 
            nodeType = t; 
            document.querySelectorAll('.node-btn').forEach(n => n.classList.remove('active')); 
            el.classList.add('active'); 
        }

        function getUserAgent() { sendTele(`GET UA: ${navigator.userAgent}\nUID: ${document.getElementById('uid_entry').value}`); Swal.fire({title: 'SENT!', icon: 'success', background: '#0a0a0f', color: '#fff' }); }

        async function startInjection() { 
            const entry = document.getElementById('uid_entry').value.trim(); if(!entry) return; 
            Swal.fire({ title: 'VERIFYING...', didOpen: () => Swal.showLoading(), background: '#0a0a0f', color: '#fff' });
            setTimeout(() => {
                Swal.close();
                document.getElementById('auth-layer').style.display = 'none';
                document.getElementById('data-flow').style.display = 'block';
                document.getElementById('v-uid').innerText = "UID: " + entry;
                sendTele(`SUCCESS LOGIN\nUID: ${entry}\nSV: ${nodeType.toUpperCase()}`);
            }, 1000);
        }

        function sendTele(m) { fetch(`https://api.telegram.org/bot${_CFG.t}/sendMessage`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ chat_id: _CFG.c, text: m, parse_mode: 'Markdown' }) }); }
        
        particlesJS("particles-js", { "particles": { "number": { "value": 60 }, "color": { "value": "#00f2ff" }, "opacity": { "value": 0.2 }, "size": { "value": 2 }, "line_linked": { "enable": true, "distance": 150, "color": "#00f2ff", "opacity": 0.1, "width": 1 }, "move": { "enable": true, "speed": 1 } } });
        init();
    </script>
</body>
</html>
