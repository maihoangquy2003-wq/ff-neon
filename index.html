<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HQUY TA SYSTEM | CYBER ULTRA PREMIUM</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-pink: #ff00ff;
            --neon-purple: #bc13fe;
            --neon-green: #39ff14;
            --neon-red: #ff003c;
            --bg-black: #02050a;
            --glass-bg: rgba(6, 11, 25, 0.85);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Base Setup */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg-black); color: #fff;
            font-family: 'Rajdhani', sans-serif; overflow-x: hidden;
        }

        /* Matrix Rain Canvas */
        #matrix-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.2; pointer-events: none;
        }

        /* Layout */
        .wrapper {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
            background: radial-gradient(circle at center, rgba(0, 242, 255, 0.05) 0%, transparent 70%);
        }

        .main-container {
            width: 100%; max-width: 500px;
            background: var(--glass-bg);
            border-radius: 45px;
            border: 1px solid rgba(0, 242, 255, 0.3);
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.1), inset 0 0 30px rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: containerEntry 1s ease-out;
        }

        @keyframes containerEntry {
            from { opacity: 0; transform: scale(0.8) translateY(50px); filter: blur(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        /* Decorative Corners */
        .corner {
            position: absolute; width: 25px; height: 25px;
            border: 3px solid var(--neon-cyan);
        }
        .top-l { top: 20px; left: 20px; border-right: 0; border-bottom: 0; }
        .top-r { top: 20px; right: 20px; border-left: 0; border-bottom: 0; }
        .bot-l { bottom: 20px; left: 20px; border-right: 0; border-top: 0; }
        .bot-r { bottom: 20px; right: 20px; border-left: 0; border-top: 0; }

        /* Header UI */
        .header h1 {
            font-family: 'Orbitron', sans-serif; font-size: 34px; font-weight: 900;
            margin: 0; letter-spacing: 5px; text-transform: uppercase;
            background: linear-gradient(135deg, var(--neon-cyan), #fff, var(--neon-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 12px rgba(0, 242, 255, 0.6));
        }

        .system-status {
            display: flex; justify-content: center; gap: 10px; margin: 15px 0;
        }
        .status-pill {
            background: rgba(0,0,0,0.4); padding: 5px 15px; border-radius: 50px;
            font-size: 11px; font-weight: bold; border: 1px solid rgba(255,255,255,0.1);
            letter-spacing: 1px; color: var(--neon-cyan);
        }

        /* IP Card */
        .ip-card {
            background: linear-gradient(90deg, rgba(0, 242, 255, 0.1), rgba(188, 19, 254, 0.1));
            border-radius: 20px; padding: 15px; margin: 25px 0;
            border: 1px solid rgba(0, 242, 255, 0.2);
            display: flex; align-items: center; justify-content: center; gap: 12px;
            position: relative; overflow: hidden;
        }
        .ip-card::after {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg); animation: shine 3s infinite;
        }
        @keyframes shine { 0% { left: -100%; } 100% { left: 100%; } }

        /* Server Selection Grid */
        .srv-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;
        }
        .srv-item {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid #1a2a3a; padding: 25px 15px;
            border-radius: 30px; cursor: pointer; transition: var(--transition);
            position: relative;
        }
        .srv-item i { font-size: 32px; color: #333; margin-bottom: 12px; transition: 0.3s; }
        .srv-item span { display: block; font-weight: 800; font-size: 13px; color: #555; text-transform: uppercase; }

        .srv-item.active {
            border-color: var(--neon-red);
            background: rgba(255, 0, 60, 0.1);
            box-shadow: 0 0 25px rgba(255, 0, 60, 0.3);
            transform: translateY(-5px);
        }
        .srv-item.active i { color: var(--neon-red); filter: drop-shadow(0 0 8px var(--neon-red)); }
        .srv-item.active span { color: #fff; }

        /* Input UID System */
        .input-box {
            position: relative; margin-bottom: 25px;
        }
        .uid-input {
            width: 100%; padding: 22px 30px; border-radius: 25px;
            background: #000; border: 1.5px solid #1a2a3a;
            color: var(--neon-cyan); font-family: 'Orbitron', sans-serif;
            font-size: 20px; text-align: center; letter-spacing: 4px;
            transition: 0.3s;
        }
        .uid-input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }

        /* Action Buttons */
        .btn-action {
            width: 100%; padding: 20px; border-radius: 25px; border: none;
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 16px;
            text-transform: uppercase; cursor: pointer; transition: var(--transition);
            display: flex; align-items: center; justify-content: center; gap: 15px;
            margin-bottom: 15px;
        }
        .btn-verify {
            background: linear-gradient(45deg, var(--neon-cyan), #0077ff);
            color: #000; box-shadow: 0 10px 30px rgba(0, 242, 255, 0.3);
        }
        .btn-verify:active { transform: scale(0.96); }

        /* Result Panel UI */
        #result-panel { display: none; }
        .result-card {
            background: rgba(0,0,0,0.5); padding: 25px; border-radius: 30px;
            border: 1px dashed rgba(255,255,255,0.1); margin-bottom: 25px;
            text-align: left; animation: fadeIn 0.5s ease;
        }
        .res-line {
            display: flex; justify-content: space-between; padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .res-line:last-child { border: none; }
        .res-label { color: #888; font-size: 13px; text-transform: uppercase; }
        .res-val { color: var(--neon-cyan); font-weight: bold; font-size: 15px; }

        .btn-dl-cfg { background: var(--neon-green); color: #000; box-shadow: 0 10px 20px rgba(57, 255, 20, 0.2); }
        .btn-dl-cert { background: #ffae00; color: #000; box-shadow: 0 10px 20px rgba(255, 174, 0, 0.2); }

        /* Ban Overlay */
        .ban-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 99999; display: none;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .ban-screen i { font-size: 120px; color: var(--neon-red); margin-bottom: 30px; filter: drop-shadow(0 0 20px var(--neon-red)); }

        /* Support Link */
        .support-btn {
            margin-top: 30px; display: block; text-decoration: none;
            color: #444; font-size: 12px; font-weight: bold; transition: 0.3s;
        }
        .support-btn:hover { color: var(--neon-cyan); }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div class="ban-screen" id="ban-ui">
        <i class="fas fa-biohazard fa-beat"></i>
        <h1 style="color: var(--neon-red); letter-spacing: 10px;">BANNED</h1>
        <p style="color: #444;">TRUY CẬP ĐÃ BỊ VÔ HIỆU HÓA TRÊN TOÀN HỆ THỐNG</p>
    </div>

    <div class="wrapper">
        <div class="main-container" id="main-app">
            <div class="corner top-l"></div><div class="corner top-r"></div>
            <div class="corner bot-l"></div><div class="corner bot-r"></div>

            <div class="header">
                <h1>HQUY TA</h1>
                <div class="system-status">
                    <span class="status-pill"><i class="fas fa-circle-notch fa-spin"></i> SEVER: ONLINE</span>
                    <span class="status-pill" style="color:var(--neon-purple)">VER: V4.0 X-PRO</span>
                </div>
            </div>

            <div class="ip-card">
                <i class="fas fa-globe-asia" style="color: var(--neon-cyan)"></i>
                <span id="ip-display" style="font-weight: 900; letter-spacing: 2px;">SCANNING IP...</span>
            </div>

            <div id="auth-section">
                <div style="text-align: left; margin: 0 0 12px 15px; font-size: 11px; color: #555; letter-spacing: 2px;">DATABASE SELECTION</div>
                <div class="srv-grid">
                    <div class="srv-item" id="srv-no" onclick="changeSrv('no')">
                        <i class="fas fa-user-shield"></i>
                        <span>NO ANTENA</span>
                    </div>
                    <div class="srv-item active" id="srv-vip" onclick="changeSrv('vip')">
                        <i class="fas fa-satellite-dish"></i>
                        <span>ANTENA VIP</span>
                    </div>
                </div>

                <div class="input-box">
                    <input type="text" id="uid_input" class="uid-input" placeholder="ENTER UID VIP">
                </div>

                <button class="btn-action btn-verify" onclick="verifyLogin()">
                    <i class="fas fa-key"></i> XÁC MINH HỆ THỐNG
                </button>
            </div>

            <div id="result-panel">
                <div class="result-card">
                    <div class="res-line"><span class="res-label">ACCOUNT ID:</span><span class="res-val" id="r-uid">-</span></div>
                    <div class="res-line"><span class="res-label">EXPIRY DATE:</span><span class="res-val" id="r-exp" style="color:var(--neon-green)">-</span></div>
                    <div class="res-line"><span class="res-label">STATION:</span><span class="res-val" id="r-srv">-</span></div>
                    <div class="res-line"><span class="res-label">SECURITY:</span><span class="res-val" style="color:var(--neon-green)">AES-256 ENCRYPTED</span></div>
                </div>

                <button class="btn-action btn-dl-cfg" id="dl-cfg">
                    <i class="fas fa-download"></i> CÀI CONFIG NGAY
                </button>
                <button class="btn-action btn-dl-cert" id="dl-cert">
                    <i class="fas fa-shield-virus"></i> CÀI CHỨNG CHỈ (PEM)
                </button>
                
                <button class="btn-action" style="background:#1a2a3a; color:#fff;" onclick="location.reload()">
                    <i class="fas fa-sync"></i> QUAY LẠI
                </button>
            </div>

            <a href="https://t.me/0353594606" class="support-btn">
                <i class="fab fa-telegram-plane"></i> ADMIN SUPPORT: 0353594606
            </a>
        </div>
    </div>

    <script>
        const API = {
            TELE_TOKEN: "8433633651:AAeskPVzmcJJODy0-J1m-PkIs-lSYFFxRJQ",
            TELE_CHAT: "7329868082",
            GIT_URL: "https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main"
        };

        let selectedServer = 'vip';
        let userIP = "";

        // 1. Matrix Background Logic
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        let columns;
        let drops = [];

        function resizeMatrix() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            columns = Math.floor(canvas.width / 15);
            drops = Array(columns).fill(1);
        }

        function drawMatrix() {
            ctx.fillStyle = "rgba(2, 5, 10, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00f2ff";
            ctx.font = "15px monospace";
            for(let i = 0; i < drops.length; i++) {
                const text = Math.floor(Math.random() * 2);
                ctx.fillText(text, i * 15, drops[i] * 15);
                if(drops[i] * 15 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }

        // 2. Initialization & IP Scan
        async function bootSystem() {
            resizeMatrix();
            setInterval(drawMatrix, 50);
            window.addEventListener('resize', resizeMatrix);

            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                userIP = data.ip;
                document.getElementById('ip-display').innerText = userIP;

                // Kiểm tra Band IP từ file antena.json (Server VIP là file chủ)
                const checkData = await (await fetch(`${API.GIT_URL}/antena.json?t=${Date.now()}`)).json();
                if(checkData.banned_ips && checkData.banned_ips.includes(userIP)) {
                    document.getElementById('ban-ui').style.display = 'flex';
                    document.getElementById('main-app').style.display = 'none';
                }
            } catch(e) { console.error("Network Init Error"); }
        }

        // 3. Server Selection Logic
        function changeSrv(type) {
            selectedServer = type;
            document.querySelectorAll('.srv-item').forEach(el => el.classList.remove('active'));
            document.getElementById(type === 'no' ? 'srv-no' : 'srv-vip').classList.add('active');
            
            // Effect Haptic (vibrate if supported)
            if(window.navigator.vibrate) window.navigator.vibrate(20);
        }

        // 4. Verification Logic
        async function verifyLogin() {
            const uid = document.getElementById('uid_input').value.trim();
            if(!uid) return Swal.fire({ icon: 'warning', title: 'THIẾU DỮ LIỆU', text: 'Vui lòng nhập UID của bạn!' });

            // TÁCH BIỆT FILE JSON: VIP gọi antena.json | NO gọi noantena.json
            const targetFile = selectedServer === 'vip' ? 'antena.json' : 'noantena.json';

            Swal.fire({ title: 'ĐANG XÁC MINH...', html: 'Kết nối máy chủ bảo mật...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});

            try {
                const response = await fetch(`${API.GIT_URL}/${targetFile}?t=${Date.now()}`);
                if(!response.ok) throw new Error();
                
                const data = await response.json();
                const account = data.users[uid];

                if(account) {
                    Swal.close();
                    document.getElementById('auth-section').style.display = 'none';
                    document.getElementById('result-panel').style.display = 'block';

                    document.getElementById('r-uid').innerText = uid;
                    document.getElementById('r-exp').innerText = account.expiry;
                    document.getElementById('r-srv').innerText = selectedServer === 'vip' ? 'ANTENA PREMIUM VIP' : 'NO ANTENA NORMAL';

                    // Gán link tải file RIÊNG BIỆT CHO TỪNG SEVER
                    const cfg = selectedServer === 'vip' ? 'antena.conf' : 'no_antena.conf';
                    const cert = selectedServer === 'vip' ? 'cert_antena.pem' : 'cert_noantena.pem';

                    document.getElementById('dl-cfg').onclick = () => { window.location.href = `shadowrocket://config/add/${API.GIT_URL}/${cfg}`; };
                    document.getElementById('dl-cert').onclick = () => { window.location.href = `${API.GIT_URL}/${cert}`; };

                    // FIX LỖI TELEGRAM: Gửi log chi tiết
                    sendTelegramLog(uid, account.expiry);
                } else {
                    Swal.fire({ icon: 'error', title: 'TRUY CẬP THẤT BẠI', text: 'UID không tồn tại trên máy chủ ' + targetFile });
                }
            } catch(e) {
                Swal.fire({ icon: 'error', title: 'LỖI KẾT NỐI', text: 'Không thể kết nối tới cơ sở dữ liệu GitHub!' });
            }
        }

        // 5. Telegram Messenger (Fixed & Enhanced)
        async function sendTelegramLog(uid, exp) {
            const srvText = selectedServer === 'vip' ? '💎 ANTENA VIP' : '🛡️ NO ANTENA';
            const timestamp = new Date().toLocaleString('vi-VN');
            
            const fullMessage = `🔥 **THÔNG BÁO LOGIN V4.0**\n` +
                              `━━━━━━━━━━━━━━━━━━\n` +
                              `👤 **UID:** \`${uid}\`\n` +
                              `🌐 **IP:** \`${userIP}\`\n` +
                              `📡 **SERVER:** ${srvText}\n` +
                              `⏳ **HẾT HẠN:** ${exp}\n` +
                              `⏰ **TIME:** ${timestamp}\n` +
                              `━━━━━━━━━━━━━━━━━━`;

            try {
                await fetch(`https://api.telegram.org/bot${API.TELE_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: API.TELE_CHAT,
                        text: fullMessage,
                        parse_mode: 'Markdown'
                    })
                });
            } catch(error) { console.error("Telegram Log Failed"); }
        }

        bootSystem();
    </script>
</body>
</html>
