<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQUY SYSTEM - AIM SERVER VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #ffcc00;
            --cyan: #00f2ff;
            --bg: #05070a;
        }
        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #101520 0%, #05070a 100%);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        /* Khung Panel Chính */
        .panel {
            width: 90%;
            max-width: 420px;
            background: rgba(15, 20, 30, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 25px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 242, 255, 0.1);
            position: relative;
            animation: breathe 4s infinite ease-in-out;
        }
        @keyframes breathe {
            0%, 100% { border-color: rgba(0, 242, 255, 0.3); box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); }
            50% { border-color: var(--cyan); box-shadow: 0 0 30px rgba(0, 242, 255, 0.3); }
        }
        h1 {
            font-size: 28px;
            letter-spacing: 2px;
            margin: 0;
            background: linear-gradient(to bottom, #fff, var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(0, 242, 255, 0.5));
        }
        .version { font-size: 12px; color: #555; margin-bottom: 20px; }
        .status-bar { color: #39ff14; font-size: 13px; font-weight: bold; margin-bottom: 25px; text-transform: uppercase; }

        /* Input thiết kế lại */
        .input-group { position: relative; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 18px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #222;
            border-radius: 12px;
            color: var(--cyan);
            font-size: 16px;
            text-align: center;
            transition: 0.3s;
            outline: none;
        }
        input:focus { border-color: var(--cyan); background: rgba(0, 242, 255, 0.05); }

        /* Nút bấm */
        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-check {
            background: linear-gradient(45deg, #0082ff, #00f2ff);
            color: white;
            box-shadow: 0 5px 15px rgba(0, 130, 255, 0.3);
        }
        .btn-check:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 242, 255, 0.5); }

        .btn-download {
            background: linear-gradient(45deg, #1d976c, #93f9b9);
            color: #000;
            display: none;
            margin-top: 20px;
        }

        /* Khung thông tin */
        #info_box {
            margin: 20px 0;
            padding: 15px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid var(--cyan);
            display: none;
            text-align: left;
            font-size: 14px;
            line-height: 1.8;
        }

        /* Zalo link */
        .zalo-contact {
            margin-top: 25px;
            display: block;
            color: #aaa;
            text-decoration: none;
            font-size: 13px;
            transition: 0.3s;
        }
        .zalo-contact:hover { color: var(--cyan); }
        .zalo-contact i { color: #0068ff; margin-right: 5px; }
    </style>
</head>
<body>

<div class="panel">
    <h1>HQUY SYSTEM</h1>
    <div class="version">PREMIUM AIM SERVER V3.0.2</div>
    <div class="status-bar"><i class="fas fa-signal"></i> System Online</div>
    
    <div class="input-group">
        <input type="text" id="uid_input" placeholder="NHẬP UID CỦA BẠN...">
    </div>
    
    <button class="btn-check" onclick="checkUID()">KÍCH HOẠT SERVER</button>

    <div id="info_box"></div>

    <a id="dl_link" href="shadowrocket://config/add/https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main/config.conf">
        <button class="btn-download" id="download_btn">
            <i class="fas fa-rocket"></i> CÀI CẤU HÌNH (1 CHẠM)
        </button>
    </a>

    <a href="https://zalo.me/0353594606" class="zalo-contact" target="_blank">
        <i class="fab fa-whatsapp"></i> Hỗ trợ Zalo: <b>0353594606</b>
    </a>
</div>

<script>
    async function checkUID() {
        const id = document.getElementById("uid_input").value;
        const btn = document.getElementById("download_btn");
        const box = document.getElementById("info_box");

        if(!id) return alert("Vui lòng nhập UID!");

        try {
            const res = await fetch('https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main/member.json?v=' + Math.random());
            const data = await res.json();
            const user = data.users[id];

            if(!user) {
                alert("UID KHÔNG CÓ TRÊN HỆ THỐNG!");
                return;
            }

            if(user.status === "banned") {
                alert("TÀI KHOẢN ĐÃ BỊ BAND!");
                return;
            }

            const isExpired = new Date() > new Date(user.expiry);
            if(isExpired) {
                alert("ID ĐÃ HẾT HẠN!");
                box.style.display = "block";
                box.innerHTML = "❌ Trạng thái: Hết hạn<br>⏰ Ngày hết: " + user.expiry;
                btn.style.display = "none";
            } else {
                box.style.display = "block";
                box.innerHTML = "✅ UID: " + id + "<br>✅ Trạng thái: Hợp lệ (VIP)<br>⏳ Hết hạn: " + user.expiry;
                btn.style.display = "block";
                alert("KÍCH HOẠT THÀNH CÔNG!");
            }
        } catch(e) {
            alert("LỖI KẾT NỐI SERVER!");
        }
    }
</script>

</body>
</html>
