        <!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOLITUDE-TA | NEON OVERDRIVE V7.1</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff00ff; --neon-purple: #bc13fe; --neon-green: #39ff14; --bg-dark: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-dark); color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; }
        
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .bg-gradient { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, rgba(188, 19, 254, 0.15), transparent 60%); z-index: 2; pointer-events: none; }
        
        .system-root { position: relative; z-index: 10; display: flex; justify-content: center; align-items: center; height: 100vh; padding: 15px; }
        
        /* Terminal Window Nâng Cấp: Giữ Form nhưng viền RGB mượt hơn */
        .terminal-window { width: 100%; max-width: 440px; background: rgba(10, 10, 15, 0.9); border-radius: 25px; padding: 35px 25px; position: relative; overflow: hidden; box-shadow: 0 0 30px rgba(0, 0, 0, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); }
        .terminal-window::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(transparent, var(--neon-blue), var(--neon-purple), var(--neon-pink), transparent); animation: rotateRGB 4s linear infinite; z-index: -1; }
        .terminal-window::after { content: ''; position: absolute; inset: 3px; background: rgba(10, 10, 15, 0.98); border-radius: 22px; z-index: -1; }
        
        @keyframes rotateRGB { 100% { transform: rotate(360deg); } }

        .brand-zone h1 { font-family: 'Orbitron', sans-serif; font-size: 36px; margin: 0; background: linear-gradient(90deg, var(--neon-blue), #fff, var(--neon-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; letter-spacing: 5px; filter: drop-shadow(0 0 15px var(--neon-blue)); animation: glow 2s ease-in-out infinite alternate; }
        @keyframes glow { from { filter: drop-shadow(0 0 5px var(--neon-blue)); } to { filter: drop-shadow(0 0 20px var(--neon-purple)); } }

        .node-info { background: rgba(0, 242, 255, 0.05); border-radius: 100px; padding: 8px 18px; margin: 20px 0; display: flex; justify-content: space-between; font-size: 12px; border: 1px solid rgba(0, 242, 255, 0.3); color: var(--neon-blue); box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.1); }

        .srv-bridge { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .node-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid #222; padding: 20px 10px; border-radius: 15px; cursor: pointer; transition: 0.4s; text-align: center; position: relative; overflow: hidden; }
        .node-btn i { font-size: 28px; margin-bottom: 10px; color: #444; transition: 0.3s; }
        .node-btn span { font-size: 11px; font-weight: bold; color: #444; letter-spacing: 1px; transition: 0.3s; }
        
        .node-btn.active#n1 { border-color: var(--neon-purple); box-shadow: 0 0 15px rgba(188, 19, 254, 0.4); }
        .node-btn.active#n1 i, .node-btn.active#n1 span { color: var(--neon-purple); text-shadow: 0 0 10px var(--neon-purple); }
        .node-btn.active#n2 { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }
        .node-btn.active#n2 i, .node-btn.active#n2 span { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

        .id-input { width: 100%; background: rgba(0,0,0,0.8); border: 1px solid #333; padding: 20px; border-radius: 15px; color: #fff; font-family: 'Orbitron'; font-size: 20px; text-align: center; letter-spacing: 3px; margin-bottom: 25px; transition: 0.3s; box-shadow: inset 0 0 15px rgba(0,0,0,1); }
        .id-input:focus { border-color: var(--neon-blue); box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }

        .engine-btn { width: 100%; padding: 20px; border: none; border-radius: 15px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple)); color: #000; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; box-shadow: 0 5px 20px rgba(0, 242, 255, 0.4); position: relative; }
        .engine-btn:active { transform: scale(0.98); }

        #data-flow { display: none; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .data-card { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px dashed rgba(0, 242, 255, 0.3); }
        .d-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .lbl { color: #888; font-size: 11px; text-transform: uppercase; }
        .val { color: var(--neon-green); font-weight: bold; text-shadow: 0 0 8px var(--neon-green); }

        .btn-sub { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px; background: rgba(255,255,255,0.02); border: 1px solid #333; color: #fff; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-sub:hover { background: rgba(255,255,255,0.08); border-color: #555; }

        .ban-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="particles-js"></div>
    <div class="bg-gradient"></div>

    <div class="ban-screen" id="blacklisted">
        <i class="fas fa-skull-crossbones" style="font-size: 80px; color: red; margin-bottom: 20px; filter: drop-shadow(0 0 20px red);"></i>
        <h1 style="color:red; font-family: Orbitron; letter-spacing: 5px;">IP BLOCKED</h1>
        <p id="ban-ip-text" style="color: #444; margin-top: 10px;"></p>
    </div>

    <div class="system-root">
        <div class="terminal-window">
            <div class="brand-zone">
                <h1>SOLITUDE PROXY</h1>
                <p style="text-align: center; font-size: 10px; color: #666; letter-spacing: 3px; margin: 5px 0 20px 0;">NEON OVERDRIVE V7.1</p>
            </div>

            <div class="node-info">
                <span><i class="fas fa-wifi"></i> <span id="ip-node">GETTING IP...</span></span>
                <span>ONLINE <i class="fas fa-circle" style="font-size: 8px; color: var(--neon-green); animation: pulse 1.5s infinite;"></i></span>
            </div>

            <div id="auth-layer">
                <div class="srv-bridge">
                    <div class="node-btn" id="n1" onclick="switchNode('no')">
                        <i class="fas fa-shield-halved"></i>
                        <span>AIM DRAG</span>
                    </div>
                    <div class="node-btn active" id="n2" onclick="switchNode('vip')">
                        <i class="fas fa-bolt-lightning"></i>
                        <span>ANTENA VIP</span>
                    </div>
                </div>

                <input type="text" id="uid_entry" class="id-input" placeholder="ID: 863XXXX">
                <button class="engine-btn" onclick="startInjection()">VERIFY ACCESS</button>
            </div>

            <div id="data-flow">
                <div class="data-card">
                    <div class="d-row"><span class="lbl">USER ID:</span><span class="val" id="v-uid">-</span></div>
                    <div class="d-row"><span class="lbl">HẠN SỬ DỤNG:</span><span class="val" id="v-exp">-</span></div>
                    <div class="d-row"><span class="lbl">MÁY CHỦ:</span><span class="val" id="v-srv" style="color: var(--neon-purple)">-</span></div>
                </div>

                <button class="btn-sub" id="get-c" style="border-color: var(--neon-green); color: var(--neon-green);">
                    <i class="fas fa-cloud-download"></i> INSTALL SOLITUDE
                </button>
                <button class="btn-sub" id="get-p" style="border-color: var(--neon-blue); color: var(--neon-blue);">
                    <i class="fas fa-certificate"></i> INSTALL CERTIFICATE
                </button>
                
                <button class="engine-btn" style="background: transparent; color: #ff003c; border: 1px solid #ff003c; margin-top: 10px; box-shadow: none;" onclick="location.reload()">
                    ĐĂNG XUẤT
                </button>
            </div>

            <p style="text-align: center; margin-top: 25px; font-size: 11px; color: #444;">
                <i class="fab fa-telegram"></i> SUPPORT: @0353594606
            </p>
        </div>
    </div>

    <script>
        const _CFG = { 
            t: "8626643586:AAET1UUTKaGzDCit47o3UMAYKHdyGQLKSN0", 
            c: "7329868082", 
            g: "https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main" 
        };

        let nodeType = 'vip';
        let userIP = "";

        // TỰ ĐỘNG LẤY IP KHI VỪA VÀO TRANG
        async function getRealIP() {
            try {
                const r = await fetch('https://api.ipify.org?format=json');
                const d = await r.json();
                userIP = d.ip;
                document.getElementById('ip-node').innerText = userIP;
                checkIPBan(userIP);
            } catch(e) {
                document.getElementById('ip-node').innerText = "NETWORK ERROR";
            }
        }

        async function checkIPBan(ip) {
            try {
                const resp = await fetch(`${_CFG.g}/antena.json?v=${Date.now()}`);
                const vault = await resp.json();
                if(vault.banned_ips && vault.banned_ips.includes(ip)) {
                    document.getElementById('blacklisted').style.display = 'flex';
                    document.getElementById('ban-ip-text').innerText = "IP: " + ip;
                }
            } catch(e) {}
        }

        function switchNode(t) { 
            nodeType = t; 
            document.querySelectorAll('.node-btn').forEach(n => n.classList.remove('active')); 
            document.getElementById(t === 'no' ? 'n1' : 'n2').classList.add('active'); 
        }

        async function startInjection() { 
            const entry = document.getElementById('uid_entry').value.trim(); 
            if(!entry) return; 

            const targetFile = (nodeType === 'no') ? 'noantena.json' : 'antena.json'; 
            
            Swal.fire({ 
                title: 'AUTHENTICATING...', 
                background: '#0a0a0f', color: '#00f2ff', 
                didOpen: () => Swal.showLoading() 
            });

            try { 
                const resp = await fetch(`${_CFG.g}/${targetFile}?v=${Date.now()}`); 
                const data = await resp.json(); 

                if(data.banned_ids && data.banned_ids.includes(entry)) { 
                    Swal.fire({ icon: 'error', title: 'UID BANNED', background: '#0a0a0f', color: '#ff003c' }); 
                    return; 
                } 

                const user = data.users[entry]; 
                if(user) { 
                    // KIỂM TRA KHÓA IP (IP BINDING)
                    if(user.ip && user.ip !== userIP) {
                        Swal.fire({ 
                            icon: 'warning', 
                            title: 'SAI ĐỊA CHỈ IP', 
                            text: `ID này đã khóa IP: ${user.ip}. Máy bạn là: ${userIP}`,
                            background: '#0a0a0f', color: '#ffbb00' 
                        });
                        return;
                    }

                    Swal.close(); 
                    document.getElementById('auth-layer').style.display = 'none'; 
                    document.getElementById('data-flow').style.display = 'block'; 
                    
                    document.getElementById('v-uid').innerText = entry; 
                    document.getElementById('v-exp').innerText = user.expiry; 
                    document.getElementById('v-srv').innerText = (nodeType === 'no') ? 'AIM DRAG' : 'ANTENA VIP'; 

                    const conf = (nodeType === 'no') ? 'no_antena.conf' : 'antena.conf'; 
                    document.getElementById('get-c').onclick = () => location.href = `shadowrocket://config/add/${_CFG.g}/${conf}`; 
                    document.getElementById('get-p').onclick = () => location.href = `${_CFG.g}/cert_antena.pem`; 

                    sendTele(`✅ **VIP LOGIN**\n👤 ID: \`${entry}\`\n🌐 IP: \`${userIP}\`\n📡 NODE: ${nodeType.toUpperCase()}`); 
                } else { 
                    Swal.fire({ icon: 'error', title: 'ID KHÔNG TỒN TẠI', background: '#0a0a0f', color: '#ff003c' }); 
                } 
            } catch(e) { 
                Swal.fire({ icon: 'error', title: 'SERVER ERROR', background: '#0a0a0f', color: '#ff003c' }); 
            } 
        }

        function sendTele(msg) { 
            fetch(`https://api.telegram.org/bot${_CFG.t}/sendMessage`, { 
                method: 'POST', headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ chat_id: _CFG.c, text: msg, parse_mode: 'Markdown' }) 
            }); 
        }

        // Chạy lấy IP ngay lập tức
        getRealIP();
        particlesJS("particles-js", { "particles": { "number": { "value": 100 }, "color": { "value": ["#00f2ff", "#ff00ff"] }, "shape": { "type": "circle" }, "opacity": { "value": 0.3 }, "size": { "value": 2 }, "line_linked": { "enable": true, "distance": 150, "color": "#00f2ff", "opacity": 0.1, "width": 1 }, "move": { "enable": true, "speed": 2 } } });
    </script>
</body>
</html>
