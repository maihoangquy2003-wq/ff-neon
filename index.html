<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQUY SYSTEM | NEON VIP SERVER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #00f2ff; --bg: #02060c; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        #canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.2; }
        .container { width: 95%; max-width: 450px; background: rgba(5, 15, 25, 0.85); backdrop-filter: blur(20px); border: 2px solid var(--neon); border-radius: 20px; padding: 30px 20px; box-shadow: 0 0 30px rgba(0, 242, 255, 0.3); position: relative; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 30px; margin: 0; color: var(--neon); text-shadow: 0 0 15px var(--neon); font-weight: 900; }
        .section-title { font-size: 13px; color: var(--neon); font-weight: bold; display: flex; align-items: center; gap: 8px; margin: 20px 0 15px; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: rgba(0, 242, 255, 0.2); }
        input { width: 100%; padding: 18px; border-radius: 12px; background: #000; border: 1px solid #1a2a3a; color: var(--neon); font-size: 16px; text-align: center; outline: none; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; transition: 0.3s; text-transform: uppercase; margin-top: 10px; }
        .btn-primary { background: linear-gradient(90deg, #0082ff, #00f2ff); color: white; }
        .btn-success { background: transparent; border: 2px solid #39ff14; color: #39ff14; margin-top: 15px; }
        #vip_dashboard { display: none; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        .vip-box { background: rgba(0, 242, 255, 0.05); border: 1px dashed var(--neon); border-radius: 15px; padding: 15px; }
        .zalo-box { margin-top: 25px; text-align: center; font-size: 12px; color: #444; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="container">
        <div class="header"><h1>HQUY SYSTEM</h1><p>ULTIMATE PREMIUM</p></div>
        
        <div class="section-title"><i class="fas fa-key"></i> KÍCH HOẠT</div>
        <input type="text" id="uid_input" placeholder="NHẬP MÃ UID VIP">
        <button class="btn btn-primary" onclick="checkUID()">XÁC MINH UID SERVER</button>

        <div id="vip_dashboard">
            <div class="section-title"><i class="fas fa-crown"></i> DASHBOARD VIP</div>
            <div class="vip-box">
                <div style="display:flex; justify-content:space-between">UID: <b id="show_id"></b></div>
                <div style="display:flex; justify-content:space-between">HẠN: <b id="show_expiry"></b></div>
            </div>
            <a id="download_link" href="#" style="text-decoration: none;">
                <button class="btn btn-success">CÀI CẤU HÌNH & PROXY (1 CHẠM)</button>
            </a>
        </div>

        <div class="zalo-box">LIÊN HỆ: <a href="https://zalo.me/0353594606" style="color:var(--neon)">0353594606</a></div>
    </div>

    <script>
        // Matrix Effect
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = new Array(Math.floor(canvas.width/20)).fill(1);
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.05)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = '#00f2ff'; ctx.font = '15px monospace';
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random()*2), i*20, y*20);
                if(y*20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 50);

        // Logic Check UID
        async function checkUID() {
            const id = document.getElementById("uid_input").value;
            if(!id) return alert("VUI LÒNG NHẬP UID!");
            try {
                const res = await fetch(`https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main/member.json?t=${Date.now()}`);
                const data = await res.json();
                const user = data.users[id];
                if(!user) return alert("UID KHÔNG TỒN TẠI!");
                
                document.getElementById("show_id").innerText = id;
                document.getElementById("show_expiry").innerText = user.expiry;
                document.getElementById("download_link").href = "shadowrocket://config/add/https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main/config.conf";
                document.getElementById("vip_dashboard").style.display = "block";
                alert("XÁC MINH THÀNH CÔNG!");
            } catch(e) { alert("LỖI KẾT NỐI SERVER!"); }
        }
    </script>
</body>
</html>
