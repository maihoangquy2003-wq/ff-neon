        <!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOLITUDE-TA | NEON OVERDRIVE V7.1</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff00ff; --neon-purple: #bc13fe; --neon-green: #39ff14; --neon-red: #ff003c; --bg-dark: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-dark); color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; }
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .bg-gradient { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, rgba(188, 19, 254, 0.15), transparent 60%); z-index: 2; pointer-events: none; }
        .system-root { position: relative; z-index: 10; display: flex; justify-content: center; align-items: center; height: 100vh; padding: 15px; }
        
        /* Hiệu ứng viền chạy RGB cho khung chính */
        .terminal-window { width: 100%; max-width: 440px; background: rgba(10, 10, 15, 0.9); border-radius: 25px; padding: 35px 25px; position: relative; overflow: hidden; box-shadow: 0 0 30px rgba(0, 0, 0, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); }
        .terminal-window::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(transparent, var(--neon-blue), var(--neon-purple), var(--neon-pink), transparent); animation: rotateRGB 4s linear infinite; z-index: -1; }
        .terminal-window::after { content: ''; position: absolute; inset: 4px; background: rgba(10, 10, 15, 0.95); border-radius: 21px; z-index: -1; }
        @keyframes rotateRGB { 100% { transform: rotate(360deg); } }

        /* Neon Title */
        .brand-zone h1 { font-family: 'Orbitron', sans-serif; font-size: 36px; margin: 0; background: linear-gradient(90deg, var(--neon-blue), #fff, var(--neon-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; letter-spacing: 5px; filter: drop-shadow(0 0 15px var(--neon-blue)); animation: neonPulse 2s infinite alternate; }
        @keyframes neonPulse { from { filter: drop-shadow(0 0 10px var(--neon-blue)); } to { filter: drop-shadow(0 0 25px var(--neon-pink)); } }

        /* Màn hình Ban IP Neon Red */
        .ban-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .ban-screen h1 { 
            font-family: 'Orbitron'; font-size: 40px; text-align: center;
            background: linear-gradient(90deg, var(--neon-red), #fff, var(--neon-red));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px var(--neon-red));
            letter-spacing: 8px; animation: glitch 1s infinite;
        }
        @keyframes glitch { 
            0% { transform: skew(0deg); } 20% { transform: skew(-2deg); } 40% { transform: skew(2deg); } 100% { transform: skew(0deg); } 
        }

        /* Các thành phần giao diện khác */
        .node-info { background: rgba(255, 255, 255, 0.05); border-radius: 100px; padding: 8px 15px; margin: 20px 0; display: flex; justify-content: space-between; font-size: 12px; border: 1px solid rgba(0, 242, 255, 0.2); color: var(--neon-blue); box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.1); }
        .srv-bridge { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .node-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid #222; padding: 20px 10px; border-radius: 15px; cursor: pointer; transition: 0.4s; text-align: center; }
        .node-btn.active#n1 { border-color: var(--neon-purple); box-shadow: 0 0 20px rgba(188, 19, 254, 0.5); transform: scale(1.02); }
        .node-btn.active#n2 { border-color: var(--neon-blue); box-shadow: 0 0 20px rgba(0, 242, 255, 0.5); transform: scale(1.02); }
        .id-input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid #333; padding: 20px; border-radius: 15px; color: #fff; font-family: 'Orbitron'; font-size: 20px; text-align: center; letter-spacing: 3px; margin-bottom: 25px; transition: 0.3s; box-shadow: inset 0 0 15px rgba(255,255,255,0.05); }
        .id-input:focus { border-color: var(--neon-blue); outline: none; box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }
        .engine-btn { width: 100%; padding: 20px; border: none; border-radius: 15px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple)); color: #000; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; box-shadow: 0 5px 25px rgba(0, 242, 255, 0.5); }
        .engine-btn:hover { transform: translateY(-3px); filter: brightness(1.2); }
        
        /* Custom SweetAlert2 Neon */
        .swal2-popup { border-radius: 20px !important; border: 1px solid rgba(0, 242, 255, 0.3) !important; box-shadow: 0 0 30px rgba(0, 0, 0, 1) !important; }
        .swal2-title-neon { font-family: 'Orbitron' !important; background: linear-gradient(90deg, var(--neon-blue), #fff, var(--neon-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 8px var(--neon-blue)); letter-spacing: 2px; }
        .swal2-title-error { font-family: 'Orbitron' !important; background: linear-gradient(90deg, var(--neon-red), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 8px var(--neon-red)); }
    </style>
</head>
<body>

    <div id="particles-js"></div>
    <div class="bg-gradient"></div>

    <div class="ban-screen" id="blacklisted">
        <i class="fas fa-skull-crossbones" style="font-size: 80px; color: var(--neon-red); margin-bottom: 20px; filter: drop-shadow(0 0 15px var(--neon-red));"></i>
        <h1>ACCESS DENIED</h1>
        <p style="color: var(--neon-red); font-family: Orbitron; font-size: 12px; margin-top: 10px; letter-spacing: 2px;">YOUR IP HAS BEEN BLACKLISTED</p>
    </div>

    <div class="system-root">
        <div class="terminal-window">
            <div class="brand-zone">
                <h1>SOLITUDE PROXY</h1>
                <p style="text-align: center; font-size: 10px; color: #888; letter-spacing: 3px; margin: 5px 0 20px 0; font-family: 'Orbitron';">NEON OVERDRIVE V7.1</p>
            </div>

            <div class="node-info">
                <span><i class="fas fa-network-wired"></i> <span id="ip-node">SCANNING...</span></span>
                <span>SYSTEM ONLINE <i class="fas fa-circle" style="font-size: 8px; color: var(--neon-green); filter: drop-shadow(0 0 5px var(--neon-green));"></i></span>
            </div>

            <div id="auth-layer">
                <div class="srv-bridge">
                    <div class="node-btn" id="n1" onclick="switchNode('no')">
                        <i class="fas fa-shield-halved" style="font-size: 24px; color: #666; margin-bottom: 5px;"></i><br>
                        <span style="font-size: 10px;">AIM DRAG</span>
                    </div>
                    <div class="node-btn active" id="n2" onclick="switchNode('vip')">
                        <i class="fas fa-bolt-lightning" style="font-size: 24px; margin-bottom: 5px;"></i><br>
                        <span style="font-size: 10px;">ANTENA PREMIUM</span>
                    </div>
                </div>

                <input type="text" id="uid_entry" class="id-input" placeholder="ENTER UID">
                <button class="engine-btn" onclick="startInjection()">VERIFY ACCESS</button>
            </div>

            <div id="data-flow" style="display: none;">
                <div style="background: rgba(255,255,255,0.03); border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px dashed var(--neon-blue); box-shadow: inset 0 0 15px rgba(0,242,255,0.05);">
                    <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05);"><span style="color: #666; font-size: 11px;">USER ID:</span><span style="color: var(--neon-blue); font-weight: bold;" id="v-uid">-</span></div>
                    <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05);"><span style="color: #666; font-size: 11px;">HẠN SỬ DỤNG:</span><span style="color: var(--neon-green); font-weight: bold;" id="v-exp">-</span></div>
                    <div style="display: flex; justify-content: space-between; padding: 8px 0;"><span style="color: #666; font-size: 11px;">MÁY CHỦ:</span><span style="color: var(--neon-purple); font-weight: bold;" id="v-srv">-</span></div>
                </div>

                <button class="btn-sub" id="get-c" style="width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px; background: rgba(57, 255, 20, 0.05); border: 1px solid var(--neon-green); color: var(--neon-green); font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 0 10px rgba(57, 255, 20, 0.1);">
                    <i class="fas fa-cloud-download"></i> INSTALL SOLITUDE
                </button>
                <button class="btn-sub" id="get-p" style="width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px; background: rgba(0, 242, 255, 0.05); border: 1px solid var(--neon-blue); color: var(--neon-blue); font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 0 10px rgba(0, 242, 255, 0.1);">
                    <i class="fas fa-certificate"></i> INSTALL CERTIFICATE
                </button>
                
                <button class="engine-btn" style="background: #111; color: var(--neon-red); border: 1px solid var(--neon-red); margin-top: 10px; box-shadow: none;" onclick="location.reload()">
                    LOGOUT SYSTEM
                </button>
            </div>

            <p style="text-align: center; margin-top: 25px; font-size: 11px; color: #444; font-family: Orbitron; letter-spacing: 1px;">
                <i class="fab fa-telegram"></i> SUPPORT: @0353594606
            </p>
        </div>
    </div>

    <script>
        const _CFG = { 
            t: "8626643586:AAET1UUTKaGzDCit47o3UMAYKHdyGQLKSN0", 
            c: "7329868082", 
            g: "https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main" 
        };

        let nodeType = 'vip'; 
        let userIP = "SCANNING...";

        particlesJS("particles-js", { "particles": { "number": { "value": 80 }, "color": { "value": ["#00f2ff", "#ff00ff"] }, "shape": { "type": "circle" }, "opacity": { "value": 0.4 }, "size": { "value": 2 }, "line_linked": { "enable": true, "distance": 150, "color": "#00f2ff", "opacity": 0.1, "width": 1 }, "move": { "enable": true, "speed": 2 } } });

        async function init() { 
            try { 
                const r = await fetch('https://api.ipify.org?format=json'); 
                const d = await r.json(); 
                userIP = d.ip; 
                document.getElementById('ip-node').innerText = userIP; 

                const resp = await fetch(`${_CFG.g}/antena.json?v=${Date.now()}`, { cache: 'no-store' }); 
                const vault = await resp.json(); 
                
                if(vault.banned_ips && vault.banned_ips.includes(userIP)) { 
                    document.getElementById('blacklisted').style.display = 'flex'; 
                } 
            } catch(e) { console.log("System Ready"); } 
        }

        function switchNode(t) { 
            nodeType = t; 
            document.querySelectorAll('.node-btn').forEach(n => n.classList.remove('active')); 
            if(t === 'no') { 
                document.getElementById('n1').classList.add('active'); 
            } else { 
                document.getElementById('n2').classList.add('active'); 
            } 
        }

        async function startInjection() { 
            const entry = document.getElementById('uid_entry').value.trim(); 
            if(!entry) return; 

            const targetFile = (nodeType === 'no') ? 'noantena.json' : 'antena.json'; 
            
            Swal.fire({ 
                html: '<h2 class="swal2-title-neon">VERIFYING...</h2>',
                background: '#0a0a0f', 
                showConfirmButton: false,
                didOpen: () => Swal.showLoading() 
            });

            try { 
                const resp = await fetch(`${_CFG.g}/${targetFile}?v=${Date.now()}`, { cache: 'no-store' }); 
                const data = await resp.json(); 

                if(data.banned_ids && data.banned_ids.includes(entry)) { 
                    Swal.fire({ 
                        html: '<h2 class="swal2-title-error">BANNED ID</h2><p style="color:#888">Tài khoản của bạn đã bị vô hiệu hóa!</p>',
                        background: '#0a0a0f', confirmButtonColor: '#ff003c'
                    }); 
                    sendTele(`⛔ **UID BỊ CẤM CỐ VÀO**\n👤 UID: \`${entry}\`\n🌐 IP: \`${userIP}\`\n📡 SERVER: ${nodeType.toUpperCase()}`); 
                    return; 
                } 

                const user = data.users[entry]; 
                if(user) { 
                    if (user.ip && user.ip.trim() !== "" && user.ip !== userIP) {
                        Swal.fire({ 
                            html: '<h2 class="swal2-title-error">IP MISMATCH</h2><p style="color:#888">Địa chỉ IP không khớp với dữ liệu đăng ký!</p>',
                            background: '#0a0a0f', confirmButtonColor: '#ff003c'
                        });
                        sendTele(`⚠️ **SAI IP TRUY CẬP**\n👤 UID: \`${entry}\`\n🌐 IP MÁY: \`${userIP}\`\n📍 IP GỐC: \`${user.ip}\``);
                        return;
                    }

                    Swal.close(); 
                    document.getElementById('auth-layer').style.display = 'none'; 
                    document.getElementById('data-flow').style.display = 'block'; 
                    
                    document.getElementById('v-uid').innerText = entry; 
                    document.getElementById('v-exp').innerText = user.expiry; 
                    document.getElementById('v-srv').innerText = (nodeType === 'no') ? 'AIM DRAG (NO ANTENA)' : 'SOLITUDE PREMIUM'; 

                    const conf = (nodeType === 'no') ? 'no_antena.conf' : 'antena.conf'; 
                    document.getElementById('get-c').onclick = () => location.href = `shadowrocket://config/add/${_CFG.g}/${conf}`; 
                    document.getElementById('get-p').onclick = () => location.href = `${_CFG.g}/cert_antena.pem`; 

                    sendTele(`🌟 **ĐĂNG NHẬP THÀNH CÔNG**\n👤 USER: \`${entry}\`\n🌐 IP: \`${userIP}\`\n📡 NODE: ${nodeType.toUpperCase()}`); 
                } else { 
                    Swal.fire({ 
                        html: '<h2 class="swal2-title-error">NOT FOUND</h2><p style="color:#888">UID không tồn tại trên hệ thống!</p>',
                        background: '#0a0a0f', confirmButtonColor: '#ff003c'
                    }); 
                } 
            } catch(e) { 
                Swal.fire({ html: '<h2 class="swal2-title-error">ERROR</h2>', background: '#0a0a0f' }); 
            } 
        }

        function sendTele(msg) { 
            fetch(`https://api.telegram.org/bot${_CFG.t}/sendMessage`, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ chat_id: _CFG.c, text: msg, parse_mode: 'Markdown' }) 
            }); 
        }
        init();
    </script>
</body>
</html>
