<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQUY SYSTEM | LUXURY SERVER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: linear-gradient(135deg, #ff9a00, #ffcc00, #ffec81);
            --gold-shadow: rgba(255, 154, 0, 0.4);
            --border-glow: #00f2ff;
        }
        body {
            background: #020406;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Hiệu ứng nền khói huyền ảo */
        .bg-glow {
            position: absolute; width: 300px; height: 300px;
            background: var(--border-glow); filter: blur(150px);
            opacity: 0.15; z-index: -1; animation: move 10s infinite alternate;
        }
        @keyframes move { from { transform: translate(-50%, -50%); } to { transform: translate(50%, 50%); } }

        /* Khung Panel Đẳng Cấp */
        .card {
            width: 90%; max-width: 450px;
            background: rgba(10, 15, 25, 0.9);
            border-radius: 30px;
            padding: 40px 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }

        /* Viền chạy sáng xung quanh khung */
        .card::before {
            content: ""; position: absolute; inset: 0;
            border-radius: 30px; padding: 2px;
            background: linear-gradient(45deg, transparent, rgba(0, 242, 255, 0.5), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            pointer-events: none;
        }

        h1 {
            font-size: 32px; font-weight: 900; margin: 0;
            background: var(--gold); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 204, 0, 0.5));
            letter-spacing: 2px;
        }

        .subtitle { color: #888; font-size: 12px; margin-top: 5px; letter-spacing: 3px; }

        .status-container {
            display: flex; justify-content: center; align-items: center;
            margin: 25px 0; gap: 10px;
        }
        .dot { width: 8px; height: 8px; background: #39ff14; border-radius: 50%; box-shadow: 0 0 10px #39ff14; }
        .status-text { color: #39ff14; font-size: 14px; font-weight: bold; }

        /* Ô nhập UID đẳng cấp */
        .input-box {
            position: relative; margin-top: 30px;
        }
        input {
            width: 100%; padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            color: #fff; font-size: 18px; text-align: center;
            transition: 0.4s; outline: none; box-sizing: border-box;
        }
        input:focus { border-color: var(--gold); background: rgba(255, 154, 0, 0.05); box-shadow: 0 0 20px rgba(255, 154, 0, 0.2); }

        /* Nút kích hoạt */
        .btn-main {
            width: 100%; padding: 20px; margin-top: 20px;
            border: none; border-radius: 15px;
            background: var(--gold);
            color: #000; font-weight: 900; font-size: 16px;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 20px var(--gold-shadow);
            text-transform: uppercase;
        }
        .btn-main:hover { transform: scale(1.02); filter: brightness(1.1); }

        /* Nút Tải Shadowrocket */
        #download_section { display: none; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .btn-vip {
            width: 100%; padding: 20px; margin-top: 25px;
            border: 2px solid var(--border-glow); border-radius: 15px;
            background: transparent; color: var(--border-glow);
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-vip:hover { background: var(--border-glow); color: #000; box-shadow: 0 0 30px var(--border-glow); }

        /* Hộp thông tin UID */
        .info-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px; padding: 20px; margin-top: 25px;
            text-align: left; border: 1px solid rgba(0, 242, 255, 0.2);
        }
        .info-item { font-size: 14px; margin: 8px 0; color: #ccc; display: flex; justify-content: space-between; }
        .info-item b { color: var(--border-glow); }

        /* Liên hệ Zalo */
        .footer { margin-top: 35px; color: #555; font-size: 13px; }
        .footer a { color: #0068ff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="card">
        <h1>HQUY SYSTEM</h1>
        <div class="subtitle">PREMIUM EXCLUSIVE SERVER</div>

        <div class="status-container">
            <div class="dot"></div>
            <div class="status-text">MÁY CHỦ SẴN SÀNG</div>
        </div>

        <div class="input-box">
            <input type="text" id="uid_input" placeholder="NHẬP MÃ UID VIP CỦA BẠN">
        </div>

        <button class="btn-main" onclick="processUID()">KÍCH HOẠT HỆ THỐNG</button>

        <div id="download_section">
            <div class="info-card">
                <div class="info-item">Người dùng: <b id="res_uid">-</b></div>
                <div class="info-item">Trạng thái: <b style="color: #39ff14;">VIP PREMIUM</b></div>
                <div class="info-item">Hạn dùng: <b id="res_expiry">-</b></div>
            </div>

            <a href="shadowrocket://config/add/https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main/config.conf" style="text-decoration: none;">
                <button class="btn-vip"><i class="fas fa-bolt"></i> CÀI CẤU HÌNH VIP (1 CHẠM)</button>
            </a>
        </div>

        <div class="footer">
            <i class="fab fa-whatsapp"></i> Hỗ trợ Zalo: <a href="https://zalo.me/0353594606">0353594606</a>
        </div>
    </div>

    <script>
        async function processUID() {
            const id = document.getElementById("uid_input").value;
            const section = document.getElementById("download_section");
            if(!id) return alert("Vui lòng nhập UID!");

            try {
                const res = await fetch('https://raw.githubusercontent.com/maihoangquy2003-wq/ff-neon/main/member.json?nocache=' + Date.now());
                const data = await res.json();
                const user = data.users[id];

                if(!user) return alert("UID KHÔNG CÓ TRÊN HỆ THỐNG!");
                if(user.status === "banned") return alert("UID NÀY ĐÃ BỊ BAND VĨNH VIỄN!");

                const expiry = new Date(user.expiry);
                if(new Date() > expiry) {
                    alert("ID CỦA BẠN ĐÃ HẾT HẠN!");
                } else {
                    document.getElementById("res_uid").innerText = id;
                    document.getElementById("res_expiry").innerText = user.expiry;
                    section.style.display = "block";
                    alert("XÁC MINH VIP THÀNH CÔNG!");
                }
            } catch(e) { alert("LỖI MÁY CHỦ!"); }
        }
    </script>
</body>
</html>
